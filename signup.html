<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Study.AI | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        }
        
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            cyan: '#06b6d4',
                            violet: '#8b5cf6',
                            darkBg: '#09090b',
                            darkSurface: '#18181b',
                            darkBorder: '#27272a',
                            lightBg: '#fafafa',
                            lightSurface: '#ffffff',
                            lightBorder: '#e4e4e7',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-attachment: fixed;
        }
        .dark body { background: radial-gradient(circle at top right, #18181b, #09090b 40%); color: #e4e4e7; }
        .light body { background: radial-gradient(circle at top right, #f4f4f5, #fafafa 40%); color: #09090b; }
        
        .glass-panel { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .signature-text { background: -webkit-linear-gradient(45deg, #06b6d4, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input:focus { outline: none; border-color: #06b6d4 !important; box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.1); }
        
        #globalLoader { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; transition: opacity 0.7s ease; }
        .dark #globalLoader { background: #09090b; }
        .light #globalLoader { background: #ffffff; }

        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="globalLoader">
        <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-zinc-200 dark:border-zinc-800 border-t-[#06b6d4] rounded-full animate-spin"></div>
            <p class="text-xs font-bold tracking-widest uppercase opacity-50">Initializing</p>
        </div>
    </div>

    <div id="toast" class="toast glass-panel bg-white/90 dark:bg-zinc-900/90 border border-zinc-200 dark:border-zinc-800 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3">
        <span id="toastMessage" class="text-sm font-semibold"></span>
    </div>

    <main class="w-full max-w-md relative z-10">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-2 mb-4">
                <i data-lucide="brain-circuit" class="text-[#06b6d4] w-8 h-8"></i>
                <span class="text-2xl font-bold font-display tracking-tight">Study.AI</span>
            </div>
            <h1 class="text-3xl font-bold font-display mb-2">Create Account</h1>
            <p class="text-zinc-500 dark:text-zinc-400 font-medium">Join the intelligence revolution</p>
        </div>

        <div class="glass-panel bg-white/70 dark:bg-[#18181b]/70 border border-zinc-200 dark:border-[#27272a] p-8 rounded-[2.5rem] shadow-xl">
            <form id="signupForm" class="space-y-5" onsubmit="handleSignup(event)">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest mb-2 opacity-60 ml-1">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-400"></i>
                        <input type="email" id="email" required placeholder="name@university.edu" 
                            class="w-full bg-white dark:bg-[#09090b] border border-zinc-200 dark:border-[#27272a] rounded-xl py-3.5 pl-12 pr-4 text-sm font-medium transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest mb-2 opacity-60 ml-1">Secure Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-400"></i>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full bg-white dark:bg-[#09090b] border border-zinc-200 dark:border-[#27272a] rounded-xl py-3.5 pl-12 pr-4 text-sm font-medium transition-all">
                    </div>
                    <p class="mt-2 text-[10px] text-zinc-500 font-medium ml-1">Min. 8 characters with letters and numbers</p>
                </div>

                <button type="submit" id="submitBtn" 
                    class="w-full bg-gradient-to-r from-[#06b6d4] to-[#8b5cf6] text-white py-4 rounded-xl font-bold text-sm tracking-widest uppercase shadow-lg hover:opacity-90 transition-all active:scale-[0.98] mt-4">
                    Initialize Account
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-zinc-200 dark:border-zinc-800"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#fafafa] dark:bg-[#18181b] px-4 text-zinc-400 font-bold tracking-tighter">or continue with</span></div>
            </div>

            <button onclick="googleLogin()" 
                class="w-full flex items-center justify-center gap-3 bg-white dark:bg-[#09090b] border border-zinc-200 dark:border-[#27272a] py-3.5 rounded-xl font-semibold text-sm transition-all hover:bg-zinc-50 dark:hover:bg-[#27272a]">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/></svg>
                Google Identity
            </button>
        </div>

        <p class="text-center mt-8 text-sm font-medium text-zinc-500">
            Already a member? <a href="/app" class="text-[#06b6d4] hover:underline">Sign In</a>
        </p>
    </main>

    <script>
        lucide.createIcons();

        // Initialize Supabase (Ensure your env variables are correct)
        const supabaseClient = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMessage');
            msgEl.innerText = message;
            msgEl.className = isError ? 'text-sm font-semibold text-red-500' : 'text-sm font-semibold text-[#06b6d4]';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        async function handleSignup(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');

            // --- Password Validation Fix ---
            // Checking: Length >= 8, must contain letters and numbers
            const hasLetters = /[a-zA-Z]/.test(password);
            const hasNumbers = /\d/.test(password);

            if (password.length < 8) {
                showToast("❌ Password must be at least 8 characters", true);
                return;
            }
            if (!hasLetters || !hasNumbers) {
                showToast("❌ Password needs both letters and numbers", true);
                return;
            }
            // --- End of Fix ---

            btn.disabled = true;
            btn.innerText = "PROCESSING...";

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: { emailRedirectTo: window.location.origin + "/app" }
                });

                if (error) throw error;

                // Handle existing user identity
                if (data?.user && data.user.identities?.length === 0) {
                    showToast("❌ User already exists. Redirecting...", true);
                    setTimeout(() => window.location.href = "/app?email=" + encodeURIComponent(email), 1500);
                    return;
                }

                showToast("📩 Verification email sent!");
                setTimeout(() => window.location.href = "/app?verify=sent", 2000);

            } catch (err) {
                showToast(`❌ ${err.message}`, true);
                btn.disabled = false;
                btn.innerText = "INITIALIZE ACCOUNT";
            }
        }

        async function googleLogin() {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: "google",
                options: { redirectTo: window.location.origin + "/app" }
            });
            if (error) showToast("❌ Google login failed", true);
        }

        window.addEventListener('load', () => {
            const loader = document.getElementById('globalLoader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 700);
            }, 800);
        });
    </script>
</body>
</html>
