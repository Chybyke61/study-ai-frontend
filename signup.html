<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity | Study.AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; background-attachment: fixed; background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%); }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .otp-input:focus { border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        .btn-emerald { background: #059669; transition: all 0.3s ease; }
        .btn-emerald:hover { background: #10b981; transform: translateY(-1px); }
        .loader { width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: #10b981; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="globalLoader" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center transition-opacity duration-700">
        <span class="loader"></span>
    </div>

    <div class="glass-card p-8 md:p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border-white/5 relative">
        
        <div id="step-identity" class="space-y-5">
            <div class="text-center mb-6">
                <h2 id="auth-title" class="text-3xl font-black font-['Plus_Jakarta_Sans'] text-white">Initialize</h2>
                <p id="auth-desc" class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Create your academic profile</p>
            </div>

            <div class="space-y-4">
                <input id="email" type="email" placeholder="Email Address" class="w-full bg-slate-900/50 border border-slate-800 rounded-xl px-4 py-4 text-white focus:border-emerald-500 outline-none transition-all">
                
                <div id="password-fields" class="space-y-3">
                    <input id="password" type="password" placeholder="Password" class="w-full bg-slate-900/50 border border-slate-800 rounded-xl px-4 py-4 text-white focus:border-emerald-500 outline-none transition-all">
                    <input id="confirmPassword" type="password" placeholder="Confirm Password" class="w-full bg-slate-900/50 border border-slate-800 rounded-xl px-4 py-4 text-white focus:border-emerald-500 outline-none transition-all">
                </div>
            </div>

            <div class="flex justify-center py-2">
                <div class="cf-turnstile" data-sitekey="0x4AAAAAAA4p8Bw_M_7_Y-N2" data-theme="dark"></div>
            </div>

            <div id="terms-wrap" class="flex items-start gap-3 px-1">
                <input id="termsCheckbox" type="checkbox" class="mt-1 w-4 h-4 rounded border-slate-700 bg-slate-900 text-emerald-500 accent-emerald-500 cursor-pointer">
                <label for="termsCheckbox" class="text-[10px] font-bold text-slate-500 uppercase leading-tight cursor-pointer">
                    I agree to the <a href="terms.html" class="text-emerald-400">Terms</a> & <a href="privacy.html" class="text-blue-400">Privacy Policy</a>
                </label>
            </div>

            <button onclick="startAuth()" id="actionBtn" class="w-full py-4 btn-emerald text-white font-bold rounded-2xl shadow-lg shadow-emerald-900/20 active:scale-95">
                START INITIALIZATION
            </button>

            <div id="social-area" class="space-y-4">
                <div class="flex items-center gap-4 text-slate-600"><div class="h-px w-full bg-slate-800"></div><span class="text-[10px] font-bold uppercase">OR</span><div class="h-px w-full bg-slate-800"></div></div>
                <button onclick="googleLogin()" class="w-full py-4 bg-white/5 border border-white/10 text-white rounded-2xl flex items-center justify-center gap-3 hover:bg-white/10 transition-all font-bold text-sm">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
                    Continue with Google
                </button>
            </div>

            <div class="text-center pt-2">
                <button id="mode-toggle" onclick="switchMode()" class="text-[10px] font-bold text-slate-500 uppercase hover:text-white transition-colors">Already have an account? Sign In</button>
            </div>
        </div>

        <div id="step-otp" class="hidden space-y-8 py-4">
            <div class="text-center">
                <h2 class="text-2xl font-black text-white font-['Plus_Jakarta_Sans']">Verify Identity</h2>
                <p class="text-slate-400 text-xs">Enter code sent to <span id="display-email" class="text-emerald-400"></span></p>
            </div>

            <div class="flex justify-between gap-2">
                <input type="text" maxlength="1" class="otp-field w-12 h-16 bg-slate-900/50 border border-slate-800 text-center text-2xl font-bold text-emerald-400 rounded-xl outline-none">
                <input type="text" maxlength="1" class="otp-field w-12 h-16 bg-slate-900/50 border border-slate-800 text-center text-2xl font-bold text-emerald-400 rounded-xl outline-none">
                <input type="text" maxlength="1" class="otp-field w-12 h-16 bg-slate-900/50 border border-slate-800 text-center text-2xl font-bold text-emerald-400 rounded-xl outline-none">
                <input type="text" maxlength="1" class="otp-field w-12 h-16 bg-slate-900/50 border border-slate-800 text-center text-2xl font-bold text-emerald-400 rounded-xl outline-none">
                <input type="text" maxlength="1" class="otp-field w-12 h-16 bg-slate-900/50 border border-slate-800 text-center text-2xl font-bold text-emerald-400 rounded-xl outline-none">
                <input type="text" maxlength="1" class="otp-field w-12 h-16 bg-slate-900/50 border border-slate-800 text-center text-2xl font-bold text-emerald-400 rounded-xl outline-none">
            </div>

            <button onclick="verifyOTP()" id="verifyBtn" class="w-full py-4 btn-emerald text-white font-bold rounded-2xl active:scale-95">VERIFY CODE</button>
            
            <div class="text-center">
                <p id="resend-text" class="text-[10px] font-bold text-slate-500 uppercase">Resend in <span id="timer">60</span>s</p>
                <button id="resendBtn" onclick="startAuth()" class="hidden text-[10px] font-bold text-emerald-400 uppercase hover:underline">Resend Code</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl bg-slate-900 border border-slate-800 shadow-2xl text-sm font-bold opacity-0 translate-y-4 transition-all duration-300 pointer-events-none z-[200]"></div>

    <script>
        const SUPABASE_URL = "https://hffbjtbahfwudigywzzx.supabase.co";
        const SUPABASE_KEY = "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let mode = 'signup'; 
        let countdown;

        function showToast(msg, isError = false) {
            const t = document.getElementById("toast");
            t.innerText = msg; t.style.color = isError ? "#f87171" : "#10b981";
            t.className = t.className.replace("opacity-0 translate-y-4", "opacity-100 translate-y-0");
            setTimeout(() => { t.className = t.className.replace("opacity-100 translate-y-0", "opacity-0 translate-y-4"); }, 3000);
        }

        function switchMode() {
            mode = (mode === 'signup') ? 'signin' : 'signup';
            document.getElementById('auth-title').innerText = mode === 'signup' ? "Initialize" : "Welcome Back";
            document.getElementById('actionBtn').innerText = mode === 'signup' ? "START INITIALIZATION" : "ACCESS ACCOUNT";
            document.getElementById('confirmPassword').classList.toggle('hidden', mode === 'signin');
            document.getElementById('terms-wrap').classList.toggle('hidden', mode === 'signin');
            document.getElementById('mode-toggle').innerText = mode === 'signup' ? "Already have an account? Sign In" : "Need an account? Sign Up";
        }

        // OTP Auto-focus
        const otpFields = document.querySelectorAll('.otp-field');
        otpFields.forEach((field, i) => {
            field.oninput = () => { if (field.value && i < 5) otpFields[i+1].focus(); };
            field.onkeydown = (e) => { if (e.key === 'Backspace' && !field.value && i > 0) otpFields[i-1].focus(); };
        });

        async function startAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('termsCheckbox').checked;
            const turnstile = document.querySelector('[name="cf-turnstile-response"]')?.value;

            if (!email || !password) return showToast("⚠️ Email and Password required", true);
            if (mode === 'signup' && password !== confirm) return showToast("❌ Passwords mismatch", true);
            if (mode === 'signup' && !terms) return showToast("⚠️ Accept Terms & Privacy", true);
            if (!turnstile) return showToast("⚠️ Please verify you are human", true);

            const btn = document.getElementById('actionBtn');
            btn.disabled = true; btn.innerText = "SENDING CODE...";

            try {
                const res = await fetch(`${SUPABASE_URL}/functions/v1/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                if (!res.ok) throw new Error("Failed to send OTP");

                document.getElementById('display-email').innerText = email;
                document.getElementById('step-identity').classList.add('hidden');
                document.getElementById('step-otp').classList.remove('hidden');
                
                let timeLeft = 60;
                document.getElementById('resend-text').classList.remove('hidden');
                document.getElementById('resendBtn').classList.add('hidden');
                clearInterval(countdown);
                countdown = setInterval(() => {
                    timeLeft--; document.getElementById('timer').innerText = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(countdown);
                        document.getElementById('resend-text').classList.add('hidden');
                        document.getElementById('resendBtn').classList.remove('hidden');
                    }
                }, 1000);

                showToast("📩 Verification code sent!");
            } catch (err) {
                showToast(`❌ ${err.message}`, true);
                btn.disabled = false; btn.innerText = "TRY AGAIN";
                if (window.turnstile) turnstile.reset();
            }
        }

        async function verifyOTP() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const code = Array.from(otpFields).map(f => f.value).join('');

            if (code.length < 6) return showToast("⚠️ Enter 6-digit code", true);

            const btn = document.getElementById('verifyBtn');
            btn.disabled = true; btn.innerText = "VERIFYING...";

            try {
                const verifyRes = await fetch(`${SUPABASE_URL}/rest/v1/otp_codes?email=eq.${email}&code=eq.${code}`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const verifyData = await verifyRes.json();
                if (verifyData.length === 0) throw new Error("Invalid or expired code");

                const authFunc = (mode === 'signup') ? supabaseClient.auth.signUp : supabaseClient.auth.signInWithPassword;
                const { error } = await authFunc({ email, password });
                if (error) throw error;

                showToast("✅ Identity Confirmed!");
                setTimeout(() => window.location.href = "/app", 1500);
            } catch (err) {
                showToast(`❌ ${err.message}`, true);
                btn.disabled = false; btn.innerText = "VERIFY CODE";
            }
        }

        async function googleLogin() {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: "google", options: { redirectTo: window.location.origin + "/app" }
            });
            if (error) showToast("❌ Google login failed", true);
        }

        window.onload = () => {
            lucide.createIcons();
            setTimeout(() => {
                const loader = document.getElementById('globalLoader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 700);
            }, 800);
        };
    </script>
</body>
</html>
