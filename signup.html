       <div class="flex items-center my-6">

<button onclick="googleLogin()" 
class="w-full flex items-center justify-center bg-slate-900/50 hover:bg-slate-800 border border-slate-700 hover:border-slate-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 gap-3 group">

    <div class="bg-white p-1.5 rounded-xl group-hover:scale-110 transition-transform">

        <div class="mt-8 pt-6 border-t border-slate-800/50 text-center text-sm">

        </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-all duration-300 z-[100] font-bold text-sm pointer-events-none border border-slate-600"></div>

    <script>
        const supabaseUrl = "https://hffbjtbahfwudigywzzx.supabase.co";
        const supabaseKey = "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        lucide.createIcons();

        function showToast(message, isError = false) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.style.borderColor = isError ? "#ef4444" : "#10b981";
            toast.classList.replace("opacity-0", "opacity-100");
            
            setTimeout(() => {
                toast.classList.replace("opacity-100", "opacity-0");
            }, 3000);
        }

        async function signUp() {

     const btn = document.getElementById("signupBtn");

    // ✅ 1. Stop double click
    if (btn?.disabled) return;

    // ✅ 2. Rate limit (anti spam)
    const key = "signupAttempt";
    const lastAttempt = localStorage.getItem(key);
    const now = Date.now();

    if (lastAttempt && now - lastAttempt < 3000) {
        showToast("⏳ Please wait a moment...");
        return;
    }
            
     const token = document.querySelector('[name="cf-turnstile-response"]')?.value;

    if (!token) {
    return showToast("⚠️ Please verify you're human", true);
}

    localStorage.setItem(key, now);
            
    //const btn = document.getElementById("signupBtn");
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;

    // 🔧 Reset helper
    const resetBtn = () => {
        btn.disabled = false;
        btn.innerText = "INITIALIZE ACCOUNT";
    };

    // ✅ 1. Validation
    if (!email || !password || !confirm) {
        showToast("⚠️ Please fill all fields", true);
        if (window.turnstile) turnstile.reset();
        return;
    }

    if (password !== confirm) {
        showToast("❌ Passwords do not match", true);
        if (window.turnstile) turnstile.reset();
        return;
    }

    // 🔒 Strong password validation
    const strongPassword = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).{8,}$/;

    if (!strongPassword.test(password)) {
    showToast("⚠️ Password must be 8+ chars with letter, number & symbol");
    return;
}

    /*if (password.length < 6) {
        showToast("⚠️ Min. 6 characters required", true);
        return;
    } */

    // ✅ 2. Loading state
    btn.disabled = true;
    btn.innerText = "INITIALIZING...";

    try {
        const { data, error } = await supabaseClient.auth.signUp({
            email,
            password,
            options: {
                emailRedirectTo: window.location.origin
            }
        });

        // ✅ 3. Handle explicit errors
        if (error) {
            const msg = (error.message || "").toLowerCase();

            if (
                msg.includes("already") ||
                msg.includes("exists") ||
                msg.includes("registered") ||
                msg.includes("duplicate")
            ) {
                showToast("❌ User already exists. Please login", true);

                resetBtn(); // 🔥 important fix

              /*  setTimeout(() => {
                    window.location.href = "/?email=" + encodeURIComponent(email);
                }, 1500);*/

               /* setTimeout(() => {
                const loader = document.getElementById("globalLoader");

                loader.style.display = "flex";
                loader.style.opacity = "1";

                }, 800);*/

                setTimeout(() => {
                window.location.href = "/app?email=" + encodeURIComponent(email);
                }, 1500);
                
            } else {
                showToast(`❌ ${error.message}`, true);
                resetBtn();

                if (window.turnstile) {
            turnstile.reset();
                }
            }

            return;
        }

        // ✅ 4. Handle Supabase silent duplicate (VERY IMPORTANT)
        if (
            data?.user &&
            Array.isArray(data.user.identities) &&
            data.user.identities.length === 0
        ) {
            showToast("❌ User already exists. Please login", true);

            resetBtn(); // 🔥 important fix

            if (window.turnstile) {
            turnstile.reset();
            }

            /*const loader = document.getElementById("globalLoader");

            loader.style.display = "flex";
            loader.style.opacity = "1";*/

            setTimeout(() => {
            window.location.href = "/app?email=" + encodeURIComponent(email);
            }, 1500);

           /*  setTimeout(() => {
                window.location.href = "/?email=" + encodeURIComponent(email);
            }, 1500);*/

            return;
        }

        // ✅ 5. Success
        await supabaseClient.auth.signOut();

        showToast("📩 Check your email to verify your account");

      /*  setTimeout(() => {
    const loader = document.getElementById("globalLoader");

    loader.style.display = "flex";
    loader.style.opacity = "1";

}, 2000);*/

setTimeout(() => {
    window.location.href = "/app?email=" + encodeURIComponent(email);
}, 2000);
       /* setTimeout(() => {
            window.location.href = "/?verify=1&email=" + encodeURIComponent(email);
        }, 2000);*/

    } catch (err) {
        showToast("❌ Network error. Try again", true);
        resetBtn();
    }
        }

        async function googleLogin() {
    const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: "google",
        options: {
            redirectTo: window.location.origin + "/app"
        }
    });

    if (error) {
        showToast("❌ Google login failed", true);
    }
        }

        function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector("i");

    if (input.type === "password") {
        input.type = "text";
        icon.setAttribute("data-lucide", "eye-off");
    } else {
        input.type = "password";
        icon.setAttribute("data-lucide", "eye");
    }

    lucide.createIcons();
        }

    document.addEventListener("DOMContentLoaded", () => {
    const passwordInput = document.getElementById("password");

    if (!passwordInput) return;

    passwordInput.addEventListener("input", () => {
        const value = passwordInput.value;

        updateRule("rule-length", value.length >= 8);
        updateRule("rule-letter", /[A-Za-z]/.test(value));
        updateRule("rule-number", /\d/.test(value));
        updateRule("rule-symbol", /[@$!%*#?&]/.test(value));
    });
});

function updateRule(id, isValid) {
    const el = document.getElementById(id);
    const icon = el.querySelector("i");

    if (isValid) {
        icon.setAttribute("data-lucide", "check-circle");
        icon.classList.remove("text-slate-600");
        icon.classList.add("text-emerald-400");

        el.classList.remove("text-slate-500");
        el.classList.add("text-emerald-400");
    } else {
        icon.setAttribute("data-lucide", "circle");
        icon.classList.remove("text-emerald-400");
        icon.classList.add("text-slate-600");

        el.classList.remove("text-emerald-400");
        el.classList.add("text-slate-500");
    }

    lucide.createIcons();
}

    </script>

window.addEventListener('load', () => {

    setTimeout(() => {

    }, 600);
});

    if (window.turnstile) {
        turnstile.render('#turnstile-container', {
            sitekey: '0x4AAAAAACuLeZ39cRRtBKwI'

};


    </script>
