<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Study.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-emerald { background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold tracking-tight">Join Study.AI</h1>
            <p class="text-slate-400 mt-2">The future of document intelligence</p>
        </div>

        <div class="glass p-8 rounded-3xl shadow-2xl">
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1 mb-2">Email Address</label>
                    <input type="email" id="email" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="student@example.com">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1 mb-2">Create Password</label>
                    <input type="password" id="password" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="6+ characters">
                </div>
                <button id="signupBtn" onclick="handleSignup()" class="w-full py-4 btn-emerald rounded-xl font-bold text-sm text-white shadow-lg">INITIALIZE ACCOUNT</button>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-800 text-center">
                <p class="text-sm text-slate-400">Already have an account? <a href="login.html" class="text-emerald-400 font-bold hover:underline">Sign In</a></p>
            </div>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient("https://hffbjtbahfwudigywzzx.supabase.co", "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5");
        lucide.createIcons();

        async function handleSignup() {
            const btn = document.getElementById('signupBtn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (password.length < 6) return alert("Password must be at least 6 characters.");

            btn.disabled = true;
            btn.innerText = "INITIALIZING...";

            const { error } = await supabase.auth.signUp({ email, password });

            if (error) {
                alert(error.message);
                btn.disabled = false;
                btn.innerText = "INITIALIZE ACCOUNT";
            } else {
                // Redirect back to login with verification prompt
                window.location.href = `login.html?verify=true&email=${encodeURIComponent(email)}`;
            }
        }
    </script>
</body>
</html>
