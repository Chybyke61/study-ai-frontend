<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Study.AI | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    
    <script>
        // Check local storage for theme preference before page loads to prevent flashing
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        }
        
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            darkBg: '#131314',
                            darkSurface: '#1e1f20',
                            lightBg: '#ffffff',
                            lightSurface: '#f0f4f9',
                            brand: '#a8c7fa',
                            userLight: '#f0f4f9',
                            userDark: '#333537'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Google Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-attachment: fixed;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* Gemini Dark Mode Background */
        .dark body {
            background-color: #131314; 
            color: #e3e3e3;
        }
        
        /* Gemini Light Mode Background */
        body {
            background-color: #ffffff;
            color: #1f1f1f;
        }

        /* Fix for Lucide icons once rendered as SVG */
        svg { display: inline-block; vertical-align: middle; }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <div id="globalLoader" class="fixed inset-0 z-[200] flex flex-col items-center justify-center bg-white dark:bg-[#131314] transition-opacity duration-700">
        <div class="flex flex-col items-center">
            <div class="relative flex items-center justify-center w-16 h-16 mb-6">
                <i data-lucide="brain-circuit" class="w-10 h-10 text-[#4285f4] dark:text-[#a8c7fa] animate-pulse"></i>
            </div>
            <h2 class="text-2xl font-medium tracking-tight text-slate-900 dark:text-white mb-4 font-display">Study.AI</h2>
            <div class="flex items-center gap-2 mb-4">
                <div class="w-1.5 h-1.5 rounded-full bg-[#4285f4] dark:bg-[#a8c7fa] animate-bounce" style="animation-delay: 0s;"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-[#d96570] animate-bounce" style="animation-delay: 0.15s;"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-[#9b72cb] animate-bounce" style="animation-delay: 0.3s;"></div>
            </div>
            <p class="text-xs font-medium text-gray-500 dark:text-gray-400">Initializing Workspace...</p>
        </div>
    </div>

    <div class="absolute top-6 right-6 z-50">
        <button onclick="toggleTheme()" class="p-2.5 rounded-full bg-white dark:bg-[#1e1f20] hover:bg-gray-100 dark:hover:bg-[#282a2c] border border-gray-200 dark:border-[#444746] transition-all text-gray-600 dark:text-gray-300 shadow-sm" title="Toggle Theme">
            <i id="themeIcon" data-lucide="sun" class="w-5 h-5"></i>
        </button>
    </div>

    <div class="bg-white dark:bg-[#1e1f20] rounded-3xl p-8 sm:p-10 w-full max-w-[420px] shadow-sm border border-gray-100 dark:border-[#282a2c]">
        <div class="text-center mb-8">
            <i data-lucide="brain-circuit" class="mx-auto text-[#4285f4] dark:text-[#a8c7fa] w-10 h-10 mb-4"></i>
            <h2 class="text-2xl font-medium tracking-tight text-slate-900 dark:text-white mb-2 font-display">Create Account</h2>
            <p class="text-slate-500 dark:text-gray-400 text-sm">Join the future of document intelligence</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 ml-1 mb-1.5">Email Address</label>
                <input id="email" type="email" placeholder="student@example.com" class="w-full px-5 py-3.5 rounded-xl bg-transparent border border-gray-300 dark:border-[#444746] text-slate-900 dark:text-white placeholder-gray-500 focus:outline-none focus:border-[#0b57d0] dark:focus:border-[#a8c7fa] focus:ring-1 focus:ring-[#0b57d0] dark:focus:ring-[#a8c7fa] transition-all text-sm">
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 ml-1 mb-1.5">Password</label>
                <div class="relative">
                    <input id="password" type="password" placeholder="Min. 8 characters" class="w-full px-5 py-3.5 rounded-xl bg-transparent border border-gray-300 dark:border-[#444746] text-slate-900 dark:text-white placeholder-gray-500 focus:outline-none focus:border-[#0b57d0] dark:focus:border-[#a8c7fa] focus:ring-1 focus:ring-[#0b57d0] dark:focus:ring-[#a8c7fa] transition-all text-sm pr-12">
                    <button type="button" onclick="togglePassword('password', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
                
                <div id="passwordRules" class="mt-3 ml-1 space-y-2">
                    <div id="rule-length" class="flex items-center gap-2 text-[11px] font-medium text-gray-500 dark:text-gray-400 transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-gray-300 dark:text-[#444746]"></i>
                        <span>8+ characters</span>
                    </div>
                    <div id="rule-letter" class="flex items-center gap-2 text-[11px] font-medium text-gray-500 dark:text-gray-400 transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-gray-300 dark:text-[#444746]"></i>
                        <span>At least one letter</span>
                    </div>
                    <div id="rule-number" class="flex items-center gap-2 text-[11px] font-medium text-gray-500 dark:text-gray-400 transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-gray-300 dark:text-[#444746]"></i>
                        <span>At least one number</span>
                    </div>
                    <div id="rule-symbol" class="flex items-center gap-2 text-[11px] font-medium text-gray-500 dark:text-gray-400 transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-gray-300 dark:text-[#444746]"></i>
                        <span>Special symbol (@$!%*#?&)</span>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 ml-1 mb-1.5">Confirm Password</label>
                <div class="relative">
                    <input id="confirmPassword" type="password" placeholder="Repeat password" class="w-full px-5 py-3.5 rounded-xl bg-transparent border border-gray-300 dark:border-[#444746] text-slate-900 dark:text-white placeholder-gray-500 focus:outline-none focus:border-[#0b57d0] dark:focus:border-[#a8c7fa] focus:ring-1 focus:ring-[#0b57d0] dark:focus:ring-[#a8c7fa] transition-all text-sm pr-12">
                    <button type="button" onclick="togglePassword('confirmPassword', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <div class="mt-4 p-4 rounded-xl flex flex-col items-center justify-center bg-gray-50 dark:bg-transparent">
                <div class="cf-turnstile" data-sitekey="0x4AAAAAACuLeZ39cRRtBKwI" data-theme="auto" data-appearance="always" data-compact="false"></div>
            </div>

            <div class="pt-4 flex flex-col gap-3">
                <button id="signupBtn" onclick="signup()" class="w-full bg-[#0b57d0] dark:bg-[#a8c7fa] hover:bg-[#0842a0] dark:hover:bg-[#8ab4f8] text-white dark:text-[#051e49] font-medium py-3 rounded-full transition-all active:scale-95 text-sm">INITIALIZE ACCOUNT</button>
                
                <button onclick="googleLogin()" class="w-full flex items-center justify-center bg-transparent border border-gray-300 dark:border-[#444746] hover:bg-gray-50 dark:hover:bg-[#282a2c] text-slate-700 dark:text-white font-medium py-3 rounded-full transition-all active:scale-95 gap-3 group text-sm">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4">
                    <span>Continue with Google</span>
                </button>
            </div>

            <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
                Already have access? 
                <a href="/app" class="text-[#0b57d0] dark:text-[#a8c7fa] hover:underline font-medium transition-colors">Sign in</a>
            </p>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-[#333537] text-white px-5 py-3 rounded-md shadow-lg opacity-0 transition-opacity duration-300 z-[200] font-medium text-sm pointer-events-none flex items-center gap-2"></div>

    <script>
        // Supabase Initialization
        const supabaseUrl = "https://hffbjtbahfwudigywzzx.supabase.co";
        const supabaseKey = "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        lucide.createIcons();

        // 6️⃣ Toggle Dark and Light Mode Logic
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.setAttribute('data-lucide', 'moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const icon = document.getElementById('themeIcon');

            const passwordInput = document.getElementById("password");
            passwordInput.addEventListener("input", updateRules);
            
            if(icon) {
                if (document.documentElement.classList.contains('dark')) {
                    icon.setAttribute('data-lucide', 'sun');
                } else {
                    icon.setAttribute('data-lucide', 'moon');
                }
            }
        });

        // Toast logic
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerHTML = isError ? `<i data-lucide="alert-circle" class="w-4 h-4 text-red-400"></i> ${message}` : `<i data-lucide="check-circle" class="w-4 h-4 text-[#a8c7fa]"></i> ${message}`;
            lucide.createIcons();
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 3000);
        }

        // Password visibility toggle
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector("i");
            if (input.type === "password") {
                input.type = "text";
                icon.setAttribute("data-lucide", "eye-off");
            } else {
                input.type = "password";
                icon.setAttribute("data-lucide", "eye");
            }
            lucide.createIcons();
        }

        // Password validation logic
        const rules = {
            length: (val) => val.length >= 8,
            letter: (val) => /[a-zA-Z]/.test(val),
            number: (val) => /\d/.test(val),
            symbol: (val) => /[@$!%*#?&]/.test(val)
        };

        function updateRules() {
            const val = document.getElementById("password").value;
            let allValid = true;

            for (const [key, testFn] of Object.entries(rules)) {
                const el = document.getElementById(`rule-${key}`);
                const icon = el.querySelector("i");
                if (testFn(val)) {
                    el.classList.replace("text-gray-500", "text-[#0b57d0]");
                    el.classList.replace("dark:text-gray-400", "dark:text-[#a8c7fa]");
                    icon.setAttribute("data-lucide", "check-circle-2");
                } else {
                    el.classList.replace("text-[#0b57d0]", "text-gray-500");
                    el.classList.replace("dark:text-[#a8c7fa]", "dark:text-gray-400");
                    icon.setAttribute("data-lucide", "circle");
                    allValid = false;
                }
            }
            lucide.createIcons();
            return allValid;
        }

        

        function checkPassword(val) {
            return Object.values(rules).every(fn => fn(val));
        }

        // Registration logic
        async function signup() {
            const btn = document.getElementById("signupBtn");
            const email = document.getElementById("email").value;
            const password = passwordInput.value;
            const confirm = document.getElementById("confirmPassword").value;
            const token = document.querySelector('[name="cf-turnstile-response"]')?.value;

            if (!token) return showToast("⚠️ Complete captcha", true);
            if (!email || !password) return showToast("⚠️ Fill all fields", true);
            if (password !== confirm) return showToast("⚠️ Passwords don't match", true);
            if (!checkPassword(password)) return showToast("⚠️ Use a stronger password", true);

            btn.disabled = true;
            btn.innerText = "INITIALIZING...";

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: { emailRedirectTo: window.location.origin + "/app" }
                });

                if (error) throw error;

                if (data?.user && data.user.identities?.length === 0) {
                    showToast("❌ User already exists. Redirecting...", true);
                    setTimeout(() => window.location.href = "/app?email=" + encodeURIComponent(email), 1500);
                    return;
                }

                showToast("📩 Verification email sent!");
                setTimeout(() => window.location.href = "/app?verify=sent", 2000);

            } catch (err) {
                showToast(`❌ ${err.message}`, true);
                btn.disabled = false;
                btn.innerText = "INITIALIZE ACCOUNT";
                if (window.turnstile) turnstile.reset();
            }
        }

        // Google login
        async function googleLogin() {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: "google",
                options: { redirectTo: window.location.origin + "/app" }
            });

            if (error) showToast("❌ Google login failed", true);
        }

        // Loader
        window.addEventListener('load', () => {
            const loader = document.getElementById('globalLoader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 700);
            }, 800);
        });
    </script>
</body>
</html>
