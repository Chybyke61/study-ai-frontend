<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Study.AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            background-image: radial-gradient(circle at top left, rgba(16, 185, 129, 0.1), transparent), radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.1), transparent);
        }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .neural-btn { background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md animate-in fade-in slide-in-from-bottom-4 duration-500">
        <div class="text-center mb-10">
            <h1 class="font-['Plus_Jakarta_Sans'] text-3xl font-extrabold text-white tracking-tight">Create Identity</h1>
            <p class="text-slate-400 mt-2 text-sm">Start your AI-powered learning journey</p>
        </div>

        <div class="glass p-8 rounded-3xl shadow-2xl">
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase ml-1 mb-2">Email Address</label>
                    <input type="email" id="email" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:ring-2 focus:ring-emerald-500 outline-none transition-all" placeholder="name@example.com">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase ml-1 mb-2">Create Password</label>
                    <input type="password" id="password" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:ring-2 focus:ring-emerald-500 outline-none transition-all" placeholder="Min. 6 characters">
                </div>
                <button type="button" onclick="signup()" id="submitBtn" class="w-full py-4 neural-btn rounded-xl font-bold text-sm text-white hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-emerald-500/20">
                    INITIALIZE ACCOUNT
                </button>
            </div>

            <div class="mt-8 text-center border-t border-slate-800/50 pt-6">
                <p class="text-xs text-slate-500">Already using Study.AI? 
                    <a href="login.html" class="text-emerald-400 font-bold hover:underline ml-1">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <script>
lucide.createIcons();

const supabase = window.supabase.createClient(
  "https://hffbjtbahfwudigywzzx.supabase.co",
  "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5"
);

// ✅ AUTO LOGIN CHECK
async function checkUser() {
    const { data: { session } } = await supabase.auth.getSession();

    if (session) {
        window.location.href = "index.html";
     }
} 

checkUser();

// ✅ SIGNUP HANDLER

    async function signup() {
    const btn = document.getElementById('submitBtn');

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    // simple validation
    if (password.length < 6) {
        showToast("Password must be at least 6 characters");
        return;
    }

    btn.disabled = true;
    btn.innerText = "INITIALIZING...";

    try {
        const { error } = await supabase.auth.signUp({
            email,
            password
        });

        if (error) {
            showToast(error.message);

            btn.disabled = false;
            btn.innerText = "INITIALIZE ACCOUNT";
            return;
        }

        btn.innerText = "SUCCESS ✅";

        setTimeout(() => {
            window.location.href =
                `login.html?email=${encodeURIComponent(email)}&verify=1`;
        }, 1000);

    } catch (err) {
        btn.innerText = "Network error";

        setTimeout(() => {
            btn.disabled = false;
            btn.innerText = "INITIALIZE ACCOUNT";
        }, 2000);
    }
 };
function showToast(msg) {
    const div = document.createElement("div");
    div.innerText = msg;
    div.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-xl text-sm shadow-lg";
    
    document.body.appendChild(div);

    setTimeout(() => div.remove(), 3000);
}

    </script>
</body>
</html>
