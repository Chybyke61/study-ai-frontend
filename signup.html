<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Study.AI | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #020617; 
            color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .btn-emerald { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); 
            transition: all 0.3s ease;
        }
        .btn-emerald:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px -10px #10b981; 
        }
        svg { display: inline-block; vertical-align: middle; }
        /* Smooth transition for OTP step */
        .auth-step { transition: all 0.4s ease; }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="globalLoader" class="fixed inset-0 flex flex-col items-center justify-center bg-[#020617] z-[9999] transition-opacity duration-700">
        <div class="flex flex-col items-center relative z-10">
            <div class="relative w-24 h-24 mb-8">
                <div class="absolute inset-0 border-[3px] border-emerald-500/10 rounded-full"></div>
                <div class="absolute inset-0 border-[3px] border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <i data-lucide="brain-circuit" class="text-emerald-400 w-10 h-10 animate-pulse"></i>
                </div>
            </div>
            <h1 class="text-white font-['Plus_Jakarta_Sans'] font-extrabold text-2xl tracking-tight mb-2">Study.AI</h1>
            <p class="text-slate-500 text-[10px] font-bold tracking-[0.3em] uppercase">Synchronizing Neural Base</p>
        </div>
    </div>

    <div class="glass-card rounded-[2.5rem] p-8 sm:p-10 w-full max-w-md shadow-2xl overflow-hidden">
        
        <div id="step-identity" class="auth-step">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-600/20 border border-emerald-500/30 rounded-2xl mb-6 shadow-xl">
                    <i data-lucide="user-plus" class="text-emerald-400 w-8 h-8"></i>
                </div>
                <h2 class="text-3xl font-extrabold tracking-tight text-white mb-2 font-['Plus_Jakarta_Sans']">Create Identity</h2>
                <p class="text-slate-400 text-sm font-medium">Join the future of document intelligence</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] ml-1 mb-2">Email Address</label>
                    <input id="email" type="email" placeholder="student@example.com" class="w-full px-5 py-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/40 transition-all">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] ml-1 mb-2">Password</label>
                    <div class="relative">
                        <input id="password" type="password" placeholder="Min. 8 characters" class="w-full px-5 py-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/40 transition-all pr-12">
                        <button type="button" onclick="togglePassword('password', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                    
                    <div id="passwordRules" class="mt-4 ml-1 space-y-2.5">
                        <div id="rule-length" class="flex items-center gap-2.5 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]"><i data-lucide="circle" class="w-3 h-3 text-slate-600/80"></i><span>8+ characters</span></div>
                        <div id="rule-letter" class="flex items-center gap-2.5 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]"><i data-lucide="circle" class="w-3 h-3 text-slate-600/80"></i><span>At least one letter</span></div>
                        <div id="rule-number" class="flex items-center gap-2.5 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]"><i data-lucide="circle" class="w-3 h-3 text-slate-600/80"></i><span>At least one number</span></div>
                        <div id="rule-symbol" class="flex items-center gap-2.5 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]"><i data-lucide="circle" class="w-3 h-3 text-slate-600/80"></i><span>Special symbol (@$!%*#?&)</span></div>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] ml-1 mb-2">Confirm Password</label>
                    <div class="relative">
                        <input id="confirmPassword" type="password" placeholder="Repeat password" class="w-full px-5 py-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/40 transition-all pr-12">
                        <button type="button" onclick="togglePassword('confirmPassword', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-start gap-3 px-1 py-2">
                    <input id="termsCheckbox" type="checkbox" class="mt-1 w-4 h-4 rounded border-slate-700 bg-slate-900 text-emerald-500 accent-emerald-500 cursor-pointer">
                    <label for="termsCheckbox" class="text-[10px] font-bold text-slate-500 uppercase leading-tight cursor-pointer">
                        I agree to the <a href="terms.html" class="text-emerald-400 hover:underline">Terms</a> & <a href="privacy.html" class="text-blue-400 hover:underline">Privacy Policy</a>
                    </label>
                </div>

                <div class="p-4 rounded-2xl bg-slate-900/40 border border-slate-800/50 flex flex-col items-center justify-center backdrop-blur-sm">
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAACuLeZ39cRRtBKwI" data-theme="dark"></div>
                </div>

                <button onclick="requestOTP()" id="signupBtn" class="w-full btn-emerald text-white font-bold py-4 rounded-2xl shadow-lg mt-2 active:scale-95 uppercase tracking-widest text-sm">Initialize Account</button>
            </div>

            <div id="social-container">
                <div class="flex items-center my-6">
                    <div class="flex-1 border-t border-slate-800"></div>
                    <span class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest">or</span>
                    <div class="flex-1 border-t border-slate-800"></div>
                </div>

                <button onclick="googleLogin()" class="w-full flex items-center justify-center bg-slate-900/50 hover:bg-slate-800 border border-slate-700 hover:border-slate-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 gap-3 group">
                    <div class="bg-white p-1.5 rounded-xl group-hover:scale-110 transition-transform">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4" alt="Google">
                    </div>
                    <span>Continue with Google</span>
                </button>
            </div>
        </div>

        <div id="step-otp" class="auth-step hidden py-4">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-600/20 border border-emerald-500/30 rounded-2xl mb-6 shadow-xl">
                    <i data-lucide="shield-check" class="text-emerald-400 w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-black text-white font-['Plus_Jakarta_Sans']">Verify Identity</h2>
                <p class="text-slate-400 text-xs font-medium uppercase tracking-widest mt-2">Enter the code sent to your email</p>
            </div>

            <div class="flex justify-between gap-2 mb-8" id="otp-inputs">
                <input type="text" maxlength="1" class="otp-field w-12 h-14 bg-slate-900/50 border border-slate-800 text-center text-xl font-bold text-emerald-400 rounded-xl focus:border-emerald-500 outline-none transition-all">
                <input type="text" maxlength="1" class="otp-field w-12 h-14 bg-slate-900/50 border border-slate-800 text-center text-xl font-bold text-emerald-400 rounded-xl focus:border-emerald-500 outline-none transition-all">
                <input type="text" maxlength="1" class="otp-field w-12 h-14 bg-slate-900/50 border border-slate-800 text-center text-xl font-bold text-emerald-400 rounded-xl focus:border-emerald-500 outline-none transition-all">
                <input type="text" maxlength="1" class="otp-field w-12 h-14 bg-slate-900/50 border border-slate-800 text-center text-xl font-bold text-emerald-400 rounded-xl focus:border-emerald-500 outline-none transition-all">
                <input type="text" maxlength="1" class="otp-field w-12 h-14 bg-slate-900/50 border border-slate-800 text-center text-xl font-bold text-emerald-400 rounded-xl focus:border-emerald-500 outline-none transition-all">
                <input type="text" maxlength="1" class="otp-field w-12 h-14 bg-slate-900/50 border border-slate-800 text-center text-xl font-bold text-emerald-400 rounded-xl focus:border-emerald-500 outline-none transition-all">
            </div>

            <button onclick="verifyAndSignUp()" id="verifyBtn" class="w-full btn-emerald text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 uppercase tracking-widest text-sm">Verify & Finalize</button>
            
            <button onclick="location.reload()" class="w-full mt-6 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] hover:text-white transition-colors">Back to Information</button>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-800/50 text-center text-sm">
            <span class="text-slate-500">Already a member?</span> 
            <a href="/app" class="text-emerald-400 font-bold hover:underline ml-1">Sign In</a>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-all duration-300 z-[100] font-bold text-sm pointer-events-none border border-slate-700"></div>

    <script>
        const supabaseUrl = "https://hffbjtbahfwudigywzzx.supabase.co";
        const supabaseKey = "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        lucide.createIcons();

        function showToast(message, isError = false) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.style.borderColor = isError ? "#ef4444" : "#10b981";
            toast.style.color = isError ? "#f87171" : "#10b981";
            toast.classList.replace("opacity-0", "opacity-100");
            setTimeout(() => { toast.classList.replace("opacity-100", "opacity-0"); }, 3000);
        }

        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const currentIcon = btn.querySelector("svg");
            input.type = input.type === "password" ? "text" : "password";
            const newIcon = input.type === "password" ? "eye" : "eye-off";
            const iconEl = document.createElement("i");
            iconEl.setAttribute("data-lucide", newIcon);
            btn.innerHTML = ''; btn.appendChild(iconEl);
            lucide.createIcons({ root: btn });
        }

        // Real-time Rule Validation
        document.getElementById("password").addEventListener("input", (e) => {
            const val = e.target.value;
            const updateRule = (id, valid) => {
                const el = document.getElementById(id);
                const icon = el.querySelector("svg");
                el.className = `flex items-center gap-2.5 text-[10px] font-bold uppercase tracking-[0.2em] transition-all duration-300 ${valid ? 'text-emerald-400' : 'text-slate-500'}`;
                const newIcon = document.createElement("i");
                newIcon.setAttribute("data-lucide", valid ? "check-circle" : "circle");
                newIcon.className = `w-3 h-3 ${valid ? 'text-emerald-500' : 'text-slate-600/80'}`;
                el.replaceChild(newIcon, el.children[0]);
                lucide.createIcons({ root: el });
            };
            updateRule("rule-length", val.length >= 8);
            updateRule("rule-letter", /[A-Za-z]/.test(val));
            updateRule("rule-number", /\d/.test(val));
            updateRule("rule-symbol", /[@$!%*#?&]/.test(val));
        });

        // OTP Auto-focus
        const otpFields = document.querySelectorAll('.otp-field');
        otpFields.forEach((f, i) => {
            f.oninput = () => { if(f.value && i < 5) otpFields[i+1].focus(); };
            f.onkeydown = (e) => { if(e.key === 'Backspace' && !f.value && i > 0) otpFields[i-1].focus(); };
        });

        async function requestOTP() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirmPassword").value;
            const turnstile = document.querySelector('[name="cf-turnstile-response"]')?.value;
            const terms = document.getElementById("termsCheckbox").checked;

            if (!terms) return showToast("⚠️ Agree to Terms & Privacy", true);
            if (!turnstile) return showToast("⚠️ Please verify you're human", true);
            if (!email || !password || !confirm) return showToast("⚠️ Fill all fields", true);
            if (password !== confirm) return showToast("❌ Passwords do not match", true);
            
            const btn = document.getElementById("signupBtn");
            btn.disabled = true; btn.innerText = "REQUESTING CODE...";

            try {
                const res = await fetch(`${supabaseUrl}/functions/v1/send-otp`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });
                const result = await res.json();
                if (result.error) throw new Error(result.error);

                showToast("📩 OTP sent to your inbox");
                document.getElementById('step-identity').classList.add('hidden');
                document.getElementById('step-otp').classList.remove('hidden');
            } catch (err) {
                showToast(`❌ ${err.message}`, true);
                btn.disabled = false; btn.innerText = "INITIALIZE ACCOUNT";
                if (window.turnstile) turnstile.reset();
            }
        }

        async function verifyAndSignUp() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const code = Array.from(otpFields).map(f => f.value).join('');

            if (code.length < 6) return showToast("⚠️ Enter 6-digit code", true);

            const btn = document.getElementById("verifyBtn");
            btn.disabled = true; btn.innerText = "VERIFYING...";

            try {
                // Verify via your custom Edge Function / Table
                const verifyRes = await fetch(`${supabaseUrl}/rest/v1/otp_codes?email=eq.${email}&code=eq.${code}`, {
                    headers: { "apikey": supabaseKey, "Authorization": `Bearer ${supabaseKey}` }
                });
                const verifyData = await verifyRes.json();
                if (verifyData.length === 0) throw new Error("Invalid OTP");

                // Proceed with Supabase Auth
                const { error } = await supabaseClient.auth.signUp({
                    email, password, options: { emailRedirectTo: window.location.origin + "/app" }
                });
                if (error) throw error;

                showToast("🎉 Account created!");
                setTimeout(() => window.location.href = "/app?verify=sent", 2000);
            } catch (err) {
                showToast(`❌ ${err.message}`, true);
                btn.disabled = false; btn.innerText = "VERIFY & FINALIZE";
            }
        }

        async function googleLogin() {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: "google", options: { redirectTo: window.location.origin + "/app" }
            });
            if (error) showToast("❌ Google login failed", true);
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('globalLoader').style.opacity = '0';
                setTimeout(() => document.getElementById('globalLoader').style.display = 'none', 700);
            }, 800);
        };
    </script>
</body>
</html>
