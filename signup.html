<!DOCTYPE html>
<html>
<head>
<title>Signup | Study.AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body{background:#020617;color:white;font-family:Inter;}
.glass{background:rgba(15,23,42,.6);backdrop-filter:blur(20px);}
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="glass p-10 rounded-3xl w-full max-w-md">
<h2 class="text-2xl font-bold mb-6 text-center">Create Account</h2>

<input id="email" placeholder="Email" class="w-full p-3 mb-4 bg-slate-900 rounded-xl">
<input id="password" type="password" placeholder="Password" class="w-full p-3 mb-6 bg-slate-900 rounded-xl">

<button onclick="signup()" id="btn" class="w-full bg-emerald-600 p-3 rounded-xl">Create Account</button>

<p class="text-center mt-4 text-sm">
<a href="login.html">Login</a>
</p>
</div>

<script>
const supabase=window.supabase.createClient(
"https://hffbjtbahfwudigywzzx.supabase.co",
"sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5"
);

async function signup(){
const btn=document.getElementById("btn");
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();

if(!email||password.length<6) return alert("Invalid input");

btn.innerText="Creating...";

const {error}=await supabase.auth.signUp({email,password});

if(error){
alert(error.message);
btn.innerText="Create Account";
return;
}

alert("Check your email 📩");
location.href="login.html";
}
</script>

</body>
</html>
