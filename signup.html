<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account - Study.AI</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-slate-950 p-4 font-sans text-slate-100">

    <div class="bg-slate-800/40 backdrop-blur-xl border border-slate-700/50 rounded-3xl p-8 sm:p-10 w-full max-w-md shadow-2xl">

        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold tracking-tight text-white mb-2">Join Study.AI</h2>
            <p class="text-slate-400 text-sm">Create your account to get started.</p>
        </div>

        <div class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-1.5 ml-1">Email</label>
                <input 
                    id="email"
                    type="email"
                    placeholder="you@example.com"
                    class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all duration-200"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5 ml-1">Password</label>
                <input 
                    id="password"
                    type="password"
                    placeholder="Create a password"
                    class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all duration-200"
                >
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-slate-300 mb-1.5 ml-1">Confirm Password</label>
                <input 
                    id="confirmPassword"
                    type="password"
                    placeholder="Repeat your password"
                    class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all duration-200"
                >
            </div>
        </div>

        <div class="mt-8 space-y-4">
            <button 
                onclick="signUp()" 
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-indigo-600/20 transition-all duration-200 active:scale-[0.98]"
            >
                Create Account
            </button>

            <button 
                onclick="window.location.href='index.html'" 
                class="w-full bg-transparent border border-slate-600 hover:bg-slate-700/50 text-slate-300 font-medium py-3 px-4 rounded-xl transition-all duration-200 active:scale-[0.98]"
            >
                Back to Login
            </button>
        </div>

    </div>

    <script>
        const supabaseUrl = "https://hffbjtbahfwudigywzzx.supabase.co"
        const supabaseKey = "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5"

        const supabaseClient = supabase.createClient(
            supabaseUrl,
            supabaseKey
        )

        async function signUp(){
            const email = document.getElementById("email").value
            const password = document.getElementById("password").value
            const confirm = document.getElementById("confirmPassword").value

            if(!email || !password || !confirm){
                alert("Please fill all fields")
                return
            }

            if(password !== confirm){
                alert("Passwords do not match")
                return
            }

            const { error } = await supabaseClient.auth.signUp({
                email: email,
                password: password
            })

            if(error){
                alert(error.message)
                return
            }

            await supabaseClient.auth.signOut() // Sign out immediately to prevent auto-login

            alert("Account created successfully. Please login.")
            window.location.href = "index.html?email=" + encodeURIComponent(email)
        }
    </script>

</body>
</html>
