<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Study.AI | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        }
        
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            cyan: '#06b6d4',     /* Vibrant Cyan */
                            violet: '#8b5cf6',   /* Deep Violet */
                            darkBg: '#09090b',   /* Zinc 950 */
                            darkSurface: '#18181b', /* Zinc 900 */
                            darkBorder: '#27272a',  /* Zinc 800 */
                            lightBg: '#fafafa',  /* Zinc 50 */
                            lightSurface: '#ffffff', /* White */
                            lightBorder: '#e4e4e7', /* Zinc 200 */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-attachment: fixed;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* Premium Gradient Backgrounds matching App */
        .dark body {
            background: radial-gradient(circle at top right, #18181b, #09090b 40%);
            color: #e4e4e7;
            min-height: 100vh;
        }
        
        body {
            background: radial-gradient(circle at top right, #f4f4f5, #fafafa 40%);
            color: #09090b;
            min-height: 100vh;
        }

        /* Glassmorphism helpers */
        .glass-panel {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        svg { display: inline-block; vertical-align: middle; }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <div id="globalLoader" class="fixed inset-0 z-[200] flex flex-col items-center justify-center bg-white dark:bg-[#09090b] transition-opacity duration-700">
        <div class="flex flex-col items-center">
            <div class="relative flex items-center justify-center w-16 h-16 mb-6">
                <i data-lucide="brain-circuit" class="w-10 h-10 text-[#06b6d4] animate-pulse"></i>
            </div>
            <h2 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-white mb-4 font-display">Study.AI</h2>
            <div class="flex items-center gap-2 mb-4">
                <div class="w-1.5 h-1.5 rounded-full bg-[#06b6d4] animate-bounce" style="animation-delay: 0s;"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-[#8b5cf6] animate-bounce" style="animation-delay: 0.15s;"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-[#ec4899] animate-bounce" style="animation-delay: 0.3s;"></div>
            </div>
            <p class="text-xs font-medium text-zinc-500 dark:text-zinc-400">Initializing Workspace...</p>
        </div>
    </div>

     <div class="fixed top-4 right-4 z-50 flex items-center gap-2 scale-90 sm:scale-100">
        <a href="/" class="p-2.5 rounded-xl bg-white dark:bg-[#18181b] hover:bg-zinc-100 dark:hover:bg-[#27272a] border border-zinc-200 dark:border-[#27272a] transition-all text-zinc-600 dark:text-zinc-300 shadow-sm flex items-center justify-center" title="Return to Home">
            <i data-lucide="home" class="w-5 h-5"></i>
        </a>
        
        <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-white dark:bg-[#18181b] hover:bg-zinc-100 dark:hover:bg-[#27272a] border border-zinc-200 dark:border-[#27272a] transition-all text-zinc-600 dark:text-zinc-300 shadow-sm flex items-center justify-center" title="Toggle Theme">
            <i id="themeIcon" data-lucide="sun" class="w-5 h-5"></i>
        </button>
     </div>
    
    <div class="glass-panel bg-white/80 dark:bg-[#18181b]/80 rounded-3xl p-8 sm:p-10 w-full max-w-[420px] shadow-xl border border-zinc-200/50 dark:border-[#27272a]/50">
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto bg-gradient-to-tr from-cyan-500/10 to-violet-500/10 dark:from-cyan-500/20 dark:to-violet-500/20 rounded-2xl flex items-center justify-center mb-4">
                <i data-lucide="brain-circuit" class="text-[#06b6d4] w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-white mb-2 font-display">Create Account</h2>
            <p class="text-zinc-500 dark:text-zinc-400 text-sm">Join the future of document intelligence</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-zinc-700 dark:text-zinc-300 ml-1 mb-1.5">Email Address</label>
                <input id="email" type="email" placeholder="student@example.com" class="w-full px-5 py-3.5 rounded-xl bg-white dark:bg-[#09090b] border border-zinc-200 dark:border-[#27272a] text-zinc-900 dark:text-white placeholder-zinc-400 focus:outline-none focus:border-[#06b6d4] dark:focus:border-[#06b6d4] focus:ring-1 focus:ring-[#06b6d4] transition-all text-sm">
            </div>

            <div>
                <label class="block text-xs font-medium text-zinc-700 dark:text-zinc-300 ml-1 mb-1.5">Password</label>
                <div class="relative">
                    <input id="password" type="password" placeholder="Min. 8 characters" class="w-full px-5 py-3.5 rounded-xl bg-white dark:bg-[#09090b] border border-zinc-200 dark:border-[#27272a] text-zinc-900 dark:text-white placeholder-zinc-400 focus:outline-none focus:border-[#06b6d4] dark:focus:border-[#06b6d4] focus:ring-1 focus:ring-[#06b6d4] transition-all text-sm pr-12">
                    <button type="button" onclick="togglePassword('password', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-200 transition-colors">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
                
                <div id="passwordRules" class="mt-3 ml-1 space-y-2">
                    <div id="rule-length" class="flex items-center gap-2 text-[11px] font-medium text-zinc-500 dark:text-zinc-400 transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3"></i>
                        <span>8+ characters</span>
                    </div>
                    <div id="rule-letter" class="flex items-center gap-2 text-[11px] font-medium text-zinc-500 dark:text-zinc-400 transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3"></i>
                        <span>At least one letter</span>
                    </div>
                    <div id="rule-number" class="flex items-center gap-2 text-[11px] font-medium text-zinc-500 dark:text-zinc-400 transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3"></i>
                        <span>At least one number</span>
                    </div>
                    <div id="rule-symbol" class="flex items-center gap-2 text-[11px] font-medium text-zinc-500 dark:text-zinc-400 transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3"></i>
                        <span>Special symbol (@$!%*#?&)</span>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-zinc-700 dark:text-zinc-300 ml-1 mb-1.5">Confirm Password</label>
                <div class="relative">
                    <input id="confirmPassword" type="password" placeholder="Repeat password" class="w-full px-5 py-3.5 rounded-xl bg-white dark:bg-[#09090b] border border-zinc-200 dark:border-[#27272a] text-zinc-900 dark:text-white placeholder-zinc-400 focus:outline-none focus:border-[#06b6d4] dark:focus:border-[#06b6d4] focus:ring-1 focus:ring-[#06b6d4] transition-all text-sm pr-12">
                    <button type="button" onclick="togglePassword('confirmPassword', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-200 transition-colors">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <div class="mt-4 p-4 rounded-xl flex flex-col items-center justify-center bg-zinc-50 dark:bg-transparent">
                <div class="cf-turnstile" data-sitekey="0x4AAAAAACuLeZ39cRRtBKwI" data-theme="auto" data-appearance="always" data-compact="false"></div>
            </div>

            <div class="pt-4 flex flex-col gap-3">
                <button id="signupBtn" onclick="signup()" class="w-full bg-gradient-to-r from-[#06b6d4] to-[#8b5cf6] hover:opacity-90 text-white font-medium py-3 rounded-xl transition-all active:scale-95 text-sm shadow-md">INITIALIZE ACCOUNT</button>
                
                <button onclick="googleLogin()" class="w-full flex items-center justify-center bg-white dark:bg-[#18181b] border border-zinc-200 dark:border-[#27272a] hover:bg-zinc-50 dark:hover:bg-[#27272a] text-zinc-700 dark:text-white font-medium py-3 rounded-xl transition-all active:scale-95 gap-3 group text-sm shadow-sm">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4">
                    <span>Continue with Google</span>
                </button>
            </div>

            <p class="text-center text-sm text-zinc-500 dark:text-zinc-400 mt-6">
                Already have access? 
                <a href="/app" class="text-[#06b6d4] hover:underline font-medium transition-colors">Sign in</a>
            </p>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 px-6 py-3 rounded-xl shadow-xl opacity-0 transition-opacity duration-300 z-[200] font-semibold text-sm pointer-events-none flex items-center gap-2 border border-zinc-800 dark:border-zinc-200"></div>

    <script>
        const supabaseUrl = "https://hffbjtbahfwudigywzzx.supabase.co";
        const supabaseKey = "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            // Update the theme toggle icon specifically
            const newIcon = document.getElementById('themeIcon');
            newIcon.setAttribute('data-lucide', html.classList.contains('dark') ? 'sun' : 'moon');
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const passwordInput = document.getElementById("password");
            passwordInput.addEventListener("input", updateRules);

            const confirmInput = document.getElementById("confirmPassword");

            confirmInput.addEventListener("input", function () {
                const password = document.getElementById("password").value;
                const confirm = this.value;

                if (confirm === "") {
                    this.classList.remove("border-red-500", "border-green-500", "focus:border-red-500", "focus:border-green-500", "focus:ring-red-500", "focus:ring-green-500");
                } else if (confirm === password) {
                    this.classList.add("border-green-500", "focus:border-green-500", "focus:ring-green-500");
                    this.classList.remove("border-red-500", "focus:border-red-500", "focus:ring-red-500");
                } else {
                    this.classList.add("border-red-500", "focus:border-red-500", "focus:ring-red-500");
                    this.classList.remove("border-green-500", "focus:border-green-500", "focus:ring-green-500");
                }
            });
            
            // Initial theme icon sync
            const icon = document.getElementById('themeIcon');
            if(icon) {
                icon.setAttribute('data-lucide', document.documentElement.classList.contains('dark') ? 'sun' : 'moon');
                lucide.createIcons();
            }
        });

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerHTML = isError ? `<i data-lucide="alert-circle" class="w-4 h-4 text-red-500"></i> ${message}` : `<i data-lucide="check-circle" class="w-4 h-4 text-[#06b6d4]"></i> ${message}`;
            lucide.createIcons();
            toast.classList.replace("opacity-0", "opacity-100");
            setTimeout(() => { toast.classList.replace("opacity-100", "opacity-0"); }, 3000);
        }

        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const iconEl = btn.querySelector('[data-lucide]');
            const isPassword = input.type === "password";
            
            input.type = isPassword ? "text" : "password";
            // Replace inner content to allow Lucide to re-render correctly
            btn.innerHTML = `<i data-lucide="${isPassword ? 'eye-off' : 'eye'}" class="w-5 h-5"></i>`;
            lucide.createIcons();
        }

        const rules = {
            length: (val) => val.length >= 8,
            letter: (val) => /[a-zA-Z]/.test(val),
            number: (val) => /\d/.test(val),
            symbol: (val) => /[@$!%*#?&]/.test(val)
        };

        function updateRules() {
            const val = document.getElementById("password").value;

            for (const key in rules) {
                const el = document.getElementById(`rule-${key}`);
                const iconContainer = el.querySelector('[data-lucide]');
                const isValid = rules[key](val);

                if (isValid) {
                    el.classList.add("text-[#06b6d4]", "dark:text-[#06b6d4]");
                    el.classList.remove("text-zinc-500", "dark:text-zinc-400");
                    if (iconContainer.getAttribute('data-lucide') !== 'check-circle-2') {
                        el.innerHTML = `<i data-lucide="check-circle-2" class="w-3 h-3 text-[#06b6d4] dark:text-[#06b6d4]"></i> <span>${el.querySelector('span').innerText}</span>`;
                    }
                } else {
                    el.classList.remove("text-[#06b6d4]", "dark:text-[#06b6d4]");
                    el.classList.add("text-zinc-500", "dark:text-zinc-400");
                    if (iconContainer.getAttribute('data-lucide') !== 'circle') {
                        el.innerHTML = `<i data-lucide="circle" class="w-3 h-3 text-zinc-300 dark:text-[#444746]"></i> <span>${el.querySelector('span').innerText}</span>`;
                    }
                }
            }
            lucide.createIcons();
        }

        function checkPassword(val) {
            return Object.values(rules).every(fn => fn(val));
        }

        async function signup() {
            const btn = document.getElementById("signupBtn");
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirmPassword").value;
            const token = document.querySelector('[name="cf-turnstile-response"]')?.value;

            if (!token) return showToast("Complete captcha", true);
            if (!email || !password) return showToast("Fill all fields", true);
            if (password !== confirm) return showToast("Passwords don't match", true);
            if (!checkPassword(password)) return showToast("Use a stronger password", true);

            btn.disabled = true;
            btn.innerText = "INITIALIZING...";

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: { emailRedirectTo: window.location.origin + "/app" }
                });

                if (error) throw error;

                if (data?.user && data.user.identities?.length === 0) {
                    showToast("User already exists. Redirecting...", true);
                    setTimeout(() => window.location.href = "/app?email=" + encodeURIComponent(email), 1500);
                    return;
                }

                showToast("Verification email sent!");
                setTimeout(() => window.location.href = "/app?verify=sent", 2000);

            } catch (err) {
                showToast(`${err.message}`, true);
                btn.disabled = false;
                btn.innerText = "INITIALIZE ACCOUNT";
                if (window.turnstile) turnstile.reset();
            }
        }

        async function googleLogin() {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: "google",
                options: { redirectTo: window.location.origin + "/app" }
            });
            if (error) showToast("Google login failed", true);
        }

        window.addEventListener('load', () => {
            const loader = document.getElementById('globalLoader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 700);
            }, 800);
        });
    </script>
</body>
</html>
