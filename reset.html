<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Study.AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <script>
        // Check local storage for theme preference before page loads to prevent flashing
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        }
        
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            darkBg: '#131314',
                            darkSurface: '#1e1f20',
                            lightBg: '#ffffff',
                            lightSurface: '#f0f4f9',
                            brand: '#a8c7fa',
                            userLight: '#f0f4f9',
                            userDark: '#333537'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Google Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-attachment: fixed;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* Gemini Dark Mode Background */
        .dark body {
            background-color: #131314; 
            color: #e3e3e3;
        }
        
        /* Gemini Light Mode Background */
        body {
            background-color: #ffffff;
            color: #1f1f1f;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <div class="absolute top-6 right-6 z-50">
        <button onclick="toggleTheme()" class="p-2.5 rounded-full bg-white dark:bg-[#1e1f20] hover:bg-gray-100 dark:hover:bg-[#282a2c] border border-gray-200 dark:border-[#444746] transition-all text-gray-600 dark:text-gray-300 shadow-sm" title="Toggle Theme">
            <i id="themeIcon" data-lucide="sun" class="w-5 h-5"></i>
        </button>
    </div>

    <div class="bg-white dark:bg-[#1e1f20] rounded-[2rem] p-8 sm:p-10 w-full max-w-[420px] shadow-sm border border-gray-100 dark:border-[#282a2c] animate-in fade-in zoom-in duration-500">
        <div class="text-center mb-8">
            <i data-lucide="shield-check" class="mx-auto text-[#4285f4] dark:text-[#a8c7fa] w-10 h-10 mb-4"></i>
            <h2 class="text-2xl font-medium tracking-tight text-slate-900 dark:text-white mb-2 font-display">Secure Engine</h2>
            <p class="text-slate-500 dark:text-gray-400 text-sm">Create a new password for your account</p>
        </div>

        <form id="resetForm" class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 ml-1 mb-1.5">Account Email</label>
                <div class="relative group">
                    <input id="userEmail" type="email" readonly class="w-full px-5 py-3.5 rounded-xl bg-gray-50 dark:bg-[#131314] border border-gray-200 dark:border-[#282a2c] text-gray-500 dark:text-gray-400 cursor-not-allowed focus:outline-none italic text-sm transition-all">
                    <div class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 ml-1 mb-1.5">New Password</label>
                <div class="relative">
                    <input id="newPassword" type="password" required placeholder="Min. 8 characters" class="w-full px-5 py-3.5 rounded-xl bg-transparent border border-gray-300 dark:border-[#444746] text-slate-900 dark:text-white placeholder-gray-500 focus:outline-none focus:border-[#0b57d0] dark:focus:border-[#a8c7fa] focus:ring-1 focus:ring-[#0b57d0] dark:focus:ring-[#a8c7fa] transition-all text-sm pr-12">
                    <button type="button" onclick="togglePassword('newPassword', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
                        <i data-lucide="eye"></i>
                    </button>
                </div>

                <div id="passwordRules" class="mt-3 ml-1 space-y-2">
                    <div id="rule-length" class="flex items-center gap-2 text-[11px] font-medium text-gray-500 dark:text-gray-400 transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-gray-300 dark:text-[#444746]"></i>
                        <span>8+ characters</span>
                    </div>
                    <div id="rule-letter" class="flex items-center gap-2 text-[11px] font-medium text-gray-500 dark:text-gray-400 transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-gray-300 dark:text-[#444746]"></i>
                        <span>At least one letter</span>
                    </div>
                    <div id="rule-number" class="flex items-center gap-2 text-[11px] font-medium text-gray-500 dark:text-gray-400 transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-gray-300 dark:text-[#444746]"></i>
                        <span>At least one number</span>
                    </div>
                    <div id="rule-symbol" class="flex items-center gap-2 text-[11px] font-medium text-gray-500 dark:text-gray-400 transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-gray-300 dark:text-[#444746]"></i>
                        <span>Special symbol (@$!%*#?&)</span>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 ml-1 mb-1.5">Confirm Password</label>
                <div class="relative">
                    <input id="confirmPassword" type="password" required placeholder="Repeat password" class="w-full px-5 py-3.5 rounded-xl bg-transparent border border-gray-300 dark:border-[#444746] text-slate-900 dark:text-white placeholder-gray-500 focus:outline-none focus:border-[#0b57d0] dark:focus:border-[#a8c7fa] focus:ring-1 focus:ring-[#0b57d0] dark:focus:ring-[#a8c7fa] transition-all text-sm pr-12">
                    <button type="button" onclick="togglePassword('confirmPassword', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
            </div>

            <div class="mt-4 p-4 rounded-xl flex flex-col items-center justify-center bg-gray-50 dark:bg-transparent">
                <div class="flex items-center gap-2 mb-3 self-start ml-1">
                    <i data-lucide="shield-check" class="w-4 h-4 text-[#4285f4] dark:text-[#a8c7fa]"></i>
                    <label class="text-xs font-medium text-gray-700 dark:text-gray-300">Security Verification</label>
                </div>
                <div class="cf-turnstile" data-sitekey="0x4AAAAAACuLeZ39cRRtBKwI" data-theme="auto" data-appearance="always" data-compact="false"></div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-[#0b57d0] dark:bg-[#a8c7fa] hover:bg-[#0842a0] dark:hover:bg-[#8ab4f8] text-white dark:text-[#051e49] font-medium py-3 rounded-full transition-all active:scale-95 text-sm mt-2">
                UPDATE PASSWORD
            </button>
        </form>

        <div class="mt-6 pt-6 text-center text-sm border-t border-gray-100 dark:border-[#282a2c]">
            <a href="index.html" class="text-gray-500 dark:text-gray-400 hover:text-[#0b57d0] dark:hover:text-[#a8c7fa] font-medium transition-colors flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Sign In
            </a>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-[#333537] text-white px-5 py-3 rounded-md shadow-lg opacity-0 transition-opacity duration-300 z-[200] font-medium text-sm pointer-events-none flex items-center gap-2"></div>

    <script>
        // Theme Toggle Function
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.setAttribute('data-lucide', 'moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        }

        document.addEventListener("DOMContentLoaded", async () => {
            const themeIcon = document.getElementById('themeIcon');
            if(themeIcon) {
                if (document.documentElement.classList.contains('dark')) {
                    themeIcon.setAttribute('data-lucide', 'sun');
                } else {
                    themeIcon.setAttribute('data-lucide', 'moon');
                }
            }

            lucide.createIcons();
            let sessionReady = false;

            const supabase = window.supabase.createClient(
                "https://hffbjtbahfwudigywzzx.supabase.co",
                "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5"
            );

            // Refactored showToast to match app UI styles properly
            function showToast(message, isError = false) {
                const toast = document.getElementById("toast");
                toast.innerHTML = isError ? `<i data-lucide="alert-circle" class="w-4 h-4 text-red-400"></i> ${message}` : `<i data-lucide="check-circle" class="w-4 h-4 text-[#a8c7fa]"></i> ${message}`;
                lucide.createIcons();
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 3000);
            }

            // Updated rule UI handling to match Tailwind generic classes
            function updateRule(id, isValid) {
                const el = document.getElementById(id);
                if (!el) return;
                const currentIcon = el.querySelector("i, svg");
                const newIcon = document.createElement("i");
                newIcon.setAttribute("data-lucide", isValid ? "check-circle-2" : "circle");
                newIcon.className = isValid ? "w-3 h-3 text-[#0b57d0] dark:text-[#a8c7fa]" : "w-3 h-3 text-gray-300 dark:text-[#444746]";
                if (currentIcon) el.replaceChild(newIcon, currentIcon);
                if (isValid) {
                    el.classList.replace("text-gray-500", "text-[#0b57d0]");
                    el.classList.replace("dark:text-gray-400", "dark:text-[#a8c7fa]");
                } else {
                    el.classList.replace("text-[#0b57d0]", "text-gray-500");
                    el.classList.replace("dark:text-[#a8c7fa]", "dark:text-gray-400");
                }
                lucide.createIcons({ root: el });
            }

            document.getElementById("newPassword").addEventListener("input", (e) => {
                const val = e.target.value;
                updateRule("rule-length", val.length >= 8);
                updateRule("rule-letter", /[A-Za-z]/.test(val));
                updateRule("rule-number", /\d/.test(val));
                updateRule("rule-symbol", /[@$!%*#?&]/.test(val));
            });

            async function initSessionFromUrl() {
                const hash = window.location.hash;
                const query = window.location.search;
                let params;
                if (hash && hash.includes("access_token")) {
                    params = new URLSearchParams(hash.substring(1));
                } else if (query && query.includes("access_token")) {
                    params = new URLSearchParams(query);
                }
                if (!params) return;
                const access_token = params.get("access_token");
                const refresh_token = params.get("refresh_token");
                if (!access_token || !refresh_token) return;
                await supabase.auth.setSession({ access_token, refresh_token });
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            await initSessionFromUrl();
            const { data: { session } } = await supabase.auth.getSession();

            if (!session) {
                showToast("❌ Invalid or expired reset link", true);
                return;
            }

            document.getElementById("userEmail").value = session.user.email;
            sessionReady = true;

            const form = document.getElementById("resetForm");
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!sessionReady) return showToast("⏳ Please wait a moment...");

                const btn = document.getElementById('submitBtn');
                const newPassword = document.getElementById("newPassword").value;
                const confirm = document.getElementById("confirmPassword").value;
                const turnstileResponse = document.querySelector('[name="cf-turnstile-response"]')?.value;

                if (!turnstileResponse) return showToast("⚠️ Please verify you're human", true);
                
                const strongPassword = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).{8,}$/;
                if (!strongPassword.test(newPassword)) return showToast("⚠️ Use a stronger password", true);
                if (newPassword !== confirm) return showToast("❌ Passwords do not match", true);

                btn.disabled = true;
                btn.innerText = "UPDATING...";

                const { error } = await supabase.auth.updateUser({ password: newPassword });

                if (error) {
                    showToast(`❌ ${error.message}`, true);
                    btn.disabled = false;
                    btn.innerText = "UPDATE PASSWORD";
                    if (window.turnstile) turnstile.reset();
                    return;
                }

                showToast("✅ Password reset successful, please login");
                await supabase.auth.signOut();
                setTimeout(() => { window.location.href = "/app?reset=success"; }, 2000);
            });
        });

        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const currentIcon = btn.querySelector("i, svg");
            const isPassword = input.type === "password";
            input.type = isPassword ? "text" : "password";
            const newIcon = document.createElement("i");
            newIcon.setAttribute("data-lucide", isPassword ? "eye-off" : "eye");
            btn.replaceChild(newIcon, currentIcon);
            lucide.createIcons({ root: btn });
        }
    </script>
</body>
</html>
