<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Study.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px #6366f1; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <div class="inline-flex p-3 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 mb-4">
                <i data-lucide="brain-circuit" class="text-indigo-400 w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight">Welcome Back</h1>
            <p class="text-slate-400 mt-2">Sign in to access your study engine</p>
        </div>

        <div class="glass p-8 rounded-3xl shadow-2xl">
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1 mb-2">Email Address</label>
                    <input type="email" id="email" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="name@example.com">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1 mb-2">Password</label>
                    <input type="password" id="password" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••">
                </div>
                <button id="loginBtn" onclick="handleLogin()" class="w-full py-4 btn-primary rounded-xl font-bold text-sm shadow-lg">SIGN IN</button>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-800 text-center">
                <p class="text-sm text-slate-400">New here? <a href="signup.html" class="text-indigo-400 font-bold hover:underline">Create an account</a></p>
            </div>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient("https://hffbjtbahfwudigywzzx.supabase.co", "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5");
        lucide.createIcons();

        // Check if redirected from signup
        const params = new URLSearchParams(window.location.search);
        if (params.get('verify')) {
            alert("Registration successful! Please check your email for a verification link, then sign in here.");
            if (params.get('email')) document.getElementById('email').value = params.get('email');
        }

        async function handleLogin() {
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerText = "AUTHENTICATING...";

            const { error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert(error.message);
                btn.disabled = false;
                btn.innerText = "SIGN IN";
            } else {
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
