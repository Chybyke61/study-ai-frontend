<!DOCTYPE html>
<html>
<head>
<title>Login | Study.AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body{background:#020617;color:white;font-family:Inter;}
.glass{background:rgba(15,23,42,.6);backdrop-filter:blur(20px);}
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="glass p-10 rounded-3xl w-full max-w-md">
<h2 class="text-2xl font-bold mb-6 text-center">Welcome Back</h2>

<input id="email" placeholder="Email" class="w-full p-3 mb-4 bg-slate-900 rounded-xl">
<input id="password" type="password" placeholder="Password" class="w-full p-3 mb-6 bg-slate-900 rounded-xl">

<button onclick="login()" id="btn" class="w-full bg-indigo-600 p-3 rounded-xl">Sign In</button>

<p class="text-center mt-4 text-sm">
<a href="signup.html">Create account</a>
</p>
</div>

<script>
const supabase = window.supabase.createClient(
"https://hffbjtbahfwudigywzzx.supabase.co",
"sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5"
);

(async()=>{
const {data:{session}}=await supabase.auth.getSession();
if(session) location.href="index.html";
})();

async function login(){
const btn=document.getElementById("btn");
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();

if(!email||!password) return alert("Fill all fields");

btn.innerText="Signing in...";

const {error}=await supabase.auth.signInWithPassword({email,password});

if(error){
alert(error.message);
btn.innerText="Sign In";
return;
}

location.href="index.html";
}
</script>

</body>
</html>
