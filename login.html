<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Study.AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent), radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.05), transparent);
        }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .neural-btn { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md animate-in fade-in zoom-in duration-500">
        <div class="text-center mb-10">
            <div class="w-12 h-12 neural-btn rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-500/20">
                <i data-lucide="brain-circuit" class="text-white w-7 h-7"></i>
            </div>
            <h1 class="font-['Plus_Jakarta_Sans'] text-3xl font-extrabold text-white tracking-tight">Welcome Back</h1>
            <p class="text-slate-400 mt-2 text-sm">Access your neural study engine</p>
        </div>

        <div class="glass p-8 rounded-3xl shadow-2xl">
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase ml-1 mb-2">Email Address</label>
                    <input type="email" id="email" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="name@example.com">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase ml-1 mb-2">Password</label>
                    <input type="password" id="password" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="••••••••">
                </div>
                <button type="submit" id="submitBtn" class="w-full py-4 neural-btn rounded-xl font-bold text-sm text-white hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-indigo-500/25">
                    SIGN IN TO ENGINE
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-xs text-slate-500">New to Study.AI? 
                    <a href="signup.html" class="text-indigo-400 font-bold hover:underline ml-1">Create Account</a>
                </p>
            </div>
        </div>
    </div>

    <script>
    lucide.createIcons();

    const supabase = window.supabase.createClient(
      "https://hffbjtbahfwudigywzzx.supabase.co",
      "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5"
    );

    // ✅ PREFILL EMAIL
    function prefillEmail() {
        const params = new URLSearchParams(window.location.search);
        const email = params.get("email");

        if (email) {
            document.getElementById("email").value = email;
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }

    // ✅ AUTO LOGIN CHECK
    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();

        if (user) {
            window.location.href = "index.html";
        }
    }

    // ✅ RUN THEM
    prefillEmail();
    checkUser();

    // ✅ LOGIN HANDLER
    document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.innerHTML = `<span class="animate-pulse">AUTHENTICATING...</span>`;

    try {
        const { error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
            btn.innerText = error.message;
            setTimeout(() => {
                btn.innerText = "SIGN IN TO ENGINE";
                btn.disabled = false;
            }, 2000);
        } else {
            window.location.href = "index.html";
        }

    } catch (err) {
        btn.innerText = "Network error";
        setTimeout(() => {
            btn.innerText = "SIGN IN TO ENGINE";
            btn.disabled = false;
        }, 2000);
    }
};
</script>
</body>
</html>
