<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study.AI | Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #020617; 
            color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .btn-emerald { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); 
            transition: all 0.3s ease;
        }
        .btn-emerald:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px -10px #10b981; 
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <nav class="glass-card border-x-0 border-t-0 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-600/20 border border-emerald-500/30 rounded-xl flex items-center justify-center shadow-lg">
                    <i data-lucide="brain-circuit" class="text-emerald-400 w-5 h-5"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tight font-['Plus_Jakarta_Sans'] text-white">Study.AI</span>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="hidden sm:block text-right mr-2">
                    <p class="text-sm font-bold text-white">Student User</p>
                    <p class="text-[10px] text-emerald-400 uppercase tracking-widest">Active Plan</p>
                </div>
                <button onclick="logout()" class="w-10 h-10 rounded-full bg-slate-800/50 border border-slate-700 flex items-center justify-center text-slate-400 hover:text-red-400 hover:border-red-500/50 transition-colors" title="Logout">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto w-full px-6 py-10 flex-grow">
        
        <div class="mb-10">
            <h1 class="text-3xl sm:text-4xl font-extrabold font-['Plus_Jakarta_Sans'] text-white mb-2">Welcome back.</h1>
            <p class="text-slate-400">Pick up where you left off or index new study materials.</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 sm:gap-6 mb-10">
            <div class="glass-card p-5 rounded-[1.5rem] flex items-center gap-4 hover:border-emerald-500/30 transition-colors">
                <div class="w-12 h-12 bg-emerald-500/10 rounded-xl flex items-center justify-center">
                    <i data-lucide="file-text" class="text-emerald-400 w-5 h-5"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Documents</p>
                    <h2 id="docsCount" class="text-2xl font-bold text-white font-['Plus_Jakarta_Sans']">0</h2>
                </div>
            </div>

            <div class="glass-card p-5 rounded-[1.5rem] flex items-center gap-4 hover:border-blue-500/30 transition-colors">
                <div class="w-12 h-12 bg-blue-500/10 rounded-xl flex items-center justify-center">
                    <i data-lucide="message-square-text" class="text-blue-400 w-5 h-5"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Questions</p>
                    <h2 id="questionsCount" class="text-2xl font-bold text-white font-['Plus_Jakarta_Sans']">0</h2>
                </div>
            </div>

            <div class="glass-card p-5 rounded-[1.5rem] flex items-center gap-4 hover:border-indigo-500/30 transition-colors">
                <div class="w-12 h-12 bg-indigo-500/10 rounded-xl flex items-center justify-center">
                    <i data-lucide="help-circle" class="text-indigo-400 w-5 h-5"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Quizzes</p>
                    <h2 id="quizCount" class="text-2xl font-bold text-white font-['Plus_Jakarta_Sans']">0</h2>
                </div>
            </div>

            <div class="glass-card p-5 rounded-[1.5rem] flex items-center gap-4 hover:border-orange-500/30 transition-colors">
                <div class="w-12 h-12 bg-orange-500/10 rounded-xl flex items-center justify-center">
                    <i data-lucide="flame" class="text-orange-400 w-5 h-5"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Streak</p>
                    <h2 id="streakCount" class="text-2xl font-bold text-white font-['Plus_Jakarta_Sans']">1</h2>
                </div>
            </div>
        </div>

        <h3 class="text-lg font-bold font-['Plus_Jakarta_Sans'] text-white mb-4">Quick Actions</h3>
        <div class="grid md:grid-cols-3 gap-4 sm:gap-6 mb-12">
            
            <button onclick="goUpload()" class="btn-emerald p-6 rounded-[1.5rem] text-left group shadow-lg flex flex-col justify-between min-h-[140px]">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <i data-lucide="upload-cloud" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <h4 class="font-bold text-white text-lg font-['Plus_Jakarta_Sans']">Upload Document</h4>
                    <p class="text-emerald-100 text-xs mt-1">Index new textbooks or notes</p>
                </div>
            </button>

            <button onclick="goChat()" class="glass-card p-6 rounded-[1.5rem] text-left group hover:bg-slate-800/50 transition-all flex flex-col justify-between min-h-[140px]">
                <div class="w-10 h-10 bg-blue-500/10 border border-blue-500/20 rounded-xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <i data-lucide="bot" class="text-blue-400 w-5 h-5"></i>
                </div>
                <div>
                    <h4 class="font-bold text-white text-lg font-['Plus_Jakarta_Sans']">Ask Questions</h4>
                    <p class="text-slate-400 text-xs mt-1">Chat with your curriculum</p>
                </div>
            </button>

            <button onclick="generateQuiz()" class="glass-card p-6 rounded-[1.5rem] text-left group hover:bg-slate-800/50 transition-all flex flex-col justify-between min-h-[140px]">
                <div class="w-10 h-10 bg-indigo-500/10 border border-indigo-500/20 rounded-xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <i data-lucide="graduation-cap" class="text-indigo-400 w-5 h-5"></i>
                </div>
                <div>
                    <h4 class="font-bold text-white text-lg font-['Plus_Jakarta_Sans']">Generate Quiz</h4>
                    <p class="text-slate-400 text-xs mt-1">Test your knowledge automatically</p>
                </div>
            </button>

        </div>

        <div class="glass-card p-6 sm:p-8 rounded-[2rem]">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold font-['Plus_Jakarta_Sans'] text-white">Recent Documents</h3>
                <button class="text-xs font-bold text-emerald-400 hover:text-emerald-300 uppercase tracking-widest transition-colors">View All</button>
            </div>
            
            <div id="documents" class="space-y-3">
                
                <div class="text-center py-10 border-2 border-dashed border-slate-700/50 rounded-2xl">
                    <div class="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i data-lucide="inbox" class="text-slate-500 w-5 h-5"></i>
                    </div>
                    <p class="text-slate-400 text-sm font-medium">No documents indexed yet.</p>
                    <p class="text-slate-500 text-xs mt-1 mb-4">Upload your first textbook to begin.</p>
                    <button onclick="goUpload()" class="text-emerald-400 text-sm font-bold hover:underline">Upload File</button>
                </div>

            </div>
        </div>

    </main>

    <script>
        const supabaseUrl = "https://hffbjtbahfwudigywzzx.supabase.co";
        const supabaseKey = "YOUR_KEY";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function checkUser() {
            const { data } = await supabaseClient.auth.getSession();
            if (!data.session) {
                window.location.href = "index.html"; // Redirects to login
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        function goUpload() {
            alert("Upload modal or page opening...");
        }

        function goChat() {
            alert("Routing to Chat interface...");
        }

        function generateQuiz() {
            alert("Routing to Quiz engine...");
        }

        // Initialize user check and icons
        checkUser();
        lucide.createIcons();
    </script>
</body>
</html>
