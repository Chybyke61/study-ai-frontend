<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study.AI | Workspace</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #020617; 
            color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.04) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .btn-emerald { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); 
            transition: all 0.3s ease;
        }
        .btn-emerald:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px -10px #10b981; 
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <nav class="glass-card border-x-0 border-t-0 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-600/20 border border-emerald-500/30 rounded-xl flex items-center justify-center shadow-lg">
                    <i data-lucide="brain-circuit" class="text-emerald-400 w-5 h-5"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tight font-['Plus_Jakarta_Sans'] text-white">Study.AI</span>
            </div>
            
            <div class="flex items-center gap-4">
                <span class="hidden sm:inline-block text-sm font-bold text-slate-300 mr-2" id="userEmailDisplay">student@example.com</span>
                <button onclick="logout()" class="w-10 h-10 rounded-full bg-slate-800/50 border border-slate-700 flex items-center justify-center text-slate-400 hover:text-red-400 hover:border-red-500/50 transition-colors" title="Logout">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto w-full px-4 sm:px-6 py-10 flex-grow">
        
        <div class="mb-10 text-center sm:text-left">
            <h1 class="text-3xl sm:text-4xl font-extrabold font-['Plus_Jakarta_Sans'] text-white mb-2">Your Workspace</h1>
            <p class="text-slate-400">Upload materials, chat with your documents, or generate quizzes.</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-12">
            
            <button onclick="goUpload()" class="btn-emerald p-6 rounded-[1.5rem] text-left group shadow-lg flex flex-col justify-between min-h-[140px] active:scale-95">
                <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <i data-lucide="upload-cloud" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h4 class="font-bold text-white text-lg font-['Plus_Jakarta_Sans']">Upload Textbook</h4>
                    <p class="text-emerald-100 text-xs mt-1">Index a new PDF to your database</p>
                </div>
            </button>

            <button onclick="goChat()" class="glass-card p-6 rounded-[1.5rem] text-left group hover:bg-slate-800/60 hover:border-blue-500/30 transition-all flex flex-col justify-between min-h-[140px] active:scale-95">
                <div class="w-12 h-12 bg-blue-500/10 border border-blue-500/20 rounded-xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <i data-lucide="message-square-text" class="text-blue-400 w-6 h-6"></i>
                </div>
                <div>
                    <h4 class="font-bold text-white text-lg font-['Plus_Jakarta_Sans']">Ask Questions</h4>
                    <p class="text-slate-400 text-xs mt-1">Chat with your indexed materials</p>
                </div>
            </button>

            <button onclick="generateQuiz()" class="glass-card p-6 rounded-[1.5rem] text-left group hover:bg-slate-800/60 hover:border-indigo-500/30 transition-all flex flex-col justify-between min-h-[140px] active:scale-95">
                <div class="w-12 h-12 bg-indigo-500/10 border border-indigo-500/20 rounded-xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <i data-lucide="graduation-cap" class="text-indigo-400 w-6 h-6"></i>
                </div>
                <div>
                    <h4 class="font-bold text-white text-lg font-['Plus_Jakarta_Sans']">Generate Quiz</h4>
                    <p class="text-slate-400 text-xs mt-1">Create practice tests instantly</p>
                </div>
            </button>

        </div>

        <div class="glass-card p-6 sm:p-8 rounded-[2rem]">
            <h3 class="text-lg font-bold font-['Plus_Jakarta_Sans'] text-white mb-6 flex items-center gap-2">
                <i data-lucide="library" class="w-5 h-5 text-emerald-400"></i> Indexed Materials
            </h3>
            
            <div id="documentsList" class="space-y-3">
                
                <div class="flex flex-col sm:flex-row sm:items-center justify-between p-4 rounded-xl bg-slate-900/50 border border-slate-800 hover:border-emerald-500/30 transition-colors group">
                    <div class="flex items-center gap-4 mb-3 sm:mb-0">
                        <div class="w-10 h-10 bg-slate-800 rounded-lg flex items-center justify-center text-slate-400 group-hover:text-emerald-400 transition-colors">
                            <i data-lucide="file-text" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-white">Biology_101_Textbook.pdf</p>
                            <p class="text-xs text-slate-500">Indexed Oct 15 • 420 pages</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 sm:w-auto w-full">
                        <button onclick="goChat()" class="flex-1 sm:flex-none text-xs font-bold bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg transition-colors border border-slate-700">Chat</button>
                        <button onclick="generateQuiz()" class="flex-1 sm:flex-none text-xs font-bold bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg transition-colors border border-slate-700">Quiz</button>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row sm:items-center justify-between p-4 rounded-xl bg-slate-900/50 border border-slate-800 hover:border-emerald-500/30 transition-colors group">
                    <div class="flex items-center gap-4 mb-3 sm:mb-0">
                        <div class="w-10 h-10 bg-slate-800 rounded-lg flex items-center justify-center text-slate-400 group-hover:text-emerald-400 transition-colors">
                            <i data-lucide="file-text" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-white">Lecture_Notes_Week_3.pdf</p>
                            <p class="text-xs text-slate-500">Indexed Oct 18 • 15 pages</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 sm:w-auto w-full">
                        <button onclick="goChat()" class="flex-1 sm:flex-none text-xs font-bold bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg transition-colors border border-slate-700">Chat</button>
                        <button onclick="generateQuiz()" class="flex-1 sm:flex-none text-xs font-bold bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg transition-colors border border-slate-700">Quiz</button>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <script>
        const supabaseUrl = "https://hffbjtbahfwudigywzzx.supabase.co";
        const supabaseKey = "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function checkUser() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session) {
        window.location.href = "/";
        return;
    }

    document.getElementById('userEmailDisplay').innerText = session.user.email;
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        function goUpload() {
            alert("Opening upload modal...");
        }

        function goChat() {
            alert("Opening Chat...");
        }

        function generateQuiz() {
            alert("Opening Quiz engine...");
        }

        checkUser();
        lucide.createIcons();
    </script>
</body>
</html>
