<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Study.AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .active-nav { background: rgba(16, 185, 129, 0.1); border-right: 3px solid #10b981; color: #10b981; }
        .sidebar-item:hover { background: rgba(16, 185, 129, 0.05); }
        #drop-zone.dragover { border-color: #10b981; background: rgba(16, 185, 129, 0.05); }
    </style>
</head>
<body class="min-h-screen flex opacity-0 transition-opacity duration-500" id="main-body">

    <aside class="w-64 border-r border-slate-800/50 flex flex-col hidden md:flex">
        <div class="p-6 flex items-center gap-2">
            <div class="w-8 h-8 bg-emerald-600/20 border border-emerald-500/30 rounded-lg flex items-center justify-center">
                <i data-lucide="brain-circuit" class="text-emerald-400 w-5 h-5"></i>
            </div>
            <span class="text-lg font-bold font-['Plus_Jakarta_Sans']">Study.AI</span>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl active-nav"><i data-lucide="layout-dashboard" class="w-5 h-5"></i>Dashboard</a>
            <a href="#" onclick="signOut()" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 sidebar-item mt-20"><i data-lucide="log-out" class="w-5 h-5"></i>Sign Out</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 border-b border-slate-800/50 flex items-center justify-between px-8 bg-[#020617]/50 backdrop-blur-md">
            <h2 class="font-bold text-slate-200">System Status: <span class="text-emerald-400 text-sm" id="upload-status">Ready</span></h2>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-xs font-bold text-white" id="user-email">Loading...</p>
                </div>
                <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center overflow-hidden border border-slate-700">
                    <i data-lucide="user" class="w-5 h-5 text-slate-400"></i>
                </div>
            </div>
        </header>

        <section class="flex-1 overflow-y-auto p-8">
            <div class="max-w-6xl mx-auto">
                
                <div id="drop-zone" class="glass-card mb-8 p-10 rounded-[2rem] border-dashed border-2 border-slate-700 flex flex-col items-center justify-center transition-all">
                    <div class="w-16 h-16 bg-emerald-500/10 rounded-full flex items-center justify-center mb-4">
                        <i data-lucide="upload-cloud" class="text-emerald-400 w-8 h-8"></i>
                    </div>
                    <h3 class="text-xl font-bold mb-2">Upload Study Material</h3>
                    <p class="text-slate-400 text-sm mb-6">PDF, DOCX, or TXT (Max 50MB)</p>
                    <input type="file" id="fileInput" class="hidden" accept=".pdf,.docx,.txt">
                    <button onclick="document.getElementById('fileInput').click()" class="bg-emerald-600 hover:bg-emerald-500 px-8 py-3 rounded-xl font-bold transition-all">Select File</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="glass-card p-6 rounded-2xl">
                        <p class="text-slate-400 text-xs font-bold uppercase mb-2">Storage Used</p>
                        <p class="text-2xl font-bold" id="file-count">0 Files</p>
                    </div>
                    <div class="glass-card p-6 rounded-2xl border-emerald-500/20">
                        <p class="text-emerald-400 text-xs font-bold uppercase mb-2">AI Processing</p>
                        <p class="text-2xl font-bold" id="progress-text">Idle</p>
                    </div>
                </div>

                <div class="glass-card rounded-3xl overflow-hidden">
                    <div class="p-6 border-b border-slate-800/50"><h3 class="font-bold">Library</h3></div>
                    <div id="file-list" class="divide-y divide-slate-800/50">
                        <div class="p-8 text-center text-slate-500">No documents uploaded yet.</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- CONFIGURATION (Matches your app.html) ---
        const SUPABASE_URL = "https://hffbjtbahfwudigywzzx.supabase.co";
        const SUPABASE_KEY = "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5";
        const API_BASE = "https://study-ai-tq7i.onrender.com";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = null;

        // --- AUTH CHECK ---
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = "app.html"; // Redirect to login if no session
                return;
            }
            currentUser = session.user;
            document.getElementById('user-email').innerText = currentUser.email;
            document.getElementById('main-body').classList.remove('opacity-0');
            setupSSE();
        }

        async function signOut() {
            await supabase.auth.signOut();
            window.location.href = "app.html";
        }

        // --- FILE UPLOAD LOGIC (Connects to server.js) ---
        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('userId', currentUser.id);

            document.getElementById('upload-status').innerText = "Uploading...";
            
            try {
                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('upload-status').innerText = "Analyzing...";
                } else {
                    alert("Upload failed: " + result.error);
                }
            } catch (err) {
                console.error(err);
                alert("Server connection failed");
            }
        });

        // --- PROGRESS TRACKING (Connects to server.js /progress) ---
        function setupSSE() {
            const eventSource = new EventSource(`${API_BASE}/progress?userId=${currentUser.id}`);
            
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const progressDisplay = document.getElementById('progress-text');
                const statusDisplay = document.getElementById('upload-status');

                if (data.status === 'processing') {
                    progressDisplay.innerText = `${data.progress}%`;
                    statusDisplay.innerText = `Reading: ${data.filename}`;
                } else if (data.status === 'completed') {
                    progressDisplay.innerText = "Done";
                    statusDisplay.innerText = "Ready";
                    // Add logic here to refresh file list
                }
            };
        }

        // Initialize
        checkSession();
        lucide.createIcons();
    </script>
</body>
</html>
