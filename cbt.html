<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study.AI CBT</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
body {
  font-family: Inter, sans-serif;
  /* Deep dark blue Study.AI radial gradient */
  background: radial-gradient(circle at top right, #0B1120, #04060A 60%);
  background-attachment: fixed;
}
/* Custom scrollbar for the JAMB-style palette */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
</style>
</head>
<body class="text-white min-h-screen p-4 md:p-6 flex justify-center items-start">
<div class="w-full max-w-6xl mt-4">

<div class="flex justify-between items-center mb-6 bg-slate-900/40 backdrop-blur-xl p-4 md:px-6 rounded-2xl border border-white/10 shadow-lg">
  <h1 class="text-xl md:text-2xl font-bold flex items-center gap-3 bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-violet-400">
    <i data-lucide="brain-circuit" class="text-cyan-400 w-7 h-7"></i>
    Study.AI CBT
  </h1>
  <div class="bg-slate-950/50 px-4 py-2 rounded-xl border border-slate-800 flex items-center gap-2 shadow-inner">
      <i data-lucide="clock" class="text-cyan-400 w-5 h-5"></i>
      <div id="timer" class="text-cyan-400 font-mono text-lg md:text-xl font-bold">00:00</div>
  </div>
</div>

<div id="setupScreen" class="bg-slate-900/40 backdrop-blur-xl border border-white/10 p-8 rounded-3xl shadow-2xl max-w-md mx-auto mt-12">
  <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-white mb-2">Configure Exam</h2>
      <p class="text-slate-400 text-sm">Set up your CBT parameters</p>
  </div>
  
  <label class="block text-sm font-medium text-slate-300 mb-1.5">Select Textbook</label>
  <select id="bookSelect" class="w-full p-3.5 mb-5 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-cyan-500 text-slate-200 backdrop-blur-sm transition-all"></select>  
  
  <div class="grid grid-cols-2 gap-4 mb-5">
      <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Questions</label>
          <input id="numQ" type="number" value="20" class="w-full p-3.5 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-cyan-500 text-slate-200 backdrop-blur-sm transition-all"/>
      </div>
      <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Time (mins)</label>
          <input id="time" type="number" value="20" class="w-full p-3.5 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-cyan-500 text-slate-200 backdrop-blur-sm transition-all"/>
      </div>
  </div>

  <label class="block text-sm font-medium text-slate-300 mb-1.5">Difficulty</label>
  <select id="difficulty" class="w-full p-3.5 mb-8 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-cyan-500 text-slate-200 backdrop-blur-sm transition-all">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
  </select>  

  <button onclick="startCBT()" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 rounded-xl font-bold text-white shadow-[0_0_20px_rgba(6,182,212,0.25)] transition-all transform hover:scale-[1.02]">
    Start Examination
  </button>
</div>

<div id="examScreen" class="hidden flex flex-col lg:flex-row gap-6">  
  
  <div class="flex-1 flex flex-col gap-4">
      <div class="bg-slate-900/40 backdrop-blur-xl border border-white/10 rounded-3xl p-6 md:p-8 shadow-xl flex-1">
        <div class="flex justify-between items-center mb-6 pb-4 border-b border-white/5">
            <span id="progress" class="bg-cyan-500/10 text-cyan-400 px-4 py-1.5 rounded-lg font-semibold border border-cyan-500/20 text-sm"></span>
            <button onclick="toggleFlag()" class="flex items-center gap-2 bg-yellow-500/10 hover:bg-yellow-500/20 text-yellow-400 px-4 py-1.5 rounded-lg border border-yellow-500/20 transition-all text-sm font-medium">
                <i data-lucide="flag" class="w-4 h-4"></i> Flag 
            </button>
        </div>  
        
        <h3 id="question" class="text-xl md:text-2xl font-medium mb-8 leading-relaxed text-slate-100 min-h-[80px]"></h3>  
        <div id="options" class="flex flex-col gap-3"></div>  
      </div>

      <div class="bg-slate-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4 flex gap-4 shadow-xl">
        <button onclick="prevQuestion()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-200 p-3.5 rounded-xl transition-all border border-slate-700 hover:border-slate-500 font-medium flex justify-center items-center gap-2">
            <i data-lucide="chevron-left" class="w-5 h-5"></i> Previous
        </button>
        <button onclick="nextQuestion()" class="flex-1 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white p-3.5 rounded-xl transition-all shadow-lg shadow-cyan-500/20 font-medium flex justify-center items-center gap-2">
            Next <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
      </div>  
  </div>

  <div class="w-full lg:w-80 flex flex-col gap-4">
      <div class="bg-slate-900/40 backdrop-blur-xl border border-white/10 rounded-3xl p-6 shadow-xl">
          <h4 class="font-semibold mb-4 text-slate-200 flex justify-between items-center">
              Question Map
          </h4>
          <div class="flex gap-3 mb-5 text-xs text-slate-400 font-medium">
             <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-green-500/20 border border-green-500 rounded-[3px]"></div> Answered</div>
             <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-slate-800/40 border border-slate-600 rounded-[3px]"></div> Unanswered</div>
          </div>
          <div id="palette" class="grid grid-cols-5 md:grid-cols-6 lg:grid-cols-5 gap-2 max-h-[300px] lg:max-h-[500px] overflow-y-auto pr-1"></div>
      </div>

      <div class="bg-slate-900/40 backdrop-blur-xl border border-white/10 rounded-2xl p-4 shadow-xl flex flex-col gap-3">
          <button onclick="reviewUnanswered()" class="w-full bg-orange-500/10 hover:bg-orange-500/20 text-orange-400 border border-orange-500/30 p-3.5 rounded-xl transition-all font-medium">Review Unanswered</button>
          <button onclick="openModal()" class="w-full bg-green-600 hover:bg-green-500 text-white p-3.5 rounded-xl transition-all shadow-lg shadow-green-500/20 font-bold">Submit Exam</button>
      </div>
  </div>
</div>

<div id="resultScreen" class="hidden max-w-3xl mx-auto text-center bg-slate-900/40 backdrop-blur-xl border border-white/10 p-8 rounded-3xl shadow-2xl">
  <div class="w-20 h-20 bg-cyan-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-cyan-500/30">
      <i data-lucide="award" class="text-cyan-400 w-10 h-10"></i>
  </div>
  <h2 class="text-2xl font-bold text-white mb-2">Exam Submitted Successfully</h2>
  <p class="text-slate-400 mb-6">Here is your final score</p>
  
  <div class="text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-400 mb-8" id="score"></div>  
  
  <button onclick="showCorrections()" class="bg-slate-800 hover:bg-slate-700 text-white px-6 py-3 rounded-xl border border-slate-700 transition-all font-medium inline-flex items-center gap-2">
    <i data-lucide="check-circle-2" class="w-5 h-5 text-cyan-400"></i> Check Corrections
  </button>  
  
  <div id="corrections" class="hidden mt-8 text-left space-y-4"></div>
</div>

<div id="submitModal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
  <div class="bg-slate-900 border border-white/10 p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full transform scale-100">
    <div class="w-16 h-16 bg-yellow-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-yellow-500/30">
        <i data-lucide="alert-triangle" class="text-yellow-400 w-8 h-8"></i>
    </div>
    <h3 class="text-xl font-bold text-white mb-2">Submit Exam?</h3>
    <p class="text-slate-400 mb-8 text-sm">Are you sure you want to submit? You won't be able to change your answers.</p>
    <div class="flex gap-3">
        <button onclick="closeModal()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-xl transition-all border border-slate-700">Cancel</button>
        <button onclick="submitExam()" class="flex-1 bg-green-600 hover:bg-green-500 text-white py-3 rounded-xl transition-all shadow-lg shadow-green-500/20 font-bold">Yes, Submit</button>
    </div>
  </div>
</div>

</div>

<script>
const api = "https://study-ai-tq7i.onrender.com";

let questions = [], index = 0, score = 0, timer;
let userAnswers = [], flagged = [];

// USER
function getUserId() {
  return localStorage.getItem("studyai_user");
}

// LOAD BOOKS
function loadBooks() {
  const books = JSON.parse(localStorage.getItem("studyai_books")) || [];
  const select = document.getElementById("bookSelect");

  if (!books.length) {
    select.innerHTML = `<option>No books found</option>`;
    return;
  }

  select.innerHTML = `<option value="">Select textbook</option>`;

  books.forEach(book => {
    const name = book.filename || book.name || "File";
    const display = name.includes("_") ? name.split("_").slice(1).join("_") : name;

    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = display;
    select.appendChild(opt);
  });
}

// START CBT
async function startCBT() {
  const userId = getUserId();
  const filename = bookSelect.value;

  if (!userId) return alert("Session expired");
  if (!filename) return alert("Select book");

  const res = await fetch(`${api}/generate-cbt`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-user-id": userId
    },
    body: JSON.stringify({
      filename,
      numQuestions: numQ.value,
      difficulty: difficulty.value
    })
  });

  const data = await res.json();
  questions = parse(data.questions);

  setupScreen.classList.add("hidden");
  examScreen.classList.remove("hidden");
  examScreen.classList.add("flex"); // Enforce flex layout correctly when revealed

  startTimer(time.value * 60);
  showQuestion();
}

// PARSER
function parse(text) {
  return text.split("Question:").slice(1).map(q => {
    const l = q.split("\n").filter(x=>x.trim());
    return {
      question: l[0],
      options: l.slice(1,5),
      answer: l.find(x=>x.includes("Answer")),
      explanation: l.find(x=>x.includes("Explanation"))
    };
  });
}

// SHOW QUESTION
function showQuestion() {
  const q = questions[index];

  question.innerText = q.question;
  progress.innerText = `Question ${index+1} of ${questions.length}`;

  options.innerHTML = "";

  q.options.forEach((opt,i)=>{
    const btn = document.createElement("button");

    let color = "bg-slate-800/40 border-slate-700/50 hover:border-cyan-500/50 text-slate-300 hover:bg-slate-800/80";
    if(userAnswers[index]===i) color="bg-cyan-500/10 border-cyan-500 text-cyan-100 shadow-[0_0_15px_rgba(6,182,212,0.15)]";

    btn.className = `w-full text-left p-4 rounded-xl border transition-all ${color}`;
    btn.innerText = opt;
    btn.onclick = ()=>{userAnswers[index]=i;showQuestion();};

    options.appendChild(btn);
  });

  renderPalette();
}

// PALETTE
function renderPalette(){
  palette.innerHTML="";

  questions.forEach((_,i)=>{
    const btn=document.createElement("button");

    let color="bg-slate-800/40 border-slate-700/50 text-slate-400 hover:bg-slate-700/60";
    if(userAnswers[i]!=null) color="bg-green-500/20 border-green-500/50 text-green-400";
    if(flagged[i]) color="bg-yellow-500/20 border-yellow-500/50 text-yellow-400";
    if(i===index) color="bg-cyan-600 text-white border-cyan-400 shadow-[0_0_10px_rgba(6,182,212,0.4)] transform scale-105";

    btn.className=`p-2.5 rounded-lg border text-sm font-medium transition-all ${color}`;
    btn.innerText=i+1;
    btn.onclick=()=>{index=i;showQuestion();};

    palette.appendChild(btn);
  });
}

// NAV
function nextQuestion(){ if(index<questions.length-1){index++;showQuestion();}}
function prevQuestion(){ if(index>0){index--;showQuestion();}}

// FLAG
function toggleFlag(){ flagged[index]=!flagged[index]; showQuestion(); }

// REVIEW
function reviewUnanswered(){
  let i=userAnswers.findIndex(a=>a==null);
  if(i!==-1){index=i;showQuestion();}
}

// TIMER
function startTimer(sec){
  timer=setInterval(()=>{
    let m=Math.floor(sec/60), s=sec%60;
    document.getElementById("timer").innerText=`${m}:${s<10?"0":""}${s}`;
    sec--;
    if(sec<0) submitExam();
  },1000);
}

// MODAL
function openModal(){submitModal.classList.remove("hidden");}
function closeModal(){submitModal.classList.add("hidden");}

// SUBMIT
function submitExam(){
  clearInterval(timer);

  let correct=0;

  questions.forEach((q,i)=>{
    const correctIndex=q.options.findIndex(o=>q.answer.includes(o));
    if(userAnswers[i]===correctIndex) correct++;
  });

  examScreen.classList.add("hidden");
  examScreen.classList.remove("flex");
  resultScreen.classList.remove("hidden");
  document.getElementById("score").innerText=`${correct} / ${questions.length}`;
}

// CORRECTIONS
function showCorrections(){
  corrections.innerHTML="";
  corrections.classList.remove("hidden");

  questions.forEach((q,i)=>{
    const correctIndex=q.options.findIndex(o=>q.answer.includes(o));

    corrections.innerHTML+=`
      <div class="p-5 bg-slate-800/40 backdrop-blur-sm border border-slate-700/50 rounded-2xl shadow-lg">
        <p class="font-medium text-slate-200 mb-3">${i+1}. ${q.question}</p>
        <div class="space-y-1 text-sm">
            <p class="text-slate-400">Your Answer: <span class="${userAnswers[i]===correctIndex ? 'text-green-400 font-medium' : 'text-red-400 font-medium'}">${q.options[userAnswers[i]]||"None"}</span></p>
            <p class="text-slate-400">Correct Answer: <span class="text-green-400 font-medium">${q.options[correctIndex]}</span></p>
        </div>
        ${q.explanation ? `<div class="mt-4 p-3 bg-slate-900/50 rounded-xl text-sm text-slate-300 border border-white/5"><span class="text-cyan-400 font-medium mr-1">Explanation:</span>${q.explanation.replace('Explanation:', '')}</div>` : ""}
      </div>`;
  });
}

// INIT
loadBooks();
lucide.createIcons();
</script>
</body>
</html>
