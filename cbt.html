<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study.AI CBT</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                colors: {
                    brand: {
                        cyan: '#06b6d4',
                        violet: '#8b5cf6',
                        darkBg: '#09090b',
                        darkSurface: '#18181b',
                        darkBorder: '#27272a'

                },
                fontFamily: {
                    sans: ['Inter', 'sans-serif'],
                    display: ['Outfit', 'sans-serif'],

                animation: {

<style>
body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top right, #18181b, #09090b 40%);
  background-attachment: fixed;
  color: #e4e4e7;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

.glass-panel {
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
}

.signature-text {
    background: -webkit-linear-gradient(45deg, #06b6d4, #8b5cf6);
    -webkit-background-clip: text;

}

/* Loader Styles */
#globalLoader {
    transition: opacity 0.4s ease-out, visibility 0.4s;
}
.loader-ring {
    border-top-color: #06b6d4;
    border-left-color: #8b5cf6;

<div class="w-full max-w-6xl mt-4">

<div class="flex justify-between items-center mb-6 glass-panel bg-[#18181b]/60 p-4 md:px-6 rounded-2xl border border-[#27272a]/50 shadow-lg">

<div id="setupScreen" class="glass-panel bg-[#18181b]/80 border border-[#27272a]/50 p-8 rounded-3xl shadow-2xl max-w-md mx-auto mt-12">
  <div class="text-center mb-8">

      <p class="text-zinc-400 text-sm">Set up your CBT parameters</p>
  </div>
  
  <label class="block text-sm font-medium text-zinc-300 mb-1.5">Select Textbook</label>
  <select id="bookSelect" class="w-full px-5 py-3.5 mb-5 bg-[#09090b] border border-[#27272a] rounded-xl focus:outline-none focus:border-[#06b6d4] focus:ring-1 focus:ring-[#06b6d4] text-white transition-all text-sm"></select>  
  
  <div class="grid grid-cols-2 gap-4 mb-5">
      <div>
          <label class="block text-sm font-medium text-zinc-300 mb-1.5">Questions</label>
          <input id="numQ" type="number" value="20" class="w-full px-5 py-3.5 bg-[#09090b] border border-[#27272a] rounded-xl focus:outline-none focus:border-[#06b6d4] focus:ring-1 focus:ring-[#06b6d4] text-white transition-all text-sm"/>
      </div>
      <div>
          <label class="block text-sm font-medium text-zinc-300 mb-1.5">Time (mins)</label>
          <input id="time" type="number" value="20" class="w-full px-5 py-3.5 bg-[#09090b] border border-[#27272a] rounded-xl focus:outline-none focus:border-[#06b6d4] focus:ring-1 focus:ring-[#06b6d4] text-white transition-all text-sm"/>

  <label class="block text-sm font-medium text-zinc-300 mb-1.5">Difficulty</label>

  <button onclick="startCBT()" class="w-full py-4 bg-gradient-to-r from-[#06b6d4] to-[#8b5cf6] hover:opacity-90 rounded-xl font-bold text-white shadow-md transition-all active:scale-[0.98] text-sm">

  </button>
</div>

<div id="examScreen" class="hidden flex flex-col lg:flex-row gap-6">  
  
  <div class="flex-1 flex flex-col gap-4">
      <div class="glass-panel bg-[#18181b]/80 border border-[#27272a]/50 rounded-3xl p-6 md:p-8 shadow-xl flex-1">
        <div class="flex justify-between items-center mb-6 pb-4 border-b border-[#27272a]">
            <span id="progress" class="bg-[#06b6d4]/10 text-[#06b6d4] px-4 py-1.5 rounded-lg font-semibold border border-[#06b6d4]/20 text-sm"></span>
            <button onclick="toggleFlag()" class="flex items-center gap-2 bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 px-4 py-1.5 rounded-lg border border-amber-500/20 transition-all text-sm font-medium">
                <i data-lucide="flag" class="w-4 h-4"></i> Flag 
            </button>
        </div>  
        
        <h3 id="question" class="text-lg md:text-xl font-medium mb-8 leading-relaxed text-white min-h-[80px]"></h3>  
        <div id="options" class="flex flex-col gap-3"></div>  
      </div>

      <div class="glass-panel bg-[#18181b]/80 border border-[#27272a]/50 rounded-2xl p-4 flex gap-4 shadow-xl">
        <button onclick="prevQuestion()" class="flex-1 bg-zinc-900 hover:bg-zinc-800 text-zinc-200 p-3.5 rounded-xl transition-all border border-[#27272a] font-medium flex justify-center items-center gap-2 text-sm">
            <i data-lucide="chevron-left" class="w-4 h-4"></i> Previous
        </button>
        <button onclick="nextQuestion()" class="flex-1 bg-gradient-to-r from-[#06b6d4] to-[#8b5cf6] hover:opacity-90 text-white p-3.5 rounded-xl transition-all shadow-md font-medium flex justify-center items-center gap-2 text-sm">
            Next <i data-lucide="chevron-right" class="w-4 h-4"></i>
        </button>
      </div>  
  </div>

  <div class="w-full lg:w-80 flex flex-col gap-4">
      <div class="glass-panel bg-[#18181b]/80 border border-[#27272a]/50 rounded-3xl p-6 shadow-xl">
          <h4 class="font-semibold mb-4 text-white flex justify-between items-center font-display">
              Question Map
          </h4>
          <div class="flex gap-3 mb-5 text-xs text-zinc-400 font-medium">
             <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-emerald-500/20 border border-emerald-500/50 rounded-[3px]"></div> Answered</div>
             <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-[#09090b] border border-[#27272a] rounded-[3px]"></div> Unanswered</div>
          </div>
          <div id="palette" class="grid grid-cols-5 md:grid-cols-6 lg:grid-cols-5 gap-2 max-h-[300px] lg:max-h-[500px] overflow-y-auto pr-1"></div>
      </div>

      <div class="glass-panel bg-[#18181b]/80 border border-[#27272a]/50 rounded-2xl p-4 shadow-xl flex flex-col gap-3">
          <button onclick="reviewUnanswered()" class="w-full bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 border border-amber-500/30 p-3.5 rounded-xl transition-all font-medium text-sm">Review Unanswered</button>
          <button onclick="openModal()" class="w-full bg-white text-zinc-900 hover:bg-zinc-200 p-3.5 rounded-xl transition-all shadow-md font-bold text-sm">Submit Exam</button>
      </div>
  </div>
</div>

<div id="resultScreen" class="hidden max-w-3xl mx-auto text-center glass-panel bg-[#18181b]/80 border border-[#27272a]/50 p-8 rounded-3xl shadow-2xl">
  <div class="w-20 h-20 bg-[#06b6d4]/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-[#06b6d4]/20">
      <i data-lucide="award" class="text-[#06b6d4] w-10 h-10"></i>
  </div>
  <h2 class="text-2xl font-bold text-white mb-2 font-display">Exam Submitted</h2>
  <p class="text-zinc-400 mb-6 text-sm">Here is your final score</p>
  
  <div class="text-6xl font-bold font-display signature-text mb-8" id="score"></div>  
  
  <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <button onclick="showCorrections()" class="w-full sm:w-auto bg-zinc-900 hover:bg-zinc-800 text-white px-6 py-3.5 rounded-xl border border-[#27272a] transition-all font-medium inline-flex items-center justify-center gap-2 text-sm">
        <i data-lucide="check-circle-2" class="w-4 h-4 text-[#06b6d4]"></i> Check Corrections
      </button>  
      <button onclick="resetToSetup()" class="w-full sm:w-auto bg-transparent hover:bg-zinc-900 text-zinc-400 hover:text-white px-6 py-3.5 rounded-xl border border-transparent hover:border-[#27272a] transition-all font-medium inline-flex items-center justify-center gap-2 text-sm">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Start New Exam
      </button>
  </div>
  
  <div id="corrections" class="hidden mt-8 text-left space-y-4"></div>
</div>

<div id="submitModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
  <div class="bg-[#18181b] border border-[#27272a] p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full">
    <div class="w-16 h-16 bg-amber-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-amber-500/20">
        <i data-lucide="alert-triangle" class="text-amber-400 w-8 h-8"></i>
    </div>
    <h3 class="text-xl font-bold text-white mb-2 font-display">Submit Exam?</h3>
    <p class="text-zinc-400 mb-8 text-sm">Are you sure you want to submit? You won't be able to change your answers.</p>
    <div class="flex gap-3">
        <button onclick="closeModal()" class="flex-1 bg-[#09090b] hover:bg-zinc-900 text-white py-3 rounded-xl transition-all border border-[#27272a] text-sm font-medium">Cancel</button>
        <button onclick="submitExam()" class="flex-1 bg-white hover:bg-zinc-200 text-zinc-900 py-3 rounded-xl transition-all shadow-md font-bold text-sm">Yes, Submit</button>
    </div>
  </div>
</div>

</div>

<script>
const api = "https://study-ai-tq7i.onrender.com";

let questions = [], index = 0, score = 0, timer;
let userAnswers = [], flagged = [];

// NEW: Loader Controller
function showLoader(text = "Loading...") {
    const loader = document.getElementById('globalLoader');
    document.getElementById('loaderText').innerText = text;
    loader.classList.remove('opacity-0', 'invisible');
    loader.classList.add('opacity-100', 'visible');
}

function hideLoader() {
    const loader = document.getElementById('globalLoader');
    loader.classList.add('opacity-0', 'invisible');
    loader.classList.remove('opacity-100', 'visible');
}

// USER
function getUserId() {
  return localStorage.getItem("studyai_user");
}

// LOAD BOOKS
function loadBooks() {
  const books = JSON.parse(localStorage.getItem("studyai_books")) || [];
  const select = document.getElementById("bookSelect");

  if (!books.length) {
    select.innerHTML = `<option>No books found</option>`;
    return;
  }

  select.innerHTML = `<option value="">Select textbook</option>`;

  books.forEach(book => {
    const name = book.filename || book.name || "File";
    const display = name.includes("_") ? name.split("_").slice(1).join("_") : name;

    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = display;
    select.appendChild(opt);
  });
  
  // Hide initial page loader
  setTimeout(hideLoader, 1000);
}

// START CBT
/*async function startCBT() {
  const userId = getUserId();
  const filename = bookSelect.value;

  if (!userId) return alert("Session expired");
  if (!filename) return alert("Select book");

  showLoader("Generating Questions...");

  try {
    const res = await fetch(`${api}/generate-cbt`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-id": userId
      },
      body: JSON.stringify({
        filename,
        numQuestions: numQ.value,
        difficulty: difficulty.value
      })
    });

    const data = await res.json();
    questions = parse(data.questions);

    setupScreen.classList.add("hidden");
    examScreen.classList.remove("hidden");
    examScreen.classList.add("flex");

    startTimer(time.value * 60);
    showQuestion();
    hideLoader();
  } catch (err) {
    alert("Error loading quiz");
    hideLoader();
  }
}*/

    async function startCBT() {
  const userId = getUserId();
  const filename = bookSelect.value;

  if (!userId) return alert("Session expired");
  if (!filename) return alert("Select book");

  try {
    const res = await fetch(`${api}/generate-cbt`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-user-id": userId
      },
      body: JSON.stringify({
        filename,
        numQuestions: numQ.value,
        difficulty: difficulty.value
      })
    });

    if (!res.ok) throw new Error("Server error");

    const data = await res.json();

    if (!data.questions) throw new Error("No questions generated");

    questions = parseQuestions(data.questions);

    if (!questions.length) throw new Error("Parsing failed");

    setupScreen.classList.add("hidden");
    examScreen.classList.remove("hidden");
    examScreen.classList.add("flex");

    startTimer(time.value * 60);
    showQuestion();

  } catch (err) {
    console.error(err);
    alert("⚠️ Failed to generate CBT.\nPossible causes:\n- API limit reached\n- Network issue\n\nTry again later.");
  }
    }

// PARSER
/*function parse(text) {
  return text.split("Question:").slice(1).map(q => {
    const l = q.split("\n").filter(x=>x.trim());
    return {
      question: l[0],
      options: l.slice(1,5),
      answer: l.find(x=>x.includes("Answer")),
      explanation: l.find(x=>x.includes("Explanation"))
    };
  });
}*/

    function parseQuestions(text) {
  return text.split("Question:").slice(1).map(block => {
    const lines = block.split("\n").map(l => l.trim()).filter(Boolean);

    return {
      question: lines[0],
      options: lines.filter(l => /^[A-D]\./.test(l)),
      answer: lines.find(l => l.startsWith("Answer"))
        ?.split(":")[1]
        ?.trim()
        ?.charAt(0)
        ?.toUpperCase(),
      explanation: lines.find(l => l.startsWith("Explanation"))
        ?.replace("Explanation:", "")
        ?.trim()
    };
  });
    }

// SHOW QUESTION
function showQuestion() {
  const q = questions[index];

  question.innerText = q.question;
  progress.innerText = `Question ${index+1} of ${questions.length}`;

  options.innerHTML = "";

  q.options.forEach((opt,i)=>{
    const btn = document.createElement("button");

    let color = "bg-[#09090b] border-[#27272a] hover:bg-[#27272a] text-zinc-300";
    if(userAnswers[index]===i) color="bg-[#06b6d4]/10 border-[#06b6d4] text-[#06b6d4] shadow-[0_0_15px_rgba(6,182,212,0.15)]";

    btn.className = `w-full text-left p-4 rounded-xl border transition-all text-[15px] font-medium ${color}`;
    btn.innerText = opt;
    btn.onclick = ()=>{userAnswers[index]=i;showQuestion();};

    options.appendChild(btn);
  });

  renderPalette();
}

// PALETTE
function renderPalette(){
  palette.innerHTML="";

  questions.forEach((_,i)=>{
    const btn=document.createElement("button");

    let color="bg-[#09090b] border-[#27272a] text-zinc-500 hover:bg-[#27272a]";
    if(userAnswers[i]!=null) color="bg-emerald-500/10 border-emerald-500/40 text-emerald-400";
    if(flagged[i]) color="bg-amber-500/10 border-amber-500/40 text-amber-400";
    if(i===index) color="bg-gradient-to-tr from-[#06b6d4] to-[#8b5cf6] text-white border-transparent shadow-[0_0_10px_rgba(6,182,212,0.4)] transform scale-105";

    btn.className=`p-2.5 rounded-lg border text-sm font-semibold transition-all ${color}`;
    btn.innerText=i+1;
    btn.onclick=()=>{index=i;showQuestion();};

    palette.appendChild(btn);
  });
}

// NAV
function nextQuestion(){ if(index<questions.length-1){index++;showQuestion();}}
function prevQuestion(){ if(index>0){index--;showQuestion();}}

// FLAG
function toggleFlag(){ flagged[index]=!flagged[index]; showQuestion(); }

// REVIEW
function reviewUnanswered(){
  let i=userAnswers.findIndex(a=>a==null);
  if(i!==-1){index=i;showQuestion();}
}

// TIMER
function startTimer(sec){
  timer=setInterval(()=>{
    let m=Math.floor(sec/60), s=sec%60;
    document.getElementById("timer").innerText=`${m}:${s<10?"0":""}${s}`;
    sec--;
    if(sec<0) submitExam();
  },1000);
}

// MODAL
function openModal(){submitModal.classList.remove("hidden");}
function closeModal(){submitModal.classList.add("hidden");}

// SUBMIT
function submitExam(){
  showLoader("Calculating Results...");
  closeModal();
  
  setTimeout(() => {
      clearInterval(timer);
      let correct=0;

      questions.forEach((q,i)=>{
        //const correctIndex=q.options.findIndex(o=>q.answer.includes(o));
          const correctIndex = q.options.findIndex(o =>
                const correctIndex = q.options.findIndex(o =>
  q.answer && o.trim().startsWith(q.answer)
);
                );
        if(userAnswers[i]===correctIndex) correct++;
      });

      examScreen.classList.add("hidden");
      examScreen.classList.remove("flex");
      resultScreen.classList.remove("hidden");
      document.getElementById("score").innerText=`${correct} / ${questions.length}`;
      hideLoader();
  }, 1200);
}

// CORRECTIONS
function showCorrections(){
  corrections.innerHTML="";
  corrections.classList.remove("hidden");

  questions.forEach((q,i)=>{
    //const correctIndex=q.options.findIndex(o=>q.answer.includes(o));
      const correctIndex = q.options.findIndex(o =>
            const correctIndex = q.options.findIndex(o =>
  q.answer && o.trim().startsWith(q.answer)
);
           );

    corrections.innerHTML+=`
      <div class="p-5 bg-[#09090b] border border-[#27272a] rounded-2xl shadow-sm">
        <p class="font-medium text-white mb-3 text-[15px]">${i+1}. ${q.question}</p>
        <div class="space-y-1 text-sm">
            <p class="text-zinc-400">Your Answer: <span class="${userAnswers[i]===correctIndex ? 'text-emerald-400 font-semibold' : 'text-rose-400 font-semibold'}">${q.options[userAnswers[i]]||"None"}</span></p>
            <p class="text-zinc-400">Correct Answer: <span class="text-emerald-400 font-semibold">${correctIndex !== -1 ? q.options[correctIndex] : "Not found"}</span></p>
        </div>
        ${q.explanation ? `<div class="mt-4 p-3 bg-[#18181b] rounded-xl text-sm text-zinc-300 border border-[#27272a] font-medium"><span class="text-[#06b6d4] font-semibold mr-1">Explanation:</span>${q.explanation.replace('Explanation:', '')}</div>` : ""}
      </div>`;
  });
}

// RESET
function resetToSetup() {
  resultScreen.classList.add("hidden");
  corrections.classList.add("hidden");
  corrections.innerHTML = "";
  setupScreen.classList.remove("hidden");
  
  index = 0;
  score = 0;
  userAnswers = [];
  flagged = [];
  clearInterval(timer);
  document.getElementById("timer").innerText = "00:00";
}

// INIT
loadBooks();
lucide.createIcons();
</script>
</body>
