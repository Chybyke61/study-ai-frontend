<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Study.AI</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; visibility: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-sidebar { background: rgba(2, 6, 23, 0.8); border-right: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="h-20 border-b border-white/5 px-8 flex items-center justify-between glass-card sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i data-lucide="zap" class="w-5 h-5 text-white"></i>
            </div>
            <span class="font-extrabold text-xl tracking-tight">STUDY<span class="text-indigo-400">.AI</span></span>
        </div>
        <button onclick="handleLogout()" class="px-5 py-2.5 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white text-[10px] font-bold rounded-xl transition-all uppercase tracking-widest">Logout</button>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-80 glass-sidebar p-6 flex flex-col gap-6 hidden lg:flex">
            <div class="glass-card p-6 rounded-[2rem]">
                <h3 class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-4">Uploader</h3>
                <input type="file" id="bookFile" class="hidden" onchange="updateFileName()">
                <label for="bookFile" id="fileNameDisplay" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-800 rounded-2xl cursor-pointer text-xs text-slate-500 hover:border-indigo-500/50 transition-all">Select PDF/Doc</label>
                <button onclick="uploadBook()" class="w-full mt-4 bg-indigo-600 py-3 rounded-xl font-bold text-sm">Sync to Engine</button>
            </div>
            
            <div class="flex-1 overflow-hidden flex flex-col">
                <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Your Library (<span id="bookCount">0</span>)</h3>
                <div id="books" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
            </div>
        </aside>

        <main class="flex-1 p-6 lg:p-10 flex flex-col gap-6 overflow-hidden">
            <header class="glass-card rounded-[2.5rem] p-8">
                <input id="topic" type="text" placeholder="Enter topic to analyze..." class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl py-4 px-6 text-white mb-6 outline-none focus:ring-2 focus:ring-indigo-500">
                <div class="flex flex-wrap gap-3">
                    <select id="level" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-xs font-bold text-slate-300">
                        <option value="University">Advanced</option>
                        <option value="Secondary">Standard</option>
                    </select>
                    <select id="bookSelector" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-xs font-bold text-slate-300 flex-1">
                        <option value="all">Global Database</option>
                    </select>
                    <button onclick="requestAI('explain')" class="bg-indigo-500 hover:bg-indigo-600 px-6 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">Explain</button>
                    <button onclick="requestAI('quiz')" class="bg-emerald-500 hover:bg-emerald-600 px-6 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">Quiz</button>
                    <button onclick="requestAI('notes')" class="bg-amber-500 hover:bg-amber-600 px-6 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">Notes</button>
                </div>
            </header>

            <section id="result" class="glass-card rounded-[2.5rem] flex-1 p-8 lg:p-12 overflow-y-auto prose prose-invert max-w-none">
                <div class="opacity-20 text-center py-20 italic">Ready for input...</div>
            </section>
        </main>
    </div>

    <script>
        const api = "https://study-ai-tq7i.onrender.com";
        const supabase = window.supabase.createClient("https://hffbjtbahfwudigywzzx.supabase.co", "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5");
        lucide.createIcons();

        // 🛡️ BLOCKING AUTH GUARD
        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = "login.html";
            } else {
                document.body.style.visibility = "visible";
                loadBooks();
            }
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        }

        async function loadBooks() {
            const { data: { session } } = await supabase.auth.getSession();
            const res = await fetch(`${api}/books`, { 
                headers: { "x-user-id": session.user.id } 
            });
            const data = await res.json();
            const container = document.getElementById("books");
            const selector = document.getElementById("bookSelector");
            
            container.innerHTML = "";
            selector.innerHTML = '<option value="all">Global Database</option>';
            document.getElementById("bookCount").innerText = data.length;

            data.forEach(b => {
                container.innerHTML += `<div class="bg-slate-900/50 p-3 rounded-xl text-[11px] border border-white/5 truncate">${b.filename}</div>`;
                selector.innerHTML += `<option value="${b.filename}">${b.filename}</option>`;
            });
        }

        async function requestAI(type) {
            const topic = document.getElementById("topic").value;
            const resBox = document.getElementById("result");
            if (!topic) return alert("Please enter a topic.");

            resBox.innerHTML = '<div class="flex justify-center p-10"><i data-lucide="loader-2" class="animate-spin w-8 h-8 text-indigo-500"></i></div>';
            lucide.createIcons();

            const { data: { session } } = await supabase.auth.getSession();
            const endpoint = type === 'explain' ? 'deep-explain' : type;

            try {
                const res = await fetch(`${api}/${endpoint}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "x-user-id": session.user.id },
                    body: JSON.stringify({ 
                        topic, 
                        level: document.getElementById("level").value, 
                        book: document.getElementById("bookSelector").value 
                    })
                });
                const data = await res.json();
                const content = data.explanation || data.quiz || data.notes || "No synthesis available.";
                resBox.innerHTML = marked.parse(content);
            } catch (e) {
                resBox.innerHTML = "Error connecting to AI engine.";
            }
        }

        function updateFileName() {
            const file = document.getElementById('bookFile').files[0];
            if (file) document.getElementById('fileNameDisplay').innerText = file.name;
        }

        init();
    </script>
</body>
</html>
