<!DOCTYPE html>
<html>
<head>
<title>Study.AI</title>

<script src="https://cdn.tailwindcss.com?plugins=typography"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{background:#020617;color:white;font-family:Inter;}
.glass{background:rgba(15,23,42,.6);backdrop-filter:blur(20px);}
</style>
</head>

<body class="p-6">

<div class="flex justify-between mb-6">
<h1 class="text-xl font-bold">Study.AI</h1>
<button onclick="logout()" class="bg-red-500 px-4 py-2 rounded-xl">Logout</button>
</div>

<div class="grid lg:grid-cols-3 gap-6">

<!-- LEFT -->
<div class="glass p-6 rounded-2xl">
<input type="file" id="file" class="mb-4">

<button onclick="upload()" class="w-full bg-indigo-600 p-3 rounded-xl">Upload</button>

<div id="progress" class="hidden mt-4">
<div class="h-2 bg-slate-800 rounded">
<div id="bar" class="bg-indigo-500 h-2 w-0"></div>
</div>
<p id="text" class="text-xs mt-2"></p>
</div>
</div>

<!-- RIGHT -->
<div class="lg:col-span-2 glass p-6 rounded-2xl">

<input id="topic" class="w-full p-3 bg-slate-900 rounded-xl mb-4" placeholder="Ask anything...">

<div class="flex gap-3 mb-4">
<button onclick="ask('explain')" class="bg-indigo-500 px-4 py-2 rounded">Explain</button>
<button onclick="ask('quiz')" class="bg-emerald-500 px-4 py-2 rounded">Quiz</button>
<button onclick="ask('notes')" class="bg-amber-500 px-4 py-2 rounded">Notes</button>
</div>

<div id="output" class="prose prose-invert"></div>

</div>

</div>

<script>
const api="https://study-ai-tq7i.onrender.com";

const supabase=window.supabase.createClient(
"https://hffbjtbahfwudigywzzx.supabase.co",
"sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5"
);

// protect page
(async()=>{
const {data:{session}}=await supabase.auth.getSession();
if(!session) location.href="login.html";
})();

async function logout(){
await supabase.auth.signOut();
location.href="login.html";
}

// upload
async function upload(){
const file=document.getElementById("file").files[0];
if(!file) return alert("Select file");

const {data:{session}}=await supabase.auth.getSession();

progress.classList.remove("hidden");

const res=await fetch(`${api}/generate-upload-url`,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${session.access_token}`
},
body:JSON.stringify({filename:file.name})
});

const {uploadUrl,fileKey}=await res.json();

await fetch(uploadUrl,{method:"PUT",body:file});

const es=new EventSource(`${api}/progress?userId=${session.user.id}`);

es.onmessage=e=>{
const d=JSON.parse(e.data);
bar.style.width=d.progress+"%";
text.innerText=d.step+" "+d.progress+"%";
if(d.progress>=100) es.close();
};

await fetch(`${api}/upload`,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${session.access_token}`
},
body:JSON.stringify({fileKey,filename:file.name})
});
}

// AI
async function ask(type){
const topic=document.getElementById("topic").value;
if(!topic) return alert("Enter topic");

output.innerHTML="Thinking...";

const {data:{session}}=await supabase.auth.getSession();

const endpoint=type==="explain"?"deep-explain":type;

const res=await fetch(`${api}/${endpoint}`,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${session.access_token}`
},
body:JSON.stringify({topic})
});

const data=await res.json();

const text=(data.explanation||data.quiz||data.notes||"No response");

output.innerHTML=marked.parse(text);
}
</script>

</body>
</html>
