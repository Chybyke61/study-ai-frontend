<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study.AI | Premium Learning Copilot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        :root { --brand-primary: #6366f1; }
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #020617; 
            color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }
        .neural-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="min-h-screen">

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full bg-indigo-600 text-white text-sm font-bold shadow-2xl transition-all duration-300 opacity-0 -translate-y-2 pointer-events-none"></div>

    <nav class="border-b border-slate-800/60 bg-slate-950/50 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 neural-gradient rounded-lg flex items-center justify-center">
                    <i data-lucide="brain-circuit" class="w-5 h-5 text-white"></i>
                </div>
                <span class="font-['Plus_Jakarta_Sans'] font-extrabold text-xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">STUDY.AI</span>
            </div>
            <div class="flex items-center gap-6">
                <div class="hidden md:flex flex-col items-end">
                    <span id="userEmail" class="text-xs font-medium text-slate-400">guest@study.ai</span>
                    <span class="text-[10px] text-indigo-400 uppercase tracking-widest font-bold">Premium Tier</span>
                </div>
                <button onclick="handleLogout()" class="p-2 hover:bg-slate-800 rounded-full transition-colors text-slate-400 hover:text-white">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-4 space-y-6">
            <section class="glass-panel rounded-3xl p-6">
                <h3 class="flex items-center gap-2 text-sm font-bold text-slate-400 uppercase tracking-widest mb-6">
                    <i data-lucide="library" class="w-4 h-4"></i> Knowledge Base
                </h3>
                
                <div class="space-y-4">
                    <div class="relative group">
                        <input type="file" id="bookFile" onchange="updateFileName()" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div class="border-2 border-dashed border-slate-700 group-hover:border-indigo-500/50 rounded-2xl p-8 text-center transition-all bg-slate-900/30">
                            <i data-lucide="cloud-upload" class="w-8 h-8 mx-auto mb-3 text-slate-500 group-hover:text-indigo-400 transition-colors"></i>
                            <p id="fileNameDisplay" class="text-sm font-medium text-slate-400">Click to upload PDF/DOCX</p>
                            <p class="text-[10px] text-slate-600 mt-1 uppercase">Max Size: 25MB</p>
                        </div>
                    </div>
                    
                    <button id="uploadBtn" onclick="handleUpload()" class="w-full py-4 neural-gradient rounded-xl font-bold text-sm shadow-lg shadow-indigo-500/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
                        <span>SYNC TO NEURAL ENGINE</span>
                    </button>

                    <div id="progressContainer" class="hidden space-y-2">
                        <div class="flex justify-between text-[10px] font-bold uppercase tracking-tighter">
                            <span id="progressText" class="text-indigo-400 animate-pulse">Processing...</span>
                        </div>
                        <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                            <div id="progressBar" class="h-full bg-indigo-500 transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="mt-8 pt-6 border-t border-slate-800/50">
                    <div id="bookList" class="space-y-3 max-h-60 overflow-y-auto pr-2">
                        </div>
                </div>
            </section>
        </aside>

        <div class="lg:col-span-8 space-y-6">
            <header class="glass-panel rounded-3xl p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Context Target</label>
                        <select id="bookSelect" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="all">Entire Library</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Complexity Level</label>
                        <select id="levelSelect" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="University">University</option>
                            <option value="Secondary School">Secondary School</option>
                            <option value="Primary School">Primary School</option>
                        </select>
                    </div>
                </div>

                <div class="relative">
                    <textarea id="topicInput" rows="3" placeholder="Paste a concept, ask a complex question, or paste an exam prompt..." 
                        class="w-full bg-slate-900/50 border border-slate-700/50 rounded-2xl px-6 py-5 text-lg placeholder:text-slate-600 focus:ring-2 focus:ring-indigo-500 outline-none resize-none transition-all"></textarea>
                    
                    <div class="flex flex-wrap gap-3 mt-4">
                        <button onclick="runEngine('explain')" class="px-6 py-3 bg-slate-800 hover:bg-indigo-600 rounded-xl text-xs font-bold transition-all flex items-center gap-2">
                            <i data-lucide="zap" class="w-4 h-4"></i> DEEP EXPLAIN
                        </button>
                        <button onclick="runEngine('notes')" class="px-6 py-3 bg-slate-800 hover:bg-indigo-600 rounded-xl text-xs font-bold transition-all flex items-center gap-2">
                            <i data-lucide="book-open" class="w-4 h-4"></i> SMART NOTES
                        </button>
                        <button onclick="runEngine('quiz')" class="px-6 py-3 bg-slate-800 hover:bg-indigo-600 rounded-xl text-xs font-bold transition-all flex items-center gap-2">
                            <i data-lucide="help-circle" class="w-4 h-4"></i> AI QUIZ
                        </button>
                    </div>
                </div>
            </header>

            <section id="displayArea" class="min-h-[400px]">
                <div class="flex flex-col items-center justify-center h-full py-20 text-slate-600 border-2 border-dashed border-slate-800/50 rounded-3xl">
                    <i data-lucide="sparkles" class="w-12 h-12 mb-4 opacity-20"></i>
                    <p class="text-sm font-medium italic">Output will appear here after engine processing</p>
                </div>
            </section>
        </div>
    </main>

    <script>
        // --- CONFIG ---
        const API_BASE = "https://study-ai-tq7i.onrender.com";
        const supabase = window.supabase.createClient(
  "https://hffbjtbahfwudigywzzx.supabase.co",
  "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5"
);
        let currentUser = null;

        lucide.createIcons();

        // --- AUTH & SETUP ---
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = "login.html"; 
            } else {
                currentUser = user;
                document.getElementById("userEmail").innerText = user.email;
                loadBooks();
            }
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        }

        // --- LIBRARY LOGIC ---
        async function loadBooks() {
            try {
                const res = await fetch(`${API_BASE}/books`, {
                    headers: { "x-user-id": currentUser.id }
                });
                const books = await res.json();
                
                const select = document.getElementById("bookSelect");
                const list = document.getElementById("bookList");
                
                select.innerHTML = '<option value="all">Entire Library</option>';
                list.innerHTML = "";

                books.forEach(book => {
                    const opt = document.createElement("option");
                    opt.value = book.filename;
                    opt.innerText = book.filename;
                    select.appendChild(opt);

                    list.innerHTML += `
                        <div class="flex items-center justify-between p-3 bg-slate-800/30 rounded-xl border border-slate-700/30 group transition-all hover:border-indigo-500/40">
                            <div class="flex items-center gap-3">
                                <i data-lucide="file-text" class="w-4 h-4 text-indigo-400"></i>
                                <span class="text-xs font-medium text-slate-300 truncate w-40">${book.name}</span>
                            </div>
                            <i data-lucide="check-circle-2" class="w-3 h-3 text-emerald-500 opacity-50"></i>
                        </div>`;
                });
                lucide.createIcons();
            } catch (e) {
                showToast("Connection to library lost.");
            }
        }

        // --- UPLOAD PROCESS ---
        async function handleUpload() {
            const fileInput = document.getElementById("bookFile");
            if (!fileInput.files[0]) return showToast("Please select a document");

            const file = fileInput.files[0];
            const uploadBtn = document.getElementById("uploadBtn");
            const progressContainer = document.getElementById("progressContainer");
            const progressBar = document.getElementById("progressBar");
            const progressText = document.getElementById("progressText");

            try {
                uploadBtn.disabled = true;
                progressContainer.classList.remove("hidden");

                // 1. Get Signed URL
                progressText.innerText = "Securing connection...";
                const urlRes = await fetch(`${API_BASE}/generate-upload-url`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "x-user-id": currentUser.id },
                    body: JSON.stringify({ filename: file.name })
                });
                const { uploadUrl, fileKey } = await urlRes.json();

                // 2. Upload to R2
                progressText.innerText = "Uploading to cloud...";
                await fetch(uploadUrl, {
                    method: "PUT",
                    body: file,
                    headers: { "Content-Type": file.type }
                });

                // 3. Connect SSE Progress
                const eventSource = new EventSource(`${API_BASE}/progress?userId=${currentUser.id}`);
                eventSource.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    progressBar.style.width = `${data.progress}%`;
                    progressText.innerText = data.step;
                    
                    if (data.progress === 100) {
                        eventSource.close();
                        setTimeout(() => {
                            progressContainer.classList.add("hidden");
                            uploadBtn.disabled = false;
                            loadBooks();
                            showToast("Brain Synced Successfully!");
                        }, 1000);
                    }
                };

                // 4. Trigger Indexing
                await fetch(`${API_BASE}/upload`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "x-user-id": currentUser.id },
                    body: JSON.stringify({ fileKey, filename: file.name })
                });

            } catch (e) {
                showToast("Sync Error. Use smaller files.");
                uploadBtn.disabled = false;
                progressContainer.classList.add("hidden");
            }
        }

        // --- AI ENGINE ---
        async function runEngine(type) {
            const topic = document.getElementById("topicInput").value;
            const book = document.getElementById("bookSelect").value;
            const level = document.getElementById("levelSelect").value;
            const display = document.getElementById("displayArea");

            if (!topic) return showToast("Enter a topic or highlight first");

            display.innerHTML = `
                <div class="flex flex-col items-center justify-center py-24 glass-panel rounded-3xl animate-in fade-in duration-500">
                    <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4 shadow-[0_0_20px_rgba(99,102,241,0.4)]"></div>
                    <p class="font-bold tracking-widest animate-pulse text-indigo-400">NEURAL SYNAPSE ACTIVE</p>
                    <p class="text-xs text-slate-500 mt-2 uppercase tracking-tighter">Consulting knowledge base...</p>
                </div>`;

            try {
                const endpoint = type === 'explain' ? '/deep-explain' : `/${type}`;
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "x-user-id": currentUser.id },
                    body: JSON.stringify({ topic, book, level })
                });

                const data = await res.json();
                const content = data.explanation || data.notes || data.quiz;

                display.innerHTML = `
                    <div class="prose prose-invert max-w-none animate-in fade-in slide-in-from-bottom-6 duration-1000">
                        <div class="p-8 md:p-12 glass-panel rounded-3xl shadow-2xl relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-4 opacity-10">
                                <i data-lucide="cpu" class="w-20 h-20"></i>
                            </div>
                            ${marked.parse(content)}
                        </div>
                    </div>`;
                
                lucide.createIcons();
                display.scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (e) {
                display.innerHTML = `<p class="text-center text-red-400 py-10">Engine Timeout. Try again.</p>`;
            }
        }

        // --- UTILS ---
        function updateFileName() {
            const input = document.getElementById('bookFile');
            const display = document.getElementById('fileNameDisplay');
            if (input.files[0]) {
                display.innerText = input.files[0].name;
                display.classList.replace("text-slate-400", "text-indigo-400");
            }
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.classList.remove("opacity-0", "-translate-y-2");
            t.classList.add("opacity-100", "translate-y-0");
            setTimeout(() => {
                t.classList.replace("opacity-100", "opacity-0");
                t.classList.replace("translate-y-0", "-translate-y-2");
            }, 3000);
        }

        checkUser();
    </script>
</body>
</html>
