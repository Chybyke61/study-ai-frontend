<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study.AI | Premium Learning Copilot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #030712; /* Deepest gray/blue */
            color: #f8fafc;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.08) 0px, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
        }
        
        .glass-panel {
            background: rgba(17, 24, 39, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .neural-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }

        .neural-border {
            position: relative;
        }
        .neural-border::before {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(99,102,241,0.5), rgba(139,92,246,0.5));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .neural-border:hover::before, .neural-border:focus-within::before {
            opacity: 1;
        }

        /* Elegant Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Customizing Markdown Prose for Dark Mode */
        .prose pre { background-color: #0f172a !important; border: 1px solid #1e293b; }
        .prose code { color: #818cf8 !important; }
        .prose strong { color: #e2e8f0 !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-brand-500/30">

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full bg-slate-800 border border-slate-700 text-white text-sm font-medium shadow-2xl transition-all duration-400 opacity-0 -translate-y-4 pointer-events-none flex items-center gap-2">
        <i data-lucide="info" class="w-4 h-4 text-brand-400"></i>
        <span id="toastMsg">Notification</span>
    </div>

    <nav class="sticky top-0 z-40 border-b border-white/5 bg-gray-950/50 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 neural-gradient rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/20">
                    <i data-lucide="brain-circuit" class="w-5 h-5 text-white"></i>
                </div>
                <span class="font-display font-bold text-xl tracking-tight text-white">
                    Study<span class="text-brand-400">.AI</span>
                </span>
            </div>
            
            <div class="flex items-center gap-5">
                <div class="hidden md:flex flex-col items-end">
                    <span id="userEmail" class="text-xs font-medium text-slate-300">authenticating...</span>
                    <span class="text-[9px] text-brand-400 uppercase tracking-widest font-bold flex items-center gap-1 mt-0.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-brand-500 animate-pulse"></span>
                        Premium Active
                    </span>
                </div>
                <div class="h-8 w-px bg-white/10 hidden md:block"></div>
                <button onclick="handleLogout()" class="p-2 text-slate-400 hover:text-white hover:bg-white/5 rounded-lg transition-all" title="Logout">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-6 py-8 w-full grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-4 space-y-6 flex flex-col">
            <section class="glass-panel rounded-2xl p-6 flex-grow flex flex-col">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
                        <i data-lucide="database" class="w-4 h-4 text-brand-400"></i> Knowledge Base
                    </h3>
                    <span class="text-[10px] bg-white/5 text-slate-400 px-2 py-1 rounded-md border border-white/5">Vault</span>
                </div>
                
                <div class="space-y-4">
                    <div class="relative group neural-border rounded-xl">
                        <input type="file" id="bookFile" onchange="updateFileName()" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" accept=".pdf,.docx">
                        <div class="border border-dashed border-slate-700/80 bg-slate-900/50 group-hover:bg-brand-500/5 group-hover:border-brand-500/50 rounded-xl p-6 text-center transition-all duration-300">
                            <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center mx-auto mb-3 group-hover:scale-110 transition-transform duration-300">
                                <i data-lucide="cloud-upload" class="w-5 h-5 text-slate-400 group-hover:text-brand-400"></i>
                            </div>
                            <p id="fileNameDisplay" class="text-sm font-medium text-slate-300 truncate px-2">Drop PDF or DOCX here</p>
                            <p class="text-[10px] text-slate-500 mt-1 uppercase font-medium">Max Limit: 25MB</p>
                        </div>
                    </div>
                    
                    <button id="uploadBtn" onclick="handleUpload()" class="w-full py-3.5 bg-brand-600 hover:bg-brand-500 text-white rounded-xl font-medium text-sm transition-all duration-200 shadow-lg shadow-brand-500/20 active:scale-[0.98] flex items-center justify-center gap-2">
                        <i data-lucide="zap" class="w-4 h-4"></i>
                        <span>Sync to Engine</span>
                    </button>

                    <div id="progressContainer" class="hidden glass-panel p-4 rounded-xl border border-brand-500/20">
                        <div class="flex justify-between text-xs font-medium mb-2 text-slate-300">
                            <span id="progressText" class="animate-pulse">Processing...</span>
                            <span id="progressPercent" class="text-brand-400">0%</span>
                        </div>
                        <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                            <div id="progressBar" class="h-full neural-gradient transition-all duration-300 ease-out" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="mt-8 pt-6 border-t border-slate-800 flex-grow">
                    <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-4">Indexed Documents</h4>
                    <div id="bookList" class="space-y-2 max-h-[350px] overflow-y-auto pr-2">
                        <p class="text-xs text-slate-500 italic text-center py-4">No documents synced yet.</p>
                    </div>
                </div>
            </section>
        </aside>

        <div class="lg:col-span-8 flex flex-col min-h-[600px]">
            <header class="glass-panel rounded-2xl p-6 lg:p-8 mb-6 relative overflow-hidden">
                <div class="absolute top-0 right-0 -mt-16 -mr-16 w-64 h-64 bg-brand-500/5 rounded-full blur-3xl pointer-events-none"></div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6 relative z-10">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Context Source</label>
                        <div class="relative">
                            <select id="bookSelect" class="w-full bg-slate-900/80 border border-slate-700/80 rounded-xl px-4 py-3 text-sm text-slate-200 focus:ring-2 focus:ring-brand-500/50 outline-none appearance-none transition-all cursor-pointer">
                                <option value="all">Global Library Search</option>
                            </select>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-500 absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Output Complexity</label>
                        <div class="relative">
                            <select id="levelSelect" class="w-full bg-slate-900/80 border border-slate-700/80 rounded-xl px-4 py-3 text-sm text-slate-200 focus:ring-2 focus:ring-brand-500/50 outline-none appearance-none transition-all cursor-pointer">
                                <option value="University">Undergraduate / University</option>
                                <option value="Secondary School">High School / Secondary</option>
                                <option value="Primary School">Beginner / Primary</option>
                            </select>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-500 absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                        </div>
                    </div>
                </div>

                <div class="relative z-10">
                    <div class="neural-border rounded-xl bg-slate-900/50 mb-4">
                        <textarea id="topicInput" rows="3" placeholder="Enter a concept, paste a question, or ask for a summary..." 
                            class="w-full bg-transparent border-0 px-5 py-4 text-base text-slate-100 placeholder:text-slate-600 focus:ring-0 outline-none resize-none"></textarea>
                    </div>
                    
                    <div class="flex flex-wrap gap-3">
                        <button onclick="runEngine('explain')" class="flex-1 sm:flex-none px-5 py-2.5 bg-slate-800/80 hover:bg-slate-700 border border-slate-700 rounded-lg text-xs font-medium text-slate-300 hover:text-white transition-all flex items-center justify-center gap-2 group">
                            <i data-lucide="sparkles" class="w-4 h-4 text-brand-400 group-hover:animate-pulse"></i> Deep Explain
                        </button>
                        <button onclick="runEngine('notes')" class="flex-1 sm:flex-none px-5 py-2.5 bg-slate-800/80 hover:bg-slate-700 border border-slate-700 rounded-lg text-xs font-medium text-slate-300 hover:text-white transition-all flex items-center justify-center gap-2 group">
                            <i data-lucide="file-edit" class="w-4 h-4 text-emerald-400 group-hover:animate-pulse"></i> Generate Notes
                        </button>
                        <button onclick="runEngine('quiz')" class="flex-1 sm:flex-none px-5 py-2.5 bg-slate-800/80 hover:bg-slate-700 border border-slate-700 rounded-lg text-xs font-medium text-slate-300 hover:text-white transition-all flex items-center justify-center gap-2 group">
                            <i data-lucide="help-circle" class="w-4 h-4 text-amber-400 group-hover:animate-pulse"></i> Practice Quiz
                        </button>
                    </div>
                </div>
            </header>

            <section id="displayArea" class="glass-panel rounded-2xl flex-grow relative overflow-hidden flex flex-col">
                <div id="emptyState" class="flex flex-col items-center justify-center h-full min-h-[400px] text-slate-500 p-8 text-center">
                    <div class="w-16 h-16 rounded-2xl bg-slate-800/50 border border-slate-700 flex items-center justify-center mb-4">
                        <i data-lucide="cpu" class="w-8 h-8 text-slate-600"></i>
                    </div>
                    <h3 class="font-display font-medium text-slate-300 mb-1">Awaiting Instructions</h3>
                    <p class="text-sm max-w-sm">Select your parameters, enter a topic above, and activate the engine to generate insights.</p>
                </div>
                
                <div id="contentWrapper" class="hidden p-6 md:p-8 overflow-y-auto h-full w-full">
                    <div id="markdownContent" class="prose prose-invert prose-indigo max-w-none animate-in fade-in slide-in-from-bottom-4 duration-700"></div>
                </div>
            </section>
        </div>
    </main>

    <script>
        // --- CONFIG & SETUP ---
        const API_BASE = "https://study-ai-tq7i.onrender.com";
        const supabase = window.supabase.createClient(
            "https://hffbjtbahfwudigywzzx.supabase.co",
            "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5"
        );
        let currentUser = null;

        // Initialize icons
        lucide.createIcons();

        // --- AUTH ---
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = "login.html"; 
            } else {
                currentUser = user;
                document.getElementById("userEmail").innerText = user.email;
                loadBooks();
            }
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        }

        // --- LIBRARY LOGIC ---
        async function loadBooks() {
            try {
                const res = await fetch(`${API_BASE}/books`, {
                    headers: { "x-user-id": currentUser.id }
                });
                const books = await res.json();
                
                const select = document.getElementById("bookSelect");
                const list = document.getElementById("bookList");
                
                select.innerHTML = '<option value="all">Global Library Search</option>';
                list.innerHTML = "";

                if (!books || books.length === 0) {
                    list.innerHTML = '<p class="text-xs text-slate-500 italic text-center py-4">No documents synced yet.</p>';
                    return;
                }

                books.forEach(book => {
                    const opt = document.createElement("option");
                    opt.value = book.filename;
                    opt.innerText = book.filename;
                    select.appendChild(opt);

                    list.innerHTML += `
                        <div class="flex items-center justify-between p-3 bg-slate-800/40 rounded-lg border border-slate-700/50 hover:border-brand-500/30 transition-colors group cursor-default">
                            <div class="flex items-center gap-3 overflow-hidden">
                                <div class="p-1.5 bg-brand-500/10 rounded-md text-brand-400 group-hover:bg-brand-500 group-hover:text-white transition-colors">
                                    <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
                                </div>
                                <span class="text-xs font-medium text-slate-300 truncate" title="${book.filename}">${book.filename}</span>
                            </div>
                            <i data-lucide="check" class="w-3 h-3 text-emerald-500 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                        </div>`;
                });
                lucide.createIcons();
            } catch (e) {
                showToast("Connection to library lost.");
            }
        }

        // --- UPLOAD PROCESS ---
        async function handleUpload() {
            const fileInput = document.getElementById("bookFile");
            if (!fileInput.files[0]) return showToast("Please select a document first.");

            const file = fileInput.files[0];
            if (!file.name.endsWith(".pdf") && !file.name.endsWith(".docx")) {
                return showToast("Only PDF and DOCX allowed.");
            }
            const uploadBtn = document.getElementById("uploadBtn");
            const progressContainer = document.getElementById("progressContainer");
            const progressBar = document.getElementById("progressBar");
            const progressText = document.getElementById("progressText");
            const progressPercent = document.getElementById("progressPercent");

            try {
                uploadBtn.disabled = true;
                uploadBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Initializing...';
                lucide.createIcons();
                progressContainer.classList.remove("hidden");

                // 1. Get Signed URL
                progressText.innerText = "Securing connection...";
                const urlRes = await fetch(`${API_BASE}/generate-upload-url`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "x-user-id": currentUser.id },
                    body: JSON.stringify({ filename: file.name })
                });
                const { uploadUrl, fileKey } = await urlRes.json();
                if (!uploadUrl) throw new Error("Upload URL failed");

                // 2. Upload to R2
                progressText.innerText = "Uploading to cloud...";
                await fetch(uploadUrl, {
                    method: "PUT",
                    body: file,
                    headers: { "Content-Type": file.type }
                });

                // 3. Connect SSE Progress
                const eventSource = new EventSource(`${API_BASE}/progress?userId=${currentUser.id}`);
                eventSource.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    progressBar.style.width = `${data.progress}%`;
                    progressPercent.innerText = `${data.progress}%`;
                    progressText.innerText = data.step;
                    
                    if (data.progress === 100) {
                        eventSource.close();
                        setTimeout(() => {
                            progressContainer.classList.add("hidden");
                            uploadBtn.disabled = false;
                            uploadBtn.innerHTML = '<i data-lucide="zap" class="w-4 h-4"></i><span>Sync to Engine</span>';
                            lucide.createIcons();
                            
                            // Reset file input UI
                            fileInput.value = '';
                            document.getElementById('fileNameDisplay').innerText = 'Drop PDF or DOCX here';
                            document.getElementById('fileNameDisplay').classList.remove('text-brand-400');
                            
                            loadBooks();
                            showToast("Document indexed successfully!");
                        }, 1000);
                    }
                };

                // 4. Trigger Indexing
                await fetch(`${API_BASE}/upload`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "x-user-id": currentUser.id },
                    body: JSON.stringify({ fileKey, filename: file.name })
                });

            } catch (e) {
                showToast("Upload Error. Try a smaller file.");
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '<i data-lucide="zap" class="w-4 h-4"></i><span>Sync to Engine</span>';
                lucide.createIcons();
                progressContainer.classList.add("hidden");
            }
        }

        // --- AI ENGINE ---
        async function runEngine(type) {
            const topic = document.getElementById("topicInput").value;
            const book = document.getElementById("bookSelect").value;
            const level = document.getElementById("levelSelect").value;
            
            const emptyState = document.getElementById("emptyState");
            const contentWrapper = document.getElementById("contentWrapper");
            const markdownContent = document.getElementById("markdownContent");

            if (!topic || topic.trim().length < 3) return showToast("Please enter a topic or question first.");

            // Show Loading State
            emptyState.classList.remove("hidden");
            contentWrapper.classList.add("hidden");
            
            emptyState.innerHTML = `
                <div class="flex flex-col items-center justify-center">
                    <div class="relative w-16 h-16 mb-6">
                        <div class="absolute inset-0 border-4 border-brand-500/20 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-brand-500 rounded-full border-t-transparent animate-spin"></div>
                        <i data-lucide="brain" class="absolute inset-0 m-auto w-6 h-6 text-brand-400 animate-pulse"></i>
                    </div>
                    <h3 class="font-display font-medium text-white mb-1 tracking-wider">NEURAL SYNAPSE ACTIVE</h3>
                    <p class="text-xs text-slate-400">Scanning knowledge base for insights...</p>
                </div>
            `;
            lucide.createIcons();

            try {
                const endpoint = type === 'explain' ? '/deep-explain' : `/${type}`;
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "x-user-id": currentUser.id },
                    body: JSON.stringify({ topic, book, level })
                });

                if (!res.ok) {
                    throw new Error("API failed");
                }

                const data = await res.json();
                const content = data.explanation || data.notes || data.quiz || "⚠️ No response generated.";

                // Switch UI
                emptyState.classList.add("hidden");
                contentWrapper.classList.remove("hidden");
                
                // Parse and inject Markdown
                markdownContent.innerHTML = marked.parse(content);

                // Smooth scroll to top of content
                document.getElementById('displayArea').scrollIntoView({ behavior: 'smooth', block: 'center' });

            } catch (e) {
                emptyState.classList.remove("hidden");
                contentWrapper.classList.add("hidden");
                emptyState.innerHTML = `
                    <div class="text-center text-red-400">
                        <i data-lucide="alert-triangle" class="w-10 h-10 mx-auto mb-3 opacity-80"></i>
                        <p class="font-medium">Engine Timeout</p>
                        <p class="text-xs opacity-70 mt-1">Please try your request again.</p>
                    </div>`;
                lucide.createIcons();
            }
        }

        // --- UTILS ---
        function updateFileName() {
            const input = document.getElementById('bookFile');
            const display = document.getElementById('fileNameDisplay');
            if (input.files[0]) {
                const name = input.files[0].name;
                // Truncate if too long
                display.innerText = name.length > 30 ? name.substring(0, 27) + '...' : name;
                display.classList.add("text-brand-400");
            }
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            document.getElementById("toastMsg").innerText = msg;
            
            t.classList.remove("opacity-0", "-translate-y-4", "pointer-events-none");
            t.classList.add("opacity-100", "translate-y-0");
            
            setTimeout(() => {
                t.classList.add("opacity-0", "-translate-y-4", "pointer-events-none");
                t.classList.remove("opacity-100", "translate-y-0");
            }, 3500);
        }

        // Boot
        checkUser();
    </script>
</body>
</html>
