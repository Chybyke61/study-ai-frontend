<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study.AI | Premium Learning Copilot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --brand-primary: #6366f1; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
        }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        /* Markdown Styling */
        .markdown-content h1, .markdown-content h2 { color: #818cf8; font-family: 'Plus Jakarta Sans'; margin-top: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; font-weight: 700; }
        .markdown-content p { margin-bottom: 1rem; line-height: 1.7; color: #cbd5e1; }
        .markdown-content ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-content code { background: #1e293b; padding: 0.2rem 0.4rem; border-radius: 6px; font-size: 0.9em; color: #f472b6; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass-card rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl mb-6 shadow-xl shadow-indigo-500/20">
                    <i data-lucide="graduation-cap" class="text-white w-7 h-7"></i>
                </div>
                <h2 class="text-3xl font-extrabold tracking-tight text-white mb-2 font-['Plus_Jakarta_Sans']">Welcome Back</h2>
                <p class="text-slate-400 text-sm font-medium">Elevate your study session with AI</p>
            </div>

            <div class="space-y-4">
                <input id="email" type="email" placeholder="Email address" class="w-full px-5 py-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-all">
                <input id="password" type="password" placeholder="Password" class="w-full px-5 py-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-all">
                <button onclick="login()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">Sign In</button>
            </div>
        </div>
    </div>

    <div id="appContainer" class="hidden min-h-screen flex flex-col">
        <nav class="border-b border-white/5 bg-slate-950/50 backdrop-blur-md px-6 h-20 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl"><i data-lucide="zap" class="text-white w-5 h-5"></i></div>
                <h1 class="text-xl font-extrabold tracking-tight font-['Plus_Jakarta_Sans'] uppercase tracking-wider">Study.AI <span class="text-indigo-500 text-xs">PRO</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="loadBooks()" class="p-2.5 rounded-xl glass-card hover:bg-white/5 transition-all text-slate-400">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
                <button onclick="logout()" class="px-5 py-2.5 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white text-xs font-bold rounded-xl transition-all">
                    LOGOUT
                </button>
            </div>
        </nav>

        <div class="flex-1 flex flex-col lg:flex-row max-w-[1600px] mx-auto w-full p-4 lg:p-8 gap-8 overflow-hidden">
            <aside class="w-full lg:w-80 xl:w-96 flex flex-col gap-6 overflow-hidden">
                <div class="glass-card rounded-[2rem] p-6 shrink-0">
                    <h3 class="text-[10px] font-bold text-indigo-400 uppercase tracking-[0.2em] mb-4">Ingest Material</h3>
                    <input type="file" id="bookFile" class="hidden" onchange="updateFileName()">
                    <label for="bookFile" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-800 rounded-3xl cursor-pointer hover:border-indigo-500/40 hover:bg-indigo-500/5 transition-all group">
                        <i data-lucide="plus" class="w-6 h-6 text-slate-500 group-hover:text-indigo-400 mb-2"></i>
                        <span id="fileNameDisplay" class="text-xs text-slate-400 px-4 text-center">PDF, Image or Doc</span>
                    </label>
                    <button onclick="uploadBook()" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-2xl shadow-lg transition-all active:scale-95">
                        Index Knowledge
                    </button>
                    <div id="progWrapper" class="hidden mt-4">
                        <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-indigo-500 h-full w-1/2 animate-[progress_2s_infinite_linear]"></div>
                        </div>
                    </div>
                </div>

                <div class="glass-card rounded-[2rem] p-6 flex-1 flex flex-col overflow-hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Library (<span id="bookCount">0</span>)</h3>
                        <i data-lucide="database" class="w-3 h-3 text-slate-600"></i>
                    </div>
                    <div id="books" class="flex-1 overflow-y-auto custom-scrollbar space-y-2.5 pr-1">
                        </div>
                </div>
            </aside>

            <main class="flex-1 flex flex-col gap-6 overflow-hidden">
                <div class="glass-card rounded-[2rem] p-6 lg:p-8">
                    <div class="flex flex-col xl:flex-row gap-4 mb-6">
                        <div class="relative flex-1">
                            <i data-lucide="search" class="absolute left-5 top-5 w-5 h-5 text-indigo-400"></i>
                            <input id="topic" type="text" placeholder="What should the AI analyze today?" class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-4.5 pl-14 pr-6 font-medium text-white focus:outline-none focus:border-indigo-500">
                        </div>
                        <div class="flex gap-4">
                            <select id="level" class="bg-slate-900/50 border border-slate-800 rounded-2xl px-6 py-4 text-sm font-semibold appearance-none cursor-pointer">
                                <option value="University">University</option>
                                <option value="Secondary">Secondary</option>
                                <option value="Primary">Primary</option>
                            </select>
                            <select id="bookSelector" class="bg-slate-900/50 border border-slate-800 rounded-2xl px-6 py-4 text-sm font-semibold appearance-none cursor-pointer min-w-[140px]">
                                <option value="all">Global Library</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="flex flex-wrap gap-3">
                        <button onclick="requestAI('explain')" class="flex-1 min-w-[140px] bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl transition-all font-bold flex items-center justify-center gap-2 group">
                            <i data-lucide="book-open" class="w-5 h-5 group-hover:scale-110 transition-transform"></i> Deep Explain
                        </button>
                        <button onclick="requestAI('quiz')" class="flex-1 min-w-[140px] bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-2xl transition-all font-bold flex items-center justify-center gap-2 group">
                            <i data-lucide="help-circle" class="w-5 h-5 group-hover:scale-110 transition-transform"></i> Take Quiz
                        </button>
                        <button onclick="requestAI('notes')" class="flex-1 min-w-[140px] bg-amber-600 hover:bg-amber-500 text-white py-4 rounded-2xl transition-all font-bold flex items-center justify-center gap-2 group">
                            <i data-lucide="file-text" class="w-5 h-5 group-hover:scale-110 transition-transform"></i> Study Notes
                        </button>
                    </div>
                </div>

                <div class="glass-card rounded-[2rem] flex-1 overflow-hidden flex flex-col shadow-2xl">
                    <div id="result" class="flex-1 p-8 lg:p-12 overflow-y-auto custom-scrollbar markdown-content text-slate-300">
                        <div class="h-full flex flex-col items-center justify-center opacity-20 text-center">
                            <i data-lucide="brain-circuit" class="w-16 h-16 mb-4"></i>
                            <h4 class="text-xl font-bold font-['Plus_Jakarta_Sans']">AI Neural Engine Ready</h4>
                            <p class="max-w-xs mt-2 text-sm">Select a document and enter a topic to begin your deep learning session.</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 transition-all duration-300 z-[100] font-bold pointer-events-none"></div>

    <script>
        const api = "https://study-ai-tq7i.onrender.com";
        const supabaseUrl = "https://hffbjtbahfwudigywzzx.supabase.co";
        const supabaseKey = "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5";

        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        let currentUser = null;
        let allBooks = [];
        const sessionId = localStorage.getItem("studyai_session") || crypto.randomUUID();
        localStorage.setItem("studyai_session", sessionId);

        lucide.createIcons();

        // --- AUTH ---
        async function checkUser() {
            const { data } = await supabaseClient.auth.getUser();
            if (data?.user) {
                currentUser = data.user;
                document.getElementById("loginScreen").classList.add("hidden");
                document.getElementById("appContainer").classList.remove("hidden");
                loadBooks();
            } else {
                document.getElementById("loginScreen").classList.remove("hidden");
                document.getElementById("appContainer").classList.add("hidden");
            }
        }

        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) return showToast(error.message);
            showToast("Authenticated Successfully");
            checkUser();
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        // --- LIBRARY ---
        async function loadBooks() {
            try {
                const res = await fetch(`${api}/books`, {
                    headers: { "x-user-id": currentUser.id }
                });
                allBooks = await res.json();
                renderBooks();
            } catch (err) { console.error(err); }
        }

        function renderBooks() {
            const container = document.getElementById("books");
            const selector = document.getElementById("bookSelector");
            container.innerHTML = "";
            selector.innerHTML = '<option value="all">Global Library</option>';
            document.getElementById("bookCount").innerText = allBooks.length;

            allBooks.forEach(book => {
                const displayName = book.filename.split('_').slice(1).join('_') || book.filename;
                
                // Sidebar Item
                const div = document.createElement("div");
                div.className = "group bg-slate-900/40 border border-slate-800/50 p-3 rounded-2xl flex items-center justify-between transition-all hover:border-indigo-500/30";
                div.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <i data-lucide="file" class="w-4 h-4 text-indigo-400"></i>
                        <span class="text-xs truncate text-slate-300 font-medium">${displayName}</span>
                    </div>
                    <button onclick="deleteBook('${encodeURIComponent(book.filename)}')" class="p-1 text-slate-600 hover:text-red-400">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                `;
                container.appendChild(div);

                // Selector Option
                const opt = document.createElement("option");
                opt.value = book.filename;
                opt.innerText = displayName;
                selector.appendChild(opt);
            });
            lucide.createIcons();
        }

        async function uploadBook() {
            const fileInput = document.getElementById("bookFile");
            const file = fileInput.files[0];
            const prog = document.getElementById("progWrapper");
            if (!file) return alert("Select a file first.");

            const formData = new FormData();
            formData.append("book", file);
            prog.classList.remove('hidden');

            try {
                const res = await fetch(`${api}/upload`, { 
                    method: "POST", 
                    headers: { "x-user-id": currentUser.id },
                    body: formData 
                });
                if (res.ok) {
                    showToast("Document indexed!");
                    loadBooks();
                    fileInput.value = "";
                    document.getElementById('fileNameDisplay').innerText = "PDF, Image or Doc";
                }
            } catch (err) { showToast("Upload failed"); }
            finally { prog.classList.add('hidden'); }
        }

        // --- AI ---
        async function requestAI(type) {
            const topic = document.getElementById("topic").value;
            const resultBox = document.getElementById("result");
            if (!topic) return alert("Enter a topic.");

            resultBox.innerHTML = `<div class="flex flex-col items-center justify-center h-full animate-pulse text-indigo-400">
                <i data-lucide="cpu" class="w-12 h-12 mb-4"></i>
                <p class="font-bold tracking-widest text-xs">AI IS REASONING OVER YOUR DATA...</p>
            </div>`;
            lucide.createIcons();

            try {
                const endpoint = type === 'explain' ? 'deep-explain' : type;
                const res = await fetch(`${api}/${endpoint}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "x-user-id": currentUser.id },
                    body: JSON.stringify({ 
                        topic, 
                        level: document.getElementById("level").value, 
                        book: document.getElementById("bookSelector").value, 
                        sessionId 
                    })
                });
                const data = await res.json();
                const raw = data.explanation || data.quiz || data.notes;
                resultBox.innerHTML = `<div class="markdown-content">${marked.parse(raw)}</div>`;
            } catch (err) { resultBox.innerHTML = "<p class='text-red-400'>Request Failed.</p>"; }
        }

        // --- UTILS ---
        function updateFileName() {
            const input = document.getElementById('bookFile');
            if (input.files[0]) document.getElementById('fileNameDisplay').innerText = input.files[0].name;
        }

        async function deleteBook(name) {

            if (!confirm("Delete this document?")) return;

            await fetch(`${api}/delete-book/${name}`, {
                method: "DELETE",
                headers: {
                    "x-user-id": currentUser.id
          }
        });

        showToast("Document deleted");

         loadBooks();
    }

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.classList.replace("opacity-0", "opacity-100");
            setTimeout(() => t.classList.replace("opacity-100", "opacity-0"), 3000);
        }

        checkUser();
    </script>
</body>
</html>
