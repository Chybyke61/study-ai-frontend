        // 6️⃣ Toggle Dark and Light Mode Logic
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.setAttribute('data-lucide', 'moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        }

        // Initialize theme icon on load
        document.addEventListener('DOMContentLoaded', () => {
            const icon = document.getElementById('themeIcon');
            if(icon) {
                if (document.documentElement.classList.contains('dark')) {
                    icon.setAttribute('data-lucide', 'sun');
                } else {
                    icon.setAttribute('data-lucide', 'moon');
                }

            // Mobile Sidebar Toggle Logic

            const closeBtn = document.getElementById('closeSidebarBtn');

            const overlay = document.getElementById('sidebarOverlay');

                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');

        async function uploadBook() {
    if (!currentUser || !currentUser.id) return showToast("Please login first");
    
    const fileInput = document.getElementById("bookFile");
    if (!fileInput.files[0]) return showToast("Select a file first.");

    const file = fileInput.files[0];
    const allowedTypes = [ "application/pdf", "application/vnd.openxmlformats-officedocument.wordprocessingml.document", "application/msword" ];
    const fileName = file.name.toLowerCase();

if (
    !allowedTypes.includes(file.type) &&
    !fileName.endsWith(".pdf") &&
    !fileName.endsWith(".doc") &&
    !fileName.endsWith(".docx")
) {
    showToast("Only PDF and DOCX allowed");
    fileInput.value = ""; 
    document.getElementById("fileNameDisplay").innerText = "Select PDF or DOCX";
    return;
}
    const progWrapper = document.getElementById("progWrapper");
    const progBar = document.getElementById("progBar");
    const progText = document.getElementById("progText");

    let eventSource;

    try {
        progWrapper.classList.remove('hidden');
        progBar.style.width = '0%';
        progText.innerText = 'Uploading... 0%';

        function connectSSE() {
            eventSource = new EventSource(`${api}/progress?userId=${currentUser.id}`);

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);

                progText.innerText = `${data.step} ${data.progress}%`;
                progBar.style.width = `${data.progress}%`;

                if (data.progress >= 100) {
                    eventSource.close();
                    progText.innerText = "Completed";
                    progBar.classList.replace("bg-[#4f46e5]", "bg-green-500");
                    showToast("Upload complete");
                    loadBooks();

                    setTimeout(() => {
                        progWrapper.classList.add("hidden");
                    }, 3000);
                }
            };

            eventSource.onerror = () => {
                eventSource.close();
                setTimeout(connectSSE, 2000);
            };
        }

        connectSSE();

        const formData = new FormData();
        formData.append("file", file);

        const res = await fetch(`${api}/upload-stream`, {
            method: "POST",
            headers: { "x-user-id": currentUser.id },
            body: formData
        });

        if (!res.ok) throw new Error("Upload failed");

    } catch (err) {
        if (eventSource) eventSource.close();
        progText.innerText = "Failed";
        progBar.classList.replace("bg-[#4f46e5]", "bg-red-500");
        showToast("Upload failed");
    }
        }

        <div class="mb-6 p-5 rounded-3xl border ${ isCorrect ? "bg-green-50/50 dark:bg-green-900/10 border-green-200 dark:border-green-800" : "bg-red-50/50 dark:bg-red-900/10 border-red-200 dark:border-red-800" }">

            </div>
            ${ !isCorrect ? `<p class="text-sm text-slate-600 dark:text-slate-400 mb-2">Your Answer: ${ userAnswer ? userAnswer + " - " + userText : "Not answered" }</p>` : "" }
            <p class="text-sm text-slate-800 dark:text-slate-200 mb-3">Correct Answer: <span class="font-medium">${correct} - ${correctText || "Missing"}</span></p>
        ${ explanation ? `
<div class="mt-2">
    <button onclick="toggleExplanation(${i})" class="flex items-center gap-1.5 text-[#4f46e5] dark:text-[#818cf8] hover:underline text-sm font-medium">

    <div id="explanation-${i}" class="hidden mt-3 text-[15px] text-slate-700 dark:text-slate-300 leading-relaxed pl-4 border-l-2 border-[#4f46e5] dark:border-[#818cf8]">
        ${fixedExplanation}
    </div>
</div>` : "" }
        </div>`;
    }

    const percentageScore = total ? Math.round((score / total) * 100) : 0;

    const resultSummaryHtml = `
    <div class="flex items-start gap-4 w-full max-w-3xl mx-auto pb-8">
        <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 mt-1">

        <div class="flex-1 w-full">

                <h2 class="text-4xl font-display text-slate-900 dark:text-white mb-2">${score} <span class="text-xl text-slate-500">/ ${total}</span></h2>
                <p class="text-[15px] text-slate-600 dark:text-slate-400 font-medium">Score: ${percentageScore}%</p>
            </div>
            ${resultHTML}
        </div>
    </div>`;

    document.getElementById("result").insertAdjacentHTML('beforeend', resultSummaryHtml);
    saveToChatHistory(resultSummaryHtml);
    lucide.createIcons();
    scrollToBottom(true);
        }

        function toggleExplanation(i) {
    const box = document.getElementById(`explanation-${i}`);
    const text = document.getElementById(`toggle-text-${i}`);
    const icon = document.getElementById(`toggle-icon-${i}`);
    if (!box || !text) return;
    if (box.classList.contains("hidden")) {
        box.classList.remove("hidden");
        text.innerText = "Hide Explanation";
        if (icon) icon.classList.add("rotate-180");
    } else {
        box.classList.add("hidden");
        text.innerText = "Show Explanation";
        if (icon) icon.classList.remove("rotate-180");
    }
        }

        let currentSelectedMode = 'explain';
let isModeMenuOpen = false;


function toggleModeMenu(e) {
    if (e) e.stopPropagation();

    const menu = document.getElementById("modeMenu");
    const btn = document.getElementById("modeBtn");
    const chevron = document.getElementById("modeChevron");

    const rect = btn.getBoundingClientRect();

    const menuHeight = 180;
    const spaceAbove = rect.top;

    if (spaceAbove < menuHeight) {
        menu.style.top = (rect.bottom + 8) + "px";
    } else {
        menu.style.top = (rect.top - menuHeight - 8) + "px";
    }

    menu.style.left = rect.left + "px";

    isModeMenuOpen = !isModeMenuOpen;

    if (isModeMenuOpen) {
        menu.classList.remove("opacity-0", "scale-95", "pointer-events-none");
        menu.classList.add("opacity-100", "scale-100", "pointer-events-auto");
        if (chevron) chevron.classList.add("rotate-180");
    } else {
        menu.classList.add("opacity-0", "scale-95", "pointer-events-none");
        menu.classList.remove("opacity-100", "scale-100", "pointer-events-auto");
        if (chevron) chevron.classList.remove("rotate-180");
    }
}

function selectMode(value, iconName, label) {
    currentSelectedMode = value;
    document.getElementById('modeLabel').innerText = label;
    
    // Replace icon and update its colors dynamically based on the mode
    const iconEl = document.getElementById('modeIcon');
    const newIcon = document.createElement('i');
    newIcon.id = 'modeIcon';
    newIcon.setAttribute('data-lucide', iconName);
    
    let colorClasses = "text-[#4f46e5] dark:text-[#818cf8]";
    if (value === 'quiz') colorClasses = "text-[#ea4335] dark:text-[#f28b82]";
    if (value === 'notes') colorClasses = "text-[#f59e0b] dark:text-[#fcd34d]";
    if (value === 'flashcards') colorClasses = "text-[#8b5cf6] dark:text-[#c4b5fd]";
    
    newIcon.className = `w-3.5 h-3.5 ${colorClasses}`;
    iconEl.parentNode.replaceChild(newIcon, iconEl);
    
    lucide.createIcons();
    toggleModeMenu();
}

// Routes the primary "Send" button to the correctly selected function

let isSending = false;

function submitModeRequest(event) {
    const input = document.getElementById("topic");
    const sendBtn = event?.currentTarget;

    const value = input.value.trim();
    if (!value) return showToast("Enter a topic");

    // Prevent spam
    if (isSending) return;
    isSending = true;

    // Clear input immediately
    input.value = "";

    // Force scroll immediately when send is hit
    scrollToBottom(true);
    // Delay secondary scroll so loader can render first
    setTimeout(() => scrollToBottom(true), 50);
    
    // Disable button
    if (sendBtn) {
        sendBtn.disabled = true;
        sendBtn.classList.add("opacity-50", "cursor-not-allowed");
    }

    // Route request
    if (currentSelectedMode === 'flashcards') {
        runFlashcards(event).finally(() => unlockUI(sendBtn));
    } else {
        requestAI(currentSelectedMode, value).finally(() => unlockUI(sendBtn));
    }
}
        function unlockUI(sendBtn) {
    isSending = false;

    if (sendBtn) {
        sendBtn.disabled = false;
        sendBtn.classList.remove("opacity-50", "cursor-not-allowed");
    }
        }

        function scrollToBottom(force = false) {
    const chat = document.getElementById("result");
    if (!chat) return;

    if (force) {
        chat.scrollTop = chat.scrollHeight;
    } else {

            behavior: "smooth"
        });
