<!DOCTYPE html><html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study.AI CBT</title><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script><style>
body {
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at top right, #18181b, #09090b 40%);
}
</style></head><body class="text-white min-h-screen flex items-center justify-center p-4"><div class="w-full max-w-4xl"><!-- HEADER --><div class="flex justify-between items-center mb-4">
  <h1 class="text-xl font-bold flex items-center gap-2">
    <i data-lucide="brain-circuit" class="text-cyan-400"></i>
    CBT Practice
  </h1>
  <div id="timer" class="text-cyan-400 font-bold"></div>
</div><!-- SETUP --><div id="setupScreen" class="bg-zinc-900 p-6 rounded-xl">
  <select id="bookSelect" class="w-full p-3 mb-4 bg-zinc-800 rounded-xl"></select>  <input id="numQ" type="number" value="20" class="w-full p-3 mb-4 bg-zinc-800 rounded-xl"/>
  <input id="time" type="number" value="20" class="w-full p-3 mb-4 bg-zinc-800 rounded-xl"/>  <select id="difficulty" class="w-full p-3 mb-4 bg-zinc-800 rounded-xl">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
  </select>  <button onclick="startCBT()" class="w-full p-3 bg-gradient-to-r from-cyan-500 to-violet-500 rounded-xl">
    Start Exam
  </button>
</div><!-- EXAM --><div id="examScreen" class="hidden">  <div class="mb-3 flex justify-between">
    <span id="progress"></span>
    <button onclick="toggleFlag()" class="bg-yellow-500 px-3 py-1 rounded">🚩 Flag</button>
  </div>  <h3 id="question" class="mb-4"></h3>  <div id="options" class="space-y-2"></div>  <!-- NAV -->  <div class="flex gap-2 mt-4">
    <button onclick="prevQuestion()" class="w-1/2 bg-zinc-800 p-3 rounded-xl">Previous</button>
    <button onclick="nextQuestion()" class="w-1/2 bg-cyan-500 p-3 rounded-xl">Next</button>
  </div>  <!-- ACTIONS -->  <div class="flex gap-2 mt-4">
    <button onclick="reviewUnanswered()" class="w-1/2 bg-orange-500 p-2 rounded">Review Unanswered</button>
    <button onclick="openModal()" class="w-1/2 bg-green-500 p-2 rounded">Submit</button>
  </div>  <!-- PALETTE -->  <div id="palette" class="grid grid-cols-8 gap-2 mt-6"></div></div><!-- RESULT --><div id="resultScreen" class="hidden text-center">
  <h2 class="text-xl mb-2">Result</h2>
  <p id="score"></p>  <button onclick="showCorrections()" class="mt-4 bg-cyan-500 px-4 py-2 rounded">
    Check Corrections
  </button>  <div id="corrections" class="hidden mt-6 text-left"></div>
</div><!-- MODAL --><div id="submitModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
  <div class="bg-zinc-900 p-6 rounded-xl text-center">
    <p class="mb-4">Submit exam?</p>
    <button onclick="submitExam()" class="bg-green-500 px-4 py-2 rounded">Yes</button>
    <button onclick="closeModal()" class="bg-red-500 px-4 py-2 rounded ml-2">Cancel</button>
  </div>
</div></div><script>
const api = "https://study-ai-tq7i.onrender.com";

let questions = [], index = 0, score = 0, timer;
let userAnswers = [], flagged = [];

// USER
function getUserId() {
  return localStorage.getItem("studyai_user");
}

// LOAD BOOKS
function loadBooks() {
  const books = JSON.parse(localStorage.getItem("studyai_books")) || [];
  const select = document.getElementById("bookSelect");

  if (!books.length) {
    select.innerHTML = `<option>No books found</option>`;
    return;
  }

  select.innerHTML = `<option value="">Select textbook</option>`;

  books.forEach(book => {
    const name = book.filename || book.name || "File";
    const display = name.includes("_") ? name.split("_").slice(1).join("_") : name;

    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = display;
    select.appendChild(opt);
  });
}

// START CBT
async function startCBT() {
  const userId = getUserId();
  const filename = bookSelect.value;

  if (!userId) return alert("Session expired");
  if (!filename) return alert("Select book");

  const res = await fetch(`${api}/generate-cbt`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-user-id": userId
    },
    body: JSON.stringify({
      filename,
      numQuestions: numQ.value,
      difficulty: difficulty.value
    })
  });

  const data = await res.json();
  questions = parse(data.questions);

  setupScreen.classList.add("hidden");
  examScreen.classList.remove("hidden");

  startTimer(time.value * 60);
  showQuestion();
}

// PARSER
function parse(text) {
  return text.split("Question:").slice(1).map(q => {
    const l = q.split("\n").filter(x=>x.trim());
    return {
      question: l[0],
      options: l.slice(1,5),
      answer: l.find(x=>x.includes("Answer")),
      explanation: l.find(x=>x.includes("Explanation"))
    };
  });
}

// SHOW QUESTION
function showQuestion() {
  const q = questions[index];

  question.innerText = q.question;
  progress.innerText = `${index+1}/${questions.length}`;

  options.innerHTML = "";

  q.options.forEach((opt,i)=>{
    const btn = document.createElement("button");

    let color = "bg-zinc-800";
    if(userAnswers[index]===i) color="bg-cyan-500";

    btn.className = `p-3 rounded ${color}`;
    btn.innerText = opt;
    btn.onclick = ()=>{userAnswers[index]=i;showQuestion();};

    options.appendChild(btn);
  });

  renderPalette();
}

// PALETTE
function renderPalette(){
  palette.innerHTML="";

  questions.forEach((_,i)=>{
    const btn=document.createElement("button");

    let color="bg-zinc-800";
    if(userAnswers[i]!=null) color="bg-green-500";
    if(flagged[i]) color="bg-yellow-500";
    if(i===index) color="bg-cyan-500";

    btn.className=`p-2 ${color}`;
    btn.innerText=i+1;
    btn.onclick=()=>{index=i;showQuestion();};

    palette.appendChild(btn);
  });
}

// NAV
function nextQuestion(){ if(index<questions.length-1){index++;showQuestion();}}
function prevQuestion(){ if(index>0){index--;showQuestion();}}

// FLAG
function toggleFlag(){ flagged[index]=!flagged[index]; showQuestion(); }

// REVIEW
function reviewUnanswered(){
  let i=userAnswers.findIndex(a=>a==null);
  if(i!==-1){index=i;showQuestion();}
}

// TIMER
function startTimer(sec){
  timer=setInterval(()=>{
    let m=Math.floor(sec/60), s=sec%60;
    timer.innerText=`${m}:${s<10?"0":""}${s}`;
    sec--;
    if(sec<0) submitExam();
  },1000);
}

// MODAL
function openModal(){submitModal.classList.remove("hidden");}
function closeModal(){submitModal.classList.add("hidden");}

// SUBMIT
function submitExam(){
  clearInterval(timer);

  let correct=0;

  questions.forEach((q,i)=>{
    const correctIndex=q.options.findIndex(o=>q.answer.includes(o));
    if(userAnswers[i]===correctIndex) correct++;
  });

  examScreen.classList.add("hidden");
  resultScreen.classList.remove("hidden");
  score.innerText=`${correct}/${questions.length}`;
}

// CORRECTIONS
function showCorrections(){
  corrections.innerHTML="";
  corrections.classList.remove("hidden");

  questions.forEach((q,i)=>{
    const correctIndex=q.options.findIndex(o=>q.answer.includes(o));

    corrections.innerHTML+=`
      <div class="mb-4 p-3 bg-zinc-800 rounded">
        <p>${i+1}. ${q.question}</p>
        <p>Your: ${q.options[userAnswers[i]]||"None"}</p>
        <p class="text-green-400">Correct: ${q.options[correctIndex]}</p>
        <p>${q.explanation||""}</p>
      </div>`;
  });
}

// INIT
loadBooks();
lucide.createIcons();
</script></body>
</html>
