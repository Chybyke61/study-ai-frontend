<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study.AI | Premium Learning Copilot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { primary: '#6366f1' } } } }
        }
    </script>

    <style>
        :root { --brand-primary: #6366f1; }
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #020617; 
            color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        /* Markdown & Chat Bubbles */
        .markdown-content h1, .markdown-content h2 { color: #818cf8; font-family: 'Plus Jakarta Sans'; margin: 1rem 0; font-weight: 700; }
        .markdown-content p { margin-bottom: 0.75rem; line-height: 1.7; color: #cbd5e1; }
        .message-user { background: rgba(99, 102, 241, 0.15); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 1.5rem 1.5rem 0 1.5rem; }
        .message-ai { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem 1.5rem 1.5rem 0; }

        /* Animations */
        @keyframes typing { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .dot { animation: typing 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        /* Flashcard 3D */
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .flashcard-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="min-h-screen flex flex-col">

    <div id="loadingScreen" class="fixed inset-0 z-[200] flex flex-col items-center justify-center bg-[#020617] backdrop-blur-md">
        <div class="relative flex items-center justify-center w-20 h-20 mb-6">
            <div class="absolute inset-0 border-2 border-indigo-500/20 rounded-2xl animate-spin"></div>
            <i data-lucide="brain-circuit" class="w-8 h-8 text-indigo-400 animate-pulse"></i>
        </div>
        <h2 class="text-xl font-bold text-white font-['Plus_Jakarta_Sans']">Study.AI</h2>
    </div>

    <div id="loginScreen" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="glass-card rounded-[2.5rem] p-8 w-full max-w-md shadow-2xl">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl mb-4 shadow-xl shadow-indigo-500/20">
                    <i data-lucide="graduation-cap" class="text-white w-7 h-7"></i>
                </div>
                <h2 class="text-2xl font-bold text-white font-['Plus_Jakarta_Sans']">Welcome Back</h2>
            </div>
            <div class="space-y-4">
                <input id="email" type="email" placeholder="Email" class="w-full px-5 py-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all">
                <div class="relative">
                    <input id="password" type="password" placeholder="Password" class="w-full px-5 py-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all">
                    <button type="button" onclick="togglePassword('password', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white"><i data-lucide="eye"></i></button>
                </div>
                <p onclick="forgotPassword()" class="text-right text-xs text-indigo-400 cursor-pointer">Forgot Password?</p>
                <div class="cf-turnstile mt-4 flex justify-center" data-sitekey="0x4AAAAAACuLeZ39cRRtBKwI" data-theme="dark"></div>
                <button onclick="login()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl transition-all">Sign In</button>
                <button onclick="googleLogin()" class="w-full flex items-center justify-center bg-slate-900 hover:bg-slate-800 border border-slate-700 text-white font-bold py-4 rounded-2xl transition-all gap-3">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4"> Continue with Google
                </button>
            </div>
        </div>
    </div>

    <div id="appContainer" class="hidden h-screen flex flex-col">
        <nav class="border-b border-white/5 bg-slate-950/50 backdrop-blur-md px-6 h-16 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-1.5 rounded-lg"><i data-lucide="zap" class="text-white w-4 h-4"></i></div>
                <h1 class="text-lg font-extrabold tracking-tight font-['Plus_Jakarta_Sans']">STUDY.AI</h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="loadBooks()" class="p-2 rounded-lg glass-card hover:bg-white/5 text-slate-400"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                <button onclick="logout()" class="px-4 py-1.5 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white text-xs font-bold rounded-lg transition-all">LOGOUT</button>
            </div>
        </nav>

        <div class="flex-1 flex flex-col lg:flex-row overflow-hidden relative">
            <aside class="w-full lg:w-80 flex flex-col gap-4 p-4 lg:p-6 border-r border-white/5 overflow-y-auto custom-scrollbar">
                <div class="glass-card rounded-3xl p-5 shadow-lg">
                    <h3 class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-3">Upload Material</h3>
                    <input type="file" id="bookFile" class="hidden" onchange="updateFileName()">
                    <label for="bookFile" class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-slate-700 rounded-2xl cursor-pointer hover:border-indigo-500/50 transition-all">
                        <i data-lucide="upload" class="w-5 h-5 text-slate-500 mb-1"></i>
                        <span id="fileNameDisplay" class="text-[10px] text-slate-400 font-medium">PDF or DOCX</span>
                    </label>
                    <button onclick="uploadBook()" class="w-full mt-3 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-bold py-3 rounded-xl transition-all">Index Knowledge</button>
                    
                    <div id="progWrapper" class="hidden mt-3 bg-slate-900/50 p-2 rounded-xl">
                        <div id="progText" class="text-[10px] font-bold text-slate-400 mb-1">0%</div>
                        <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                            <div id="progBar" class="bg-indigo-500 h-full w-0 transition-all"></div>
                        </div>
                    </div>
                </div>

                <div class="flex-1 glass-card rounded-3xl p-5 shadow-lg overflow-hidden flex flex-col">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Library (<span id="bookCount">0</span>)</h3>
                    <div id="books" class="flex-1 overflow-y-auto custom-scrollbar space-y-2 pr-1"></div>
                </div>
            </aside>

            <main class="flex-1 flex flex-col h-full bg-[#020617]/50 relative">
                <div id="result" class="flex-1 overflow-y-auto custom-scrollbar p-4 lg:p-8 space-y-6 scroll-smooth">
                    <div class="h-full flex flex-col items-center justify-center opacity-20 text-center space-y-4">
                        <i data-lucide="sparkles" class="w-16 h-16 text-indigo-400"></i>
                        <div>
                            <h4 class="text-xl font-bold text-white">Gemini-Powered Intelligence</h4>
                            <p class="max-w-xs text-sm mt-1">Chat with your documents, generate quizzes, or get deep explanations.</p>
                        </div>
                    </div>
                </div>

                <div class="w-full max-w-4xl mx-auto p-4 lg:p-6 sticky bottom-0 z-10">
                    <div id="suggestions" class="flex gap-2 overflow-x-auto custom-scrollbar pb-3 mb-1 no-scrollbar">
                        <button onclick="setPrompt('Summarize the main points')" class="whitespace-nowrap px-4 py-2 rounded-full bg-white/5 border border-white/10 text-xs font-medium text-slate-300 hover:bg-white/10 transition-all">Summarize main points</button>
                        <button onclick="setPrompt('Explain this like I\'m 5')" class="whitespace-nowrap px-4 py-2 rounded-full bg-white/5 border border-white/10 text-xs font-medium text-slate-300 hover:bg-white/10 transition-all">Explain like I'm 5</button>
                        <button onclick="setPrompt('Generate 5 critical questions')" class="whitespace-nowrap px-4 py-2 rounded-full bg-white/5 border border-white/10 text-xs font-medium text-slate-300 hover:bg-white/10 transition-all">Generate questions</button>
                        <button onclick="setPrompt('What are the key formulas?')" class="whitespace-nowrap px-4 py-2 rounded-full bg-white/5 border border-white/10 text-xs font-medium text-slate-300 hover:bg-white/10 transition-all">Key formulas</button>
                    </div>

                    <div class="glass-card rounded-[2.5rem] p-4 shadow-2xl border border-white/10">
                        <div class="relative flex items-center bg-slate-900/50 rounded-2xl border border-white/5 px-4 focus-within:border-indigo-500/50 transition-all">
                            <i data-lucide="message-square" class="w-5 h-5 text-indigo-400"></i>
                            <input id="topic" type="text" placeholder="Ask anything about your documents..." 
                                class="flex-1 bg-transparent py-4 px-4 text-white placeholder-slate-500 outline-none text-sm sm:text-base"
                                onkeypress="if(event.key === 'Enter') requestAI('explain')">
                            <button onclick="requestAI('explain')" class="p-2 bg-indigo-600 rounded-xl text-white hover:bg-indigo-500 transition-all">
                                <i data-lucide="arrow-up" class="w-5 h-5"></i>
                            </button>
                        </div>

                        <div class="flex flex-wrap items-center gap-3 mt-4">
                            <select id="level" class="bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-xs font-bold text-slate-300 outline-none">
                                <option value="University">University Level</option>
                                <option value="Secondary">High School</option>
                                <option value="Primary">Primary</option>
                            </select>
                            <select id="bookSelector" class="bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-xs font-bold text-slate-400 outline-none flex-1 max-w-[200px] truncate">
                                <option value="all">select a book</option>
                            </select>
                            <div class="flex gap-2 ml-auto">
                                <button onclick="requestAI('quiz')" class="p-2.5 rounded-xl bg-emerald-600/20 text-emerald-400 border border-emerald-500/20 hover:bg-emerald-600 hover:text-white transition-all" title="Quiz"><i data-lucide="help-circle" class="w-4 h-4"></i></button>
                                <button onclick="requestAI('notes')" class="p-2.5 rounded-xl bg-amber-600/20 text-amber-400 border border-amber-500/20 hover:bg-amber-600 hover:text-white transition-all" title="Notes"><i data-lucide="file-text" class="w-4 h-4"></i></button>
                                <button onclick="runFlashcards(event)" class="p-2.5 rounded-xl bg-indigo-600/20 text-indigo-400 border border-indigo-500/20 hover:bg-indigo-600 hover:text-white transition-all" title="Flashcards"><i data-lucide="layers" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="toast" class="fixed bottom-32 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-all z-[100] font-bold text-xs border border-slate-600 pointer-events-none"></div>

    <script>
        const api = "https://study-ai-tq7i.onrender.com";
        const supabaseUrl = "https://hffbjtbahfwudigywzzx.supabase.co";
        const supabaseKey = "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5";

        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        let currentUser = null;
        let allBooks = [];
        const sessionId = localStorage.getItem("studyai_session") || crypto.randomUUID();
        localStorage.setItem("studyai_session", sessionId);

        lucide.createIcons();

        // AUTH LOGIC (Original Preservation)
        supabaseClient.auth.onAuthStateChange((event, session) => { if (session?.user) checkUser(); });

        async function handleEmailRedirect() {
            const hash = window.location.hash;
            if (!hash || !hash.includes("access_token")) return;
            const isGoogle = hash.includes("provider_token");
            if (isGoogle) window.location.replace("/dashboard");
            else { await supabaseClient.auth.signOut(); window.location.replace("/?verified=1"); }
        }

        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const user = session?.user;
            if (user) {
                if (!user.email_confirmed_at && user.app_metadata.provider !== "google") {
                    await supabaseClient.auth.signOut(); showToast("📩 Verify email first");
                    document.getElementById("loginScreen").classList.remove("hidden");
                    hideLoader(); return;
                }
                currentUser = user;
                document.getElementById("loginScreen").classList.add("hidden");
                document.getElementById("appContainer").classList.remove("hidden");
                loadBooks(); hideLoader();
            } else {
                document.getElementById("loginScreen").classList.remove("hidden");
                hideLoader();
            }
        }

        async function login() {
            const token = document.querySelector('[name="cf-turnstile-response"]')?.value;
            if (!token) return showToast("⚠️ Verify humanity", true);
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) { showToast(`⚠️ ${error.message}`); turnstile.reset(); return; }
            if (!data.user.email_confirmed_at) { showToast("📩 Verify email"); return; }
            window.location.reload();
        }

        async function googleLogin() { 
            await supabaseClient.auth.signInWithOAuth({ provider: "google", options: { redirectTo: window.location.origin + "/app" } }); 
        }

        async function logout() { await supabaseClient.auth.signOut(); window.location.reload(); }

        // LIBRARY LOGIC
        async function loadBooks() {
            try {
                const res = await fetch(`${api}/books`, { headers: { "x-user-id": currentUser.id } });
                allBooks = await res.json();
                renderBooks();
            } catch (err) { console.error(err); }
        }

        function renderBooks() {
            const container = document.getElementById("books");
            const selector = document.getElementById("bookSelector");
            container.innerHTML = "";
            selector.innerHTML = '<option value="all">select a book</option>';
            document.getElementById("bookCount").innerText = allBooks.length;

            allBooks.forEach(book => {
                const fileNameSafe = book.filename || book.name;
                const displayName = fileNameSafe.split('_').slice(1).join('_') || fileNameSafe;
                const div = document.createElement("div");
                div.className = "group bg-slate-900/60 border border-slate-700/50 p-3 rounded-xl flex items-center justify-between hover:border-indigo-500/50 transition-all";
                div.innerHTML = `
                    <div class="flex items-center gap-2 overflow-hidden">
                        <i data-lucide="file-text" class="w-3.5 h-3.5 text-indigo-400 shrink-0"></i>
                        <span class="text-[10px] truncate text-slate-300 font-medium">${displayName}</span>
                    </div>
                    <button onclick="deleteBook('${fileNameSafe}')" class="p-1 text-slate-500 hover:text-red-400"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                `;
                container.appendChild(div);
                const opt = document.createElement("option");
                opt.value = fileNameSafe; opt.innerText = displayName;
                selector.appendChild(opt);
            });
            lucide.createIcons();
        }

        async function uploadBook() {
            const file = document.getElementById("bookFile").files[0];
            if (!file) return showToast("⚠️ Select a file");
            const progWrapper = document.getElementById("progWrapper");
            const progBar = document.getElementById("progBar");
            const progText = document.getElementById("progText");
            
            progWrapper.classList.remove('hidden');
            const eventSource = new EventSource(`${api}/progress?userId=${currentUser.id}`);
            eventSource.onmessage = (e) => {
                const d = JSON.parse(e.data);
                progText.innerText = `${d.progress}%`;
                progBar.style.width = `${d.progress}%`;
                if (d.progress >= 100) { eventSource.close(); loadBooks(); setTimeout(()=>progWrapper.classList.add('hidden'), 2000); }
            };

            const formData = new FormData();
            formData.append("file", file);
            await fetch(`${api}/upload-stream`, { method: "POST", headers: { "x-user-id": currentUser.id }, body: formData });
        }

        async function deleteBook(name) {
            if (!confirm("Delete?")) return;
            await fetch(`${api}/delete-book/${encodeURIComponent(name)}`, { method: "DELETE", headers: { "x-user-id": currentUser.id } });
            loadBooks();
        }

        // CHAT & AI LOGIC (Restructured for Append)
        function setPrompt(text) { document.getElementById("topic").value = text; }

        function appendMessage(role, content) {
            const resultBox = document.getElementById("result");
            const isAI = role === 'ai';
            const msgDiv = document.createElement("div");
            msgDiv.className = `flex ${isAI ? 'justify-start' : 'justify-end'} animate-fade-in`;
            
            const innerHtml = `
                <div class="${isAI ? 'message-ai' : 'message-user'} max-w-[85%] p-4 shadow-lg group relative">
                    ${isAI ? `<div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Study.AI Response</span>
                        <button onclick="copyText(this)" class="opacity-0 group-hover:opacity-100 p-1.5 rounded-lg hover:bg-white/10 transition-all text-slate-400" title="Copy Content">
                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>` : ''}
                    <div class="markdown-content text-sm leading-relaxed">${isAI ? marked.parse(content) : content}</div>
                </div>
            `;
            msgDiv.innerHTML = innerHtml;
            resultBox.appendChild(msgDiv);
            resultBox.scrollTop = resultBox.scrollHeight;
            lucide.createIcons();
            return msgDiv;
        }

        async function requestAI(type) {
            const topicInput = document.getElementById("topic");
            const topic = topicInput.value.trim();
            if (!topic) return topicInput.focus();

            // Clear suggestions on first interaction if needed, or keep
            const resultBox = document.getElementById("result");
            if (resultBox.querySelector('.opacity-20')) resultBox.innerHTML = '';

            appendMessage('user', topic);
            topicInput.value = '';

            // Loading state bubble
            const loadingDiv = document.createElement("div");
            loadingDiv.className = "flex justify-start items-center gap-2 p-4 text-indigo-400";
            loadingDiv.innerHTML = `<span class="dot w-1.5 h-1.5 bg-indigo-500 rounded-full"></span><span class="dot w-1.5 h-1.5 bg-indigo-500 rounded-full"></span><span class="dot w-1.5 h-1.5 bg-indigo-500 rounded-full"></span>`;
            resultBox.appendChild(loadingDiv);
            resultBox.scrollTop = resultBox.scrollHeight;

            try {
                const endpoint = type === 'explain' ? 'deep-explain' : type;
                const res = await fetch(`${api}/${endpoint}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "x-user-id": currentUser.id },
                    body: JSON.stringify({
                        topic,
                        level: document.getElementById("level").value,
                        book: document.getElementById("bookSelector").value,
                        sessionId
                    })
                });
                const data = await res.json();
                resultBox.removeChild(loadingDiv);

                const raw = data.explanation || data.quiz || data.notes;
                if (type === "quiz") {
                    const quizContainer = document.createElement('div');
                    quizContainer.className = "w-full";
                    resultBox.appendChild(quizContainer);
                    renderQuiz(raw, quizContainer);
                } else {
                    appendMessage('ai', raw);
                }
            } catch (err) {
                resultBox.removeChild(loadingDiv);
                showToast("❌ AI request failed");
            }
        }

        async function runFlashcards(e) {
            const topic = document.getElementById("topic").value;
            if (!topic) return showToast("⚠️ Enter topic first");
            const resultBox = document.getElementById("result");
            resultBox.innerHTML = '<div class="flex justify-center p-10"><i data-lucide="loader-2" class="w-8 h-8 animate-spin text-indigo-500"></i></div>';
            lucide.createIcons();
            
            try {
                const res = await fetch(`${api}/flashcards`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "x-user-id": currentUser.id },
                    body: JSON.stringify({ topic, level: document.getElementById("level").value, book: document.getElementById("bookSelector").value })
                });
                const data = await res.json();
                const cards = data.flashcards.split("\n").filter(l => l.startsWith("Q:") || l.startsWith("A:"));
                let html = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
                for(let i=0; i<cards.length; i+=2) {
                    const q = cards[i].replace("Q:", "").trim();
                    const a = (cards[i+1]||"").replace("A:", "").trim();
                    html += `
                        <div class="flashcard h-40 cursor-pointer perspective-1000" onclick="this.classList.toggle('flipped')">
                            <div class="flashcard-inner relative w-full h-full preserve-3d">
                                <div class="absolute inset-0 backface-hidden glass-card rounded-2xl p-5 flex items-center justify-center text-center">
                                    <p class="text-xs font-semibold text-white">${q}</p>
                                </div>
                                <div class="absolute inset-0 backface-hidden bg-indigo-600 rounded-2xl p-5 flex items-center justify-center text-center" style="transform: rotateY(180deg);">
                                    <p class="text-xs font-bold text-white">${a}</p>
                                </div>
                            </div>
                        </div>`;
                }
                resultBox.innerHTML = html + `</div>`;
            } catch (err) { showToast("❌ Failed"); }
        }

        function copyText(btn) {
            const content = btn.closest('.message-ai').querySelector('.markdown-content').innerText;
            navigator.clipboard.writeText(content);
            showToast("📋 Copied to clipboard");
            const icon = btn.querySelector('i');
            icon.setAttribute('data-lucide', 'check');
            lucide.createIcons();
            setTimeout(() => { icon.setAttribute('data-lucide', 'copy'); lucide.createIcons(); }, 2000);
        }

        // ORIGINAL UTILS Preservation
        function updateFileName() { const f = document.getElementById('bookFile').files[0]; if (f) document.getElementById('fileNameDisplay').innerText = f.name; }
        function showToast(m) { const t = document.getElementById("toast"); t.innerText = m; t.style.opacity = "1"; setTimeout(()=>t.style.opacity="0", 3000); }
        function hideLoader() { document.getElementById("loadingScreen").style.display = "none"; }
        function togglePassword(id, btn) { const i = document.getElementById(id); i.type = i.type === "password" ? "text" : "password"; lucide.createIcons(); }
        
        // Redefined Quiz to target a specific container to allow appending
        function renderQuiz(quizText, target) {
            // Original quiz logic remains same but outputs to 'target' instead of '#result'
            const rawQuestions = quizText.split(/##\s*Question/i).slice(1);
            const questions = rawQuestions.slice(0, 5);
            let html = `<div class="glass-card rounded-3xl p-6 border-emerald-500/20 shadow-xl mb-6">`;
            questions.forEach((q, i) => {
                const lines = q.split("\n");
                let qText = lines[0].replace(/\*\*/g, "").trim();
                html += `<div class="mb-6"><p class="text-white font-bold mb-3">${i+1}. ${qText}</p>`;
                lines.forEach(l => {
                    if (l.match(/^[A-D]\)/)) {
                        const letter = l[0];
                        html += `<label class="flex items-center gap-3 p-3 mb-2 rounded-xl bg-white/5 border border-white/5 cursor-pointer hover:bg-white/10">
                            <input type="radio" name="q${i}" value="${letter}" class="accent-indigo-500">
                            <span class="text-xs text-slate-300">${l}</span>
                        </label>`;
                    }
                });
                html += `</div>`;
            });
            html += `<button onclick="showToast('Evaluation submitted!')" class="w-full bg-emerald-600 py-3 rounded-xl font-bold">Submit Quiz</button></div>`;
            target.innerHTML = html;
            lucide.createIcons();
        }

        (async () => {
            await handleEmailRedirect();
            setTimeout(checkUser, 800);
        })();
    </script>
</body>
</html>
