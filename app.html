    <script>
        // 6️⃣ Toggle Dark and Light Mode Logic
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.setAttribute('data-lucide', 'moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        }

        // Initialize theme icon on load
        document.addEventListener('DOMContentLoaded', () => {
            const icon = document.getElementById('themeIcon');
            if(icon) {
                if (document.documentElement.classList.contains('dark')) {
                    icon.setAttribute('data-lucide', 'sun');
                } else {
                    icon.setAttribute('data-lucide', 'moon');
                }
            }
            
            // Mobile Sidebar Toggle Logic
            const mobileBtn = document.getElementById('mobileMenuBtn');
            const closeBtn = document.getElementById('closeSidebarBtn');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            function toggleSidebar() {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            }

            if(mobileBtn) mobileBtn.addEventListener('click', toggleSidebar);
            if(closeBtn) closeBtn.addEventListener('click', toggleSidebar);
            if(overlay) overlay.addEventListener('click', toggleSidebar);

            // Load persisted chat
            loadChatHistory();
        });

        const api = "https://study-ai-tq7i.onrender.com";

        const supabaseKey = "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5";

        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        supabaseClient.auth.onAuthStateChange((event, session) => {
    if (session?.user) {
        checkUser(); // re-run when session is ready
    }
});

        async function handleEmailRedirect() {
    const hash = window.location.hash;
    const isGoogle = hash.includes("provider_token");

    if (!hash || !hash.includes("access_token")) return;

    const { data } = await supabaseClient.auth.getSession();
    const provider = data?.session?.user?.app_metadata?.provider;

    if (isGoogle) {
        window.location.replace("/dashboard");
    } else {
        await supabaseClient.auth.signOut();
        window.location.replace("/?verified=1");
    }
        }

        // --- AUTH ---
    async function checkUser() {
        const loader = document.getElementById("loadingScreen");
loader.style.opacity = "1";
loader.style.display = "flex";
    const { data: { session } } = await supabaseClient.auth.getSession();
const user = session?.user;
    const path = window.location.pathname;

    if (user) {
if (!window.location.pathname.startsWith("/dashboard")) {
    window.location.href = "/dashboard";
    return;
}
        if (!user.email_confirmed_at && user.app_metadata.provider !== "google") {
            await supabaseClient.auth.signOut();
            showToast("Verify your email first");
            document.getElementById("loginScreen").classList.remove("hidden");
            document.getElementById("appContainer").classList.add("hidden");
            hideLoader(); 
            return;
        }

        currentUser = user;
        
        if (path.startsWith("/dashboard")) {
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("appContainer").classList.remove("hidden");
    loadBooks();
    hideLoader();
        } else {
            window.location.href = "/dashboard";
        }
    } else {
        if (path.startsWith("/dashboard")) {
            window.location.href = "/";
            return;
        }
        document.getElementById("loginScreen").classList.remove("hidden");
        document.getElementById("appContainer").classList.add("hidden");
         hideLoader();
    }
    }

        async function login() {
const key = "loginAttempt";
const lastAttempt = localStorage.getItem(key);
const now = Date.now();

if (lastAttempt && now - lastAttempt < 3000) {
    showToast("Please wait a moment...");
    return;
}
            
        const token = document.querySelector('[name="cf-turnstile-response"]')?.value;

    if (!token) {
    return showToast("Please verify you're human", true);
    }
    localStorage.setItem(key, now);
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
        showToast(error.message);
        if (window.turnstile) turnstile.reset();

        async function uploadBook() {
    if (!currentUser || !currentUser.id) return showToast("Please login first");
    
    const fileInput = document.getElementById("bookFile");
    if (!fileInput.files[0]) return showToast("Select a file first.");

    const file = fileInput.files[0];
    const allowedTypes = [ "application/pdf", "application/vnd.openxmlformats-officedocument.wordprocessingml.document", "application/msword" ];
    const fileName = file.name.toLowerCase();

if (
    !allowedTypes.includes(file.type) &&
    !fileName.endsWith(".pdf") &&
    !fileName.endsWith(".doc") &&
    !fileName.endsWith(".docx")
) {
    showToast("Only PDF and DOCX allowed");
    fileInput.value = ""; 
    document.getElementById("fileNameDisplay").innerText = "Select PDF or DOCX";
    return;
}
    const progWrapper = document.getElementById("progWrapper");
    const progBar = document.getElementById("progBar");
    const progText = document.getElementById("progText");

    let eventSource;

    try {
        progWrapper.classList.remove('hidden');
        progBar.style.width = '0%';
        progText.innerText = 'Uploading... 0%';

        function connectSSE() {
            eventSource = new EventSource(`${api}/progress?userId=${currentUser.id}`);

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);

                progText.innerText = `${data.step} ${data.progress}%`;
                progBar.style.width = `${data.progress}%`;

                if (data.progress >= 100) {
                    eventSource.close();
                    progText.innerText = "Completed";
                    progBar.classList.replace("bg-[#0b57d0]", "bg-green-500");
                    showToast("Upload complete");
                    loadBooks();

                    setTimeout(() => {
                        progWrapper.classList.add("hidden");
                    }, 3000);
                }
            };

            eventSource.onerror = () => {
                eventSource.close();
                setTimeout(connectSSE, 2000);
            };
        }

        connectSSE();

        const formData = new FormData();
        formData.append("file", file);

        const res = await fetch(`${api}/upload-stream`, {
            method: "POST",
            headers: { "x-user-id": currentUser.id },
            body: formData
        });

        if (!res.ok) throw new Error("Upload failed");

    } catch (err) {
        if (eventSource) eventSource.close();
        progText.innerText = "Failed";
        progBar.classList.replace("bg-[#0b57d0]", "bg-red-500");
        showToast("Upload failed");
    }
        }

    let rationales = [];
    let allOptions = [];

    const lines = q.split("\n");
    let questionText = "";
    let options = [];

    lines.forEach(line => {
        if (!questionText && line.length > 15 && !line.match(/^[A-D]\)/)) {
            questionText = line.replace(/\*\*/g, "").replace(/stem:/i, "").trim();
        }
if (/correct answer|answer|option/i.test(line)) {
    const match = line.match(/\b([A-D])\b/);
    if (match) correctAnswers.push(match[1].toUpperCase());
}
        if (line.toLowerCase().includes("rationale")) {
    const exp = line.replace(/.*Academic Rationale:\s*/i, "").trim();
    if (exp) rationales.push(exp);
        }
        if (line.startsWith("A)") || line.startsWith("B)") || line.startsWith("C)") || line.startsWith("D)")) {
            const letter = line.charAt(0);
            const cleanOption = line.replace(/^[A-D]\)\s*/, "").replace(/\*\*/g, "").trim();
            options.push({ letter, text: cleanOption });

    html += `<p class="text-slate-900 dark:text-white text-[15px] mb-4 leading-relaxed">${questionText}</p>`;

    allOptions.push(options);
    html += `</div>`;

        function submitQuiz() {
    let score = 0;
     if (!window.correctAnswers || window.correctAnswers.length === 0) {
    return showToast("Quiz not ready.");
     }
            
    const total = window.correctAnswers.length;
    let resultHTML = "";

    for (let i = 0; i < total; i++) {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const userAnswer = selected ? selected.value : null;
        const correct = window.correctAnswers[i];
        const options = window.allOptions[i] || [];

        const correctText = options.find(opt => opt.letter === correct)?.text || "";
        const userText = options.find(opt => opt.letter === userAnswer)?.text || "";
        const explanation = window.rationales[i] || "";
        
            let fixedExplanation = explanation;
            if (correct && explanation) {
            fixedExplanation = explanation.replace(/correct answer is [A-D]/i, `correct answer is ${correct}`);
         }

        const isCorrect = userAnswer?.trim() === correct?.trim();
        
       const correctEl = document.getElementById(`q${i}-${correct}`);
          if (correctEl) {
             correctEl.classList.remove("bg-white", "dark:bg-[#1e1f20]", "border-gray-200", "dark:border-[#444746]");
             correctEl.classList.add("bg-green-50", "dark:bg-green-900/20", "border-green-500");
          }

        if (userAnswer && userAnswer !== correct) {
            const wrongEl = document.getElementById(`q${i}-${userAnswer}`);
        if (wrongEl) {
            wrongEl.classList.remove("bg-white", "dark:bg-[#1e1f20]", "border-gray-200", "dark:border-[#444746]");
            wrongEl.classList.add("bg-red-50", "dark:bg-red-900/20", "border-red-400");
       }
    }

         const inputs = document.querySelectorAll(`input[name="q${i}"]`);
             inputs.forEach(input => { input.disabled = true; });

        if (isCorrect) score++;

        resultHTML += `
        <div class="mb-6 p-5 rounded-3xl border ${ isCorrect ? "bg-green-50/50 dark:bg-green-900/10 border-green-200 dark:border-green-800" : "bg-red-50/50 dark:bg-red-900/10 border-red-200 dark:border-red-800" }">
            <div class="flex items-center justify-between mb-2">
                <span class="text-[15px] font-medium text-slate-900 dark:text-white">Question ${i + 1}</span>
                <span class="text-sm font-medium ${ isCorrect ? "text-green-600 dark:text-green-400" : "text-red-600 dark:text-red-400" }">${isCorrect ? "Correct" : "Incorrect"}</span>
            </div>
            ${ !isCorrect ? `<p class="text-sm text-gray-600 dark:text-gray-400 mb-2">Your Answer: ${ userAnswer ? userAnswer + " - " + userText : "Not answered" }</p>` : "" }
            <p class="text-sm text-slate-800 dark:text-gray-200 mb-3">Correct Answer: <span class="font-medium">${correct} - ${correctText || "Missing"}</span></p>
        ${ explanation ? `
<div class="mt-2">
    <button onclick="toggleExplanation(${i})" class="flex items-center gap-1.5 text-[#0b57d0] dark:text-[#a8c7fa] hover:underline text-sm font-medium">
        <i id="toggle-icon-${i}" data-lucide="chevron-down" class="w-4 h-4 transition-transform"></i>
        <span id="toggle-text-${i}">Show Explanation</span>
    </button>
    <div id="explanation-${i}" class="hidden mt-3 text-[15px] text-gray-700 dark:text-gray-300 leading-relaxed pl-4 border-l-2 border-[#0b57d0] dark:border-[#a8c7fa]">
        ${fixedExplanation}
    </div>
</div>` : "" }
        </div>`;
    }

    const percentageScore = total ? Math.round((score / total) * 100) : 0;

    const resultSummaryHtml = `
    <div class="flex items-start gap-4 w-full max-w-3xl mx-auto pb-8">
        <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 mt-1">
            <i data-lucide="sparkles" class="w-6 h-6 text-[#4285f4] dark:text-[#a8c7fa]"></i>
        </div>
        <div class="flex-1 w-full">
            <div class="mb-6 px-6 py-8 rounded-3xl bg-[#f0f4f9] dark:bg-[#1e1f20] text-center border border-gray-100 dark:border-[#282a2c]">
                <h2 class="text-4xl font-display text-slate-900 dark:text-white mb-2">${score} <span class="text-xl text-gray-500">/ ${total}</span></h2>
                <p class="text-[15px] text-gray-600 dark:text-gray-400 font-medium">Score: ${percentageScore}%</p>
            </div>
            ${resultHTML}
        </div>
    </div>`;

    document.getElementById("result").insertAdjacentHTML('beforeend', resultSummaryHtml);
    saveToChatHistory(resultSummaryHtml);
    lucide.createIcons();
    const resultBox = document.getElementById("result");
    resultBox.scrollTop = resultBox.scrollHeight;
        }
       
      async function resetQuiz(event) {
    const btn = event?.currentTarget;
    const icon = btn?.querySelector("i");
    if (icon) icon.classList.add("animate-spin");
    await requestAI("quiz");
    if (icon) icon.classList.remove("animate-spin");
      }

        function toggleExplanation(i) {
    const box = document.getElementById(`explanation-${i}`);
    const text = document.getElementById(`toggle-text-${i}`);
    const icon = document.getElementById(`toggle-icon-${i}`);
    if (!box || !text) return;
    if (box.classList.contains("hidden")) {
        box.classList.remove("hidden");
        text.innerText = "Hide Explanation";
        if (icon) icon.classList.add("rotate-180");
    } else {
        box.classList.add("hidden");
        text.innerText = "Show Explanation";
        if (icon) icon.classList.remove("rotate-180");
    }
        }

        function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector("i");
    if (input.type === "password") {
        input.type = "text";
        icon.setAttribute("data-lucide", "eye-off");
    } else {
        input.type = "password";
        icon.setAttribute("data-lucide", "eye");
    }
    lucide.createIcons();
        }

    async function forgotPassword() {
    const email = document.getElementById("email").value;
    if (!email) return showToast("Enter your email first");
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + "/reset.html"
    });
    if (error) return showToast(error.message);
    showToast("Reset link sent");
    }
