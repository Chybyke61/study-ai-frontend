        // 6️⃣ Toggle Dark and Light Mode Logic
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.setAttribute('data-lucide', 'moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        }

        // Initialize theme icon on load

            if(icon) {

                    icon.setAttribute('data-lucide', 'moon');

        async function checkUser() {
            const loader = document.getElementById("loadingScreen");
            loader.style.opacity = "1";
            loader.style.display = "flex";
            const { data: { session } } = await supabaseClient.auth.getSession();
            const user = session?.user;
            const path = window.location.pathname;

            if (user) {
                if (!window.location.pathname.startsWith("/dashboard")) {
                    window.location.href = "/dashboard";
                    return;
                }
                if (!user.email_confirmed_at && user.app_metadata.provider !== "google") {
                    await supabaseClient.auth.signOut();
                    showToast("Verify your email first");
                    document.getElementById("loginScreen").classList.remove("hidden");
                    document.getElementById("appContainer").classList.add("hidden");
                    hideLoader(); 
                    return;
                }

                currentUser = user;
                
                if (path.startsWith("/dashboard")) {
                    document.getElementById("loginScreen").classList.add("hidden");
                    document.getElementById("appContainer").classList.remove("hidden");
                    loadBooks();
                    hideLoader();
                } else {
                    window.location.href = "/dashboard";
                }
            } else {
                if (path.startsWith("/dashboard")) {
                    window.location.href = "/";
                    return;
                }
                document.getElementById("loginScreen").classList.remove("hidden");
                document.getElementById("appContainer").classList.add("hidden");
                hideLoader();
            }
        }

        async function login() {
            const key = "loginAttempt";
            const lastAttempt = localStorage.getItem(key);
            const now = Date.now();

            if (lastAttempt && now - lastAttempt < 3000) {
                showToast("Please wait a moment...");
                return;
            }
                        
            const token = document.querySelector('[name="cf-turnstile-response"]')?.value;

            if (!token) {
                return showToast("Please verify you're human", true);
            }
            localStorage.setItem(key, now);
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                showToast(error.message);
                if (window.turnstile) turnstile.reset();
                return;
            }

            if (!data.user.email_confirmed_at) {
                showToast("Verify your email first");
                if (window.turnstile) turnstile.reset();
                return;
            }

            showToast("Authenticated");
            window.location.href = "/dashboard";
        }

        async function uploadBook() {
            if (!currentUser || !currentUser.id) return showToast("Please login first");
            
            const fileInput = document.getElementById("bookFile");
            if (!fileInput.files[0]) return showToast("Select a file first.");

            const file = fileInput.files[0];
            const allowedTypes = [
                    "application/pdf",
                    "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                    "application/msword",
                    "application/vnd.openxmlformats-officedocument.presentationml.presentation"
            ];
            const fileName = file.name.toLowerCase();

            if (
                !allowedTypes.includes(file.type) &&
                !fileName.endsWith(".pdf") &&
                !fileName.endsWith(".doc") &&
                !fileName.endsWith(".docx") &&
                !fileName.endsWith(".pptx")
            ) {
                showToast("Only PDF, DOCX, PPT allowed");
                fileInput.value = ""; 
                document.getElementById("fileNameDisplay").innerText = "Select PDF, DOCX or PPT";
                return;
            }
            const progWrapper = document.getElementById("progWrapper");
            const progBar = document.getElementById("progBar");
            const progText = document.getElementById("progText");

            let eventSource;

            try {
                progWrapper.classList.remove('hidden');
                progBar.style.width = '0%';
                progText.innerText = 'Uploading... 0%';

                function connectSSE() {
                    eventSource = new EventSource(`${api}/progress?userId=${currentUser.id}`);

                    eventSource.onmessage = (event) => {
                        const data = JSON.parse(event.data);

                        progText.innerText = `${data.step} ${data.progress}%`;
                        progBar.style.width = `${data.progress}%`;

                        if (data.progress >= 100) {
                            eventSource.close();
                            progText.innerText = "Completed";
                            progBar.classList.replace("from-[#06b6d4]", "from-green-500");
                            progBar.classList.replace("to-[#8b5cf6]", "to-emerald-400");
                            showToast("Upload complete");
                            loadBooks();

                            setTimeout(() => {
                                progWrapper.classList.add("hidden");
                            }, 3000);
                        }
                    };

                    eventSource.onerror = () => {
                        eventSource.close();
                        setTimeout(connectSSE, 2000);
                    };
                }

                connectSSE();

                const formData = new FormData();
                formData.append("file", file);

                const res = await fetch(`${api}/upload-stream`, {
                    method: "POST",
                    headers: { "x-user-id": currentUser.id },
                    body: formData
                });

                if (!res.ok) throw new Error("Upload failed");

            } catch (err) {
                if (eventSource) eventSource.close();
                progText.innerText = "Failed";
                progBar.classList.replace("from-[#06b6d4]", "from-red-500");
                progBar.classList.replace("to-[#8b5cf6]", "to-orange-500");
                showToast("Upload failed");
            }
        }

        function renderQuiz(quizText) {
            window.correctAnswers = [];
            window.rationales = [];
            window.allOptions = [];
 
            const quizId = "quiz-" + Date.now();
            window.currentQuizId = quizId;
            const resultBox = document.getElementById("result");
            const topic = document.getElementById("topic").value;

            const rawQuestions = quizText.split(/##\s*Question/i).slice(1);
            const questions = rawQuestions.slice(0, 5).filter(q => q.trim().length > 0);
            let correctAnswers = [];
            let rationales = [];
            let allOptions = [];

            let html = `
            <div class="flex flex-col mb-8">
                <div class="self-end bg-zinc-100 dark:bg-[#27272a] text-zinc-900 dark:text-white rounded-2xl px-5 py-3 mb-8 max-w-[85%] ml-auto border border-zinc-200 dark:border-[#3f3f46]">
                    <p class="text-[15px] font-medium">Create a quiz: ${topic}</p>
                </div>
                
                <div class="flex items-start gap-4 w-full">
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-[#ec4899] to-[#f43f5e] flex items-center justify-center shrink-0 mt-1 shadow-sm text-white">
                        <i data-lucide="help-circle" class="w-4 h-4"></i>
                    </div>
                    <div class="flex-1 w-full max-w-2xl">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-xl font-bold text-zinc-900 dark:text-white font-display">Practice Quiz</h2>
                        </div>
            `;

        questions.forEach((q, i) => {
            html += `<div id="${quizId}-question-${i}" class="mb-8 p-6 bg-white dark:bg-[#18181b] rounded-2xl border border-zinc-200 dark:border-[#27272a] shadow-sm">`;
            html += `<div class="mb-3"><span class="text-xs font-bold uppercase tracking-wider text-zinc-400 bg-zinc-100 dark:bg-[#27272a] px-2 py-1 rounded-md">Question ${i + 1}</span></div>`;

            const lines = q.split("\n");
            let questionText = "";
            let options = [];

            lines.forEach(line => {
                if (!questionText && line.length > 15 && !line.match(/^[A-D]\)/)) {
                    questionText = line.replace(/\*\*/g, "").replace(/stem:/i, "").trim();
                }
                if (/correct answer|answer|option/i.test(line)) {
                    const match = line.match(/\b([A-D])\b/);
                    if (match) correctAnswers.push(match[1].toUpperCase());
                }
                if (line.toLowerCase().includes("rationale")) {
                    const exp = line.replace(/.*Academic Rationale:\s*/i, "").trim();
                    if (exp) rationales.push(exp);
                }
                if (line.startsWith("A)") || line.startsWith("B)") || line.startsWith("C)") || line.startsWith("D)")) {
                    const letter = line.charAt(0);
                    const cleanOption = line.replace(/^[A-D]\)\s*/, "").replace(/\*\*/g, "").trim();
                    options.push({ letter, text: cleanOption });
                }
            });

            html += `<p class="text-zinc-900 dark:text-white text-[15px] font-medium mb-5 leading-relaxed">${questionText}</p>`;

            options.forEach(opt => {
                html += `
                <label id="${quizId}-q${i}-${opt.letter}" data-letter="${opt.letter}" class="flex items-center gap-3 px-4 py-3.5 mb-2 rounded-xl bg-zinc-50 dark:bg-[#09090b] hover:bg-zinc-100 dark:hover:bg-[#27272a] border border-zinc-200 dark:border-[#3f3f46] transition-all cursor-pointer font-medium">
                    <input type="radio" name="${quizId}-q${i}" value="${opt.letter}" class="accent-[#ec4899] w-4 h-4">
                    <span class="text-[15px] text-zinc-800 dark:text-zinc-200">${opt.text}</span>
                </label>`;
            });

            allOptions.push(options);
            html += `</div>`;
        });
            
            html += `
                        <button onclick="submitQuiz()" class="mt-2 w-full sm:w-auto px-8 py-3 bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 font-bold rounded-xl transition-all active:scale-95 text-sm shadow-md hover:shadow-lg">
                            Submit Answers
                        </button>
                    </div>
                </div>
            </div>`;

              if (correctAnswers.length === 0) {
            showToast("Retrying...");
            return requestAI("quiz");
              }

               correctAnswers = correctAnswers.slice(0, questions.length);
               rationales = rationales.slice(0, questions.length);
               allOptions = allOptions.slice(0, questions.length);
                window.correctAnswers = correctAnswers;
                window.rationales = rationales;
                window.allOptions = allOptions;
                    
            resultBox.insertAdjacentHTML('beforeend', html);
            saveToChatHistory(html);
            lucide.createIcons();
        }

        function submitQuiz() {
            let score = 0;
             if (!window.correctAnswers || window.correctAnswers.length === 0) {
            return showToast("Quiz not ready.");
             }
                    
            const total = window.correctAnswers.length;
            let resultHTML = "";

            for (let i = 0; i < total; i++) {
                const selected = document.querySelector(`input[name="${window.currentQuizId}-q${i}"]:checked`)
                const userAnswer = selected ? selected.value : null;
                const correct = window.correctAnswers[i];
                const options = window.allOptions[i] || [];

                const correctText = options.find(opt => opt.letter === correct)?.text || "";
                const userText = options.find(opt => opt.letter === userAnswer)?.text || "";
                const explanation = window.rationales[i] || "";
                
                    let fixedExplanation = explanation;
                    if (correct && explanation) {
                    fixedExplanation = explanation.replace(/correct answer is [A-D]/i, `correct answer is ${correct}`);
                 }

                const isCorrect = userAnswer?.trim() === correct?.trim();
                
               const correctEl = document.getElementById(`${window.currentQuizId}-q${i}-${correct}`)
                  if (correctEl) {
                     correctEl.classList.remove("bg-zinc-50", "dark:bg-[#09090b]", "border-zinc-200", "dark:border-[#3f3f46]");
                     correctEl.classList.add("bg-emerald-50", "dark:bg-emerald-900/20", "border-emerald-500");
                  }

                if (userAnswer && userAnswer !== correct) {
                    const wrongEl = document.getElementById(`${window.currentQuizId}-q${i}-${userAnswer}`)
                if (wrongEl) {
                    wrongEl.classList.remove("bg-zinc-50", "dark:bg-[#09090b]", "border-zinc-200", "dark:border-[#3f3f46]");
                    wrongEl.classList.add("bg-rose-50", "dark:bg-rose-900/20", "border-rose-400");
               }
            }

                 const inputs = document.querySelectorAll(`input[name="${window.currentQuizId}-q${i}"]`)
                     inputs.forEach(input => { input.disabled = true; });

                if (isCorrect) score++;

                resultHTML += `
                <div class="mb-6 p-6 rounded-2xl border shadow-sm ${ isCorrect ? "bg-emerald-50/50 dark:bg-emerald-900/10 border-emerald-200 dark:border-emerald-800" : "bg-rose-50/50 dark:bg-rose-900/10 border-rose-200 dark:border-rose-800" }">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-[15px] font-bold uppercase tracking-wider text-zinc-900 dark:text-white">Question ${i + 1}</span>
                        <span class="text-xs font-bold uppercase px-2 py-1 rounded-md ${ isCorrect ? "bg-emerald-100 text-emerald-700 dark:bg-emerald-900/50 dark:text-emerald-400" : "bg-rose-100 text-rose-700 dark:bg-rose-900/50 dark:text-rose-400" }">${isCorrect ? "Correct" : "Incorrect"}</span>
                    </div>
                    ${ !isCorrect ? `<p class="text-sm text-zinc-600 dark:text-zinc-400 font-medium mb-2">Your Answer: ${ userAnswer ? userAnswer + " - " + userText : "Not answered" }</p>` : "" }
                    <p class="text-sm text-zinc-900 dark:text-zinc-100 font-medium mb-4">Correct Answer: <span class="font-bold">${correct} - ${correctText || "Missing"}</span></p>
                ${ explanation ? `
        <div class="mt-2 pt-4 border-t ${ isCorrect ? "border-emerald-200/50 dark:border-emerald-800/50" : "border-rose-200/50 dark:border-rose-800/50" }">
            <button onclick="toggleExplanation('${window.currentQuizId}', ${i})" class="flex items-center gap-1.5 text-zinc-700 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-white text-sm font-bold transition-colors">
                <i id="${window.currentQuizId}-toggle-icon-${i}" data-lucide="chevron-down" class="w-4 h-4 transition-transform"></i>
                <span id="${window.currentQuizId}-toggle-text-${i}">Show Explanation</span>
            </button>
            <div id="${window.currentQuizId}-explanation-${i}" class="hidden mt-3 text-[14px] text-zinc-600 dark:text-zinc-400 leading-relaxed font-medium">
                ${fixedExplanation}
            </div>
        </div>` : "" }
                </div>`;
            }

            const percentageScore = total ? Math.round((score / total) * 100) : 0;

            const resultSummaryHtml = `
            <div class="flex items-start gap-4 w-full max-w-3xl mx-auto pb-8">
                <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-[#06b6d4] to-[#8b5cf6] flex items-center justify-center shrink-0 mt-1 shadow-sm text-white">
                    <i data-lucide="brain-circuit" class="w-4 h-4"></i>
                </div>
                <div class="flex-1 w-full">
                    <div class="mb-8 px-6 py-10 rounded-3xl bg-white dark:bg-[#18181b] text-center border border-zinc-200 dark:border-[#27272a] shadow-md">
                        <h2 class="text-5xl font-bold font-display text-zinc-900 dark:text-white mb-2">${score} <span class="text-2xl text-zinc-400">/ ${total}</span></h2>
                        <p class="text-[15px] text-zinc-500 dark:text-zinc-400 font-semibold uppercase tracking-widest">Score: ${percentageScore}%</p>
                    </div>
                    ${resultHTML}
                </div>
            </div>`;

            document.getElementById("result").insertAdjacentHTML('beforeend', resultSummaryHtml);
            saveToChatHistory(resultSummaryHtml);
            lucide.createIcons();
        }
       
      async function resetQuiz(event) {
            const btn = event?.currentTarget;
            const icon = btn?.querySelector("i");
            if (icon) icon.classList.add("animate-spin");
            await requestAI("quiz");
            if (icon) icon.classList.remove("animate-spin");
      }

   

        function toggleExplanation(quizId, i) {
    const currentBox = document.getElementById(`${quizId}-explanation-${i}`);
    const currentText = document.getElementById(`${quizId}-toggle-text-${i}`);
    const currentIcon = document.getElementById(`${quizId}-toggle-icon-${i}`);

    if (!currentBox || !currentText) return;

    const isOpening = currentBox.classList.contains("hidden");

    // CLOSE ALL explanations in THIS quiz
    const allBoxes = document.querySelectorAll(`[id^="${quizId}-explanation-"]`);

    allBoxes.forEach(box => {
        const index = box.id.split("-").pop();

        const text = document.getElementById(`${quizId}-toggle-text-${index}`);
        const icon = document.getElementById(`${quizId}-toggle-icon-${index}`);

        box.classList.add("hidden");
        if (text) text.innerText = "Show Explanation";
        if (icon) icon.classList.remove("rotate-180");
    });

    // OPEN clicked one
    if (isOpening) {
        currentBox.classList.remove("hidden");
        currentText.innerText = "Hide Explanation";
        if (currentIcon) currentIcon.classList.add("rotate-180");
    }
        }
        
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector("i");
            if (input.type === "password") {
                input.type = "text";
                icon.setAttribute("data-lucide", "eye-off");
            } else {
                input.type = "password";
                icon.setAttribute("data-lucide", "eye");
            }
            lucide.createIcons();
        }

                if (params.get("reset") === "success") showToast("Password reset successful");

        window.addEventListener("focusin", () => {
            setTimeout(adjustChatPadding, 300);
        });

        window.addEventListener("focusout", () => {
            setTimeout(adjustChatPadding, 300);
        });
   
        function adjustChatPadding() {
    const inputBar = document.getElementById("inputBar");
    const result = document.getElementById("result");

    if (!inputBar || !result) return;

    const rect = inputBar.getBoundingClientRect();
    const height = rect.height;

    result.style.paddingBottom = (height + 30) + "px";
        }
        window.addEventListener("load", adjustChatPadding);
        setTimeout(adjustChatPadding, 500);
        window.addEventListener("resize", adjustChatPadding);

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("topic")?.addEventListener("input", adjustChatPadding);
        });

        function handleBookChange(select) {
            const value = select.value;
            localStorage.setItem("selectedBook", value);
        }

        let currentSelectedMode = 'explain';
        let isModeMenuOpen = false;

        function toggleModeMenu(e) {
            if (e) e.stopPropagation();

            const menu = document.getElementById("modeMenu");
            const btn = document.getElementById("modeBtn");
            const chevron = document.getElementById("modeChevron");

            const rect = btn.getBoundingClientRect();

            const menuHeight = 180;
            const spaceAbove = rect.top;

            if (spaceAbove < menuHeight) {
                menu.style.top = (rect.bottom + 8) + "px";
            } else {
                menu.style.top = (rect.top - menuHeight - 8) + "px";
            }

            menu.style.left = rect.left + "px";

            isModeMenuOpen = !isModeMenuOpen;

            if (isModeMenuOpen) {
                menu.classList.remove("opacity-0", "scale-95", "pointer-events-none");
                menu.classList.add("opacity-100", "scale-100", "pointer-events-auto");
                if (chevron) chevron.classList.add("rotate-180");
            } else {
                menu.classList.add("opacity-0", "scale-95", "pointer-events-none");
                menu.classList.remove("opacity-100", "scale-100", "pointer-events-auto");
                if (chevron) chevron.classList.remove("rotate-180");
            }
        }

        function selectMode(value, iconName, label) {
            currentSelectedMode = value;
            document.getElementById('modeLabel').innerText = label;
            
            const iconEl = document.getElementById('modeIcon');
            const newIcon = document.createElement('i');
            newIcon.id = 'modeIcon';
            newIcon.setAttribute('data-lucide', iconName);
            
            let colorClasses = "text-[#06b6d4]";
            if (value === 'quiz') colorClasses = "text-[#ec4899]";
            if (value === 'notes') colorClasses = "text-[#f59e0b]";
            if (value === 'flashcards') colorClasses = "text-[#8b5cf6]";
            
            newIcon.className = `w-4 h-4 ${colorClasses}`;
            iconEl.parentNode.replaceChild(newIcon, iconEl);
            
            lucide.createIcons();
            toggleModeMenu();
        }

        let isSending = false;

        function submitModeRequest(event) {
            const input = document.getElementById("topic");
            const sendBtn = event?.currentTarget;

            const value = input.value.trim();
            if (!value) return showToast("Enter a topic");

            if (isSending) return;
            isSending = true;

            input.value = "";
            
            if (sendBtn) {
                sendBtn.disabled = true;
                sendBtn.classList.add("opacity-50", "cursor-not-allowed");
            }

            if (currentSelectedMode === 'flashcards') {
    runFlashcards(event, value).finally(() => unlockUI(sendBtn));
            } else {
                requestAI(currentSelectedMode, value).finally(() => unlockUI(sendBtn));
            }
        }
        
        function unlockUI(sendBtn) {
            isSending = false;
            if (sendBtn) {
                sendBtn.disabled = false;
                sendBtn.classList.remove("opacity-50", "cursor-not-allowed");
            }
        }
        
        function startNewChat() {
            console.log("New chat started");
            currentChatId = "chat_" + Date.now();
            localStorage.setItem("current_chat_id", currentChatId);
            
            let chats = JSON.parse(localStorage.getItem("studyai_chats") || "{}");
            chats[currentChatId] = "";
            localStorage.setItem("studyai_chats", JSON.stringify(chats));
            
            const result = document.getElementById("result");
            if (result) {
                result.innerHTML = `
                <div id="welcomePlaceholder" class="h-full flex flex-col items-center justify-center text-center py-20 px-4 opacity-90">
                    <div class="p-5 rounded-2xl mb-6 bg-white dark:bg-[#18181b] shadow-sm border border-zinc-100 dark:border-[#27272a] animate-in fade-in zoom-in duration-500">
                        <i data-lucide="brain-circuit" class="w-12 h-12 text-[#06b6d4]"></i>
                    </div>
                    <h4 class="text-3xl font-bold tracking-tight text-zinc-900 dark:text-white mb-2 font-display signature-text">
                        Hello, how can I help?
                    </h4>
                    <p class="max-w-md mx-auto text-sm font-medium text-zinc-500 dark:text-zinc-400 leading-relaxed">
                        Choose a mode below, select your document, and let's start learning together.
                    </p>
                </div>`;
            }

            const input = document.getElementById("topic");
            if (input) {
                input.value = "";
                input.focus();
            }

            currentSelectedMode = 'explain';

            const modeLabel = document.getElementById("modeLabel");
            if (modeLabel) modeLabel.innerText = "Explain";

            const iconEl = document.getElementById('modeIcon');
            if (iconEl) {
                const newIcon = document.createElement('i');
                newIcon.id = 'modeIcon';
                newIcon.setAttribute('data-lucide', 'brain-circuit');
                newIcon.className = 'w-4 h-4 text-[#06b6d4]';
                iconEl.parentNode.replaceChild(newIcon, iconEl);
            }

            localStorage.removeItem("studyai_chat_history");

            lucide.createIcons();

            if (window.innerWidth < 1024) {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebarOverlay');

                if (sidebar) sidebar.classList.add('-translate-x-full');
                if (overlay) overlay.classList.add('hidden');
            }
        }
        
        // --- BULLETPROOF SCROLLING FIX ---
        // We use a MutationObserver to watch the chat area. The millisecond any HTML is 
        // added (like a user message, a loader, or a response), it automatically scrolls down.
        document.addEventListener('DOMContentLoaded', () => {
            const chatContainer = document.getElementById("result");
            if (chatContainer) {
                const observer = new MutationObserver(() => {
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                });
                // Observe changes to the children of the result container
                observer.observe(chatContainer, { childList: true, subtree: true });
            }
        });

            function renderChatList() {
    const container = document.getElementById("chatList");
    if (!container) return;

    const chats = JSON.parse(localStorage.getItem("studyai_chats") || "{}");

    container.innerHTML = "";

      Object.keys(chats).reverse().forEach(id => {

    const div = document.createElement("div");

    div.className = `
    group flex items-center justify-between 
    px-3 py-2 rounded-xl cursor-pointer text-sm
    hover:bg-zinc-100 dark:hover:bg-[#18181b]
    ${id === currentChatId ? "bg-zinc-200 dark:bg-[#27272a]" : ""}
    `;

    // 🔹 TITLE
    const titles = JSON.parse(localStorage.getItem("studyai_titles") || "{}");
    const title = titles[id] || "New Chat";

    const titleSpan = document.createElement("span");
    titleSpan.className = "truncate flex-1";
    titleSpan.innerText = title.length > 35
        ? title.slice(0, 35) + "..."
        : title;

    // 🔹 DELETE BUTTON
    const deleteBtn = document.createElement("button");
    deleteBtn.innerHTML = `<i data-lucide="trash-2" class="w-4 h-4"></i>`;
    deleteBtn.className = `
        opacity-0 group-hover:opacity-100 
        text-zinc-400 hover:text-red-500
        transition-all p-1 rounded-lg
    `;

    deleteBtn.onclick = (e) => {
        e.stopPropagation();
        deleteChat(id);
    };

    // 🔹 CLICK TO LOAD
    div.onclick = () => loadChat(id);

    // 🔹 APPEND
    div.appendChild(titleSpan);
    div.appendChild(deleteBtn);
    container.appendChild(div);
});
                
                lucide.createIcons();
            }

            function loadChat(id) {
    currentChatId = id;
    localStorage.setItem("current_chat_id", id);

    loadChatHistory();
    renderChatList();
            }

        function deleteChat(id) {
    if (!confirm("Delete this chat?")) return;

    let chats = JSON.parse(localStorage.getItem("studyai_chats") || "{}");
    let titles = JSON.parse(localStorage.getItem("studyai_titles") || "{}");

    delete chats[id];
    delete titles[id];

    localStorage.setItem("studyai_chats", JSON.stringify(chats));
    localStorage.setItem("studyai_titles", JSON.stringify(titles));

    // ✅ If current chat deleted → reset
    if (id === currentChatId) {
        currentChatId = null;
        localStorage.removeItem("current_chat_id");

        document.getElementById("result").innerHTML = `
        <div class="h-full flex items-center justify-center text-zinc-500">
            Chat deleted
        </div>`;
    }

    renderChatList();
        }
