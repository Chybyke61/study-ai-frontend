        // 6️⃣ Toggle Dark and Light Mode Logic
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.setAttribute('data-lucide', 'moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        }

        // Initialize theme icon on load
        document.addEventListener('DOMContentLoaded', () => {
            const icon = document.getElementById('themeIcon');
            if(icon) {
                if (document.documentElement.classList.contains('dark')) {
                    icon.setAttribute('data-lucide', 'sun');
                } else {
                    icon.setAttribute('data-lucide', 'moon');
                }
            }
            
            // Mobile Sidebar Toggle Logic
            const mobileBtn = document.getElementById('mobileMenuBtn');
            const closeBtn = document.getElementById('closeSidebarBtn');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            function toggleSidebar() {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            }

            if(mobileBtn) mobileBtn.addEventListener('click', toggleSidebar);
            if(closeBtn) closeBtn.addEventListener('click', toggleSidebar);
            if(overlay) overlay.addEventListener('click', toggleSidebar);
        });

        async function uploadBook() {
    if (!currentUser || !currentUser.id) return showToast("⚠️ Please login first");
    
    const fileInput = document.getElementById("bookFile");
    if (!fileInput.files[0]) return showToast("⚠️ Select a file first.");

    const file = fileInput.files[0];
    const allowedTypes = [ "application/pdf", "application/vnd.openxmlformats-officedocument.wordprocessingml.document", "application/msword" ];
    const fileName = file.name.toLowerCase();

if (
    !allowedTypes.includes(file.type) &&
    !fileName.endsWith(".pdf") &&
    !fileName.endsWith(".doc") &&
    !fileName.endsWith(".docx")
) {
    showToast("❌ Only PDF and DOCX allowed");
    fileInput.value = ""; 
    document.getElementById("fileNameDisplay").innerText = "Select PDF or DOCX only";
    return;
}
    const progWrapper = document.getElementById("progWrapper");
    const progBar = document.getElementById("progBar");
    const progText = document.getElementById("progText");

    let eventSource;

    try {
        progWrapper.classList.remove('hidden');
        progBar.style.width = '0%';
        progText.innerText = 'Uploading... 0%';

        function connectSSE() {
            eventSource = new EventSource(`${api}/progress?userId=${currentUser.id}`);

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);

                progText.innerText = `${data.step} ${data.progress}%`;
                progBar.style.width = `${data.progress}%`;

                if (data.progress >= 100) {
                    eventSource.close();
                    progText.innerText = "✅ Completed";
                    progBar.classList.replace("bg-indigo-500", "bg-emerald-500");
                    showToast("✅ Upload complete");
                    loadBooks();

                    setTimeout(() => {
                        progWrapper.classList.add("hidden");
                    }, 3000);
                }
            };

            eventSource.onerror = () => {
                eventSource.close();
                setTimeout(connectSSE, 2000);
            };
        }

        connectSSE();

        const formData = new FormData();
        formData.append("file", file);

        const res = await fetch(`${api}/upload-stream`, {
            method: "POST",
            headers: { "x-user-id": currentUser.id },
            body: formData
        });

        if (!res.ok) throw new Error("Upload failed");

    } catch (err) {
        if (eventSource) eventSource.close();
        progText.innerText = "❌ Failed";
        progBar.classList.replace("bg-indigo-500", "bg-red-500");
        showToast("❌ Upload failed");
    }
        }

        if (isCorrect) score++;

        resultHTML += `
        <div class="mb-4 p-4 rounded-xl border ${ isCorrect ? "bg-emerald-50/50 dark:bg-emerald-500/10 border-emerald-200 dark:border-emerald-500/30" : "bg-red-50/50 dark:bg-red-500/10 border-red-200 dark:border-red-500/30" }">
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-bold text-slate-800 dark:text-white">Question ${i + 1}</span>
                <span class="text-xs font-bold ${ isCorrect ? "text-emerald-600 dark:text-emerald-400" : "text-red-600 dark:text-red-400" }">${isCorrect ? "✔ Correct" : "✖ Wrong"}</span>
            </div>
            ${ !isCorrect ? `<p class="text-xs text-slate-500 dark:text-slate-400 mb-1">Your Answer: ${ userAnswer ? userAnswer + " — " + userText : "Not answered" }</p>` : "" }
            <p class="text-xs text-slate-700 dark:text-slate-300 mb-2">Correct Answer: <span class="font-semibold text-slate-900 dark:text-white">${correct} — ${correctText || "Option text missing"}</span></p>
        ${ explanation ? `
<div class="mt-3">
    <button onclick="toggleExplanation(${i})" class="group flex items-center gap-1.5 px-2 py-1 rounded bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:text-emerald-600 dark:hover:text-emerald-400 text-xs font-medium">
        <i id="toggle-icon-${i}" data-lucide="chevron-down" class="w-3 h-3 transition-transform"></i>
        <span id="toggle-text-${i}">Show Explanation</span>
    </button>
    <div id="explanation-${i}" class="hidden mt-2 p-3 rounded-lg bg-white dark:bg-slate-900/50 border border-slate-100 dark:border-white/5 text-xs text-slate-600 dark:text-slate-400 leading-relaxed border-l-2 border-l-emerald-500">
        ${fixedExplanation}
    </div>
</div>` : "" }
        </div>`;
    }

    const percentageScore = total ? Math.round((score / total) * 100) : 0;

    document.getElementById("result").innerHTML = `
    <div class="w-full max-w-2xl mx-auto pb-8">
        <div class="mb-6 p-6 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm text-center relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-r from-emerald-500/10 to-transparent opacity-50"></div>
            <h2 class="text-3xl font-black text-slate-900 dark:text-white mb-1 relative z-10">${score} <span class="text-lg text-slate-400">/ ${total}</span></h2>
            <p class="text-sm text-emerald-600 dark:text-emerald-400 font-bold tracking-widest uppercase relative z-10">Score: ${percentageScore}%</p>
        </div>
        ${resultHTML}
        <button onclick="resetQuiz(event)" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-md">
            🔄 Start New Session
        </button>
    </div>`;
    lucide.createIcons();
        }
       
      async function resetQuiz(event) {
    const btn = event?.currentTarget;
    const icon = btn?.querySelector("i");
    if (icon) icon.classList.add("animate-spin");
    await requestAI("quiz");
    if (icon) icon.classList.remove("animate-spin");
      }

        function toggleExplanation(i) {
    const box = document.getElementById(`explanation-${i}`);
    const text = document.getElementById(`toggle-text-${i}`);
    const icon = document.getElementById(`toggle-icon-${i}`);
    if (!box || !text) return;
    if (box.classList.contains("hidden")) {
        box.classList.remove("hidden");
        text.innerText = "Hide Explanation";
        if (icon) icon.classList.add("rotate-180");
    } else {
        box.classList.add("hidden");
        text.innerText = "Show Explanation";
        if (icon) icon.classList.remove("rotate-180");
    }
        }

        function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector("i");
    if (input.type === "password") {
        input.type = "text";
        icon.setAttribute("data-lucide", "eye-off");
    } else {
        input.type = "password";
        icon.setAttribute("data-lucide", "eye");
    }
    lucide.createIcons();
        }

    async function forgotPassword() {
    const email = document.getElementById("email").value;
    if (!email) return showToast("⚠️ Enter your email first");
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + "/reset.html"
    });
    if (error) return showToast("❌ " + error.message);
    showToast("📩 Reset link sent to your email");
    }

        (async () => {
    await handleEmailRedirect();
    const params = new URLSearchParams(window.location.search);
       const email = params.get("email");
if (email) {
    const input = document.getElementById("email");
    const pass = document.getElementById("password");
    if (input) input.value = email;
    if (pass) pass.focus();
}
        if (params.get("reset") === "success") showToast("✅ Password reset successful, please login");
    if (params.get("verified")) showToast("✅ Email verified! Please login");
    setTimeout(checkUser, 800);
})();

     document.getElementById("topic").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        requestAI("explain");
    }
});
    </script>
</body>
</html>
